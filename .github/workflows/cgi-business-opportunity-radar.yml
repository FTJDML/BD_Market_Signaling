              """.replace('__DATA__', data_json)
              html_doc = f"""<!doctype html><html lang='nl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CGI Retail IT Signal Radar</title><style>{css}</style></head><body><div class='login'><div class='login-card'><div class='eyebrow'>CGI Business Development</div><h1>Retail IT Signal Radar</h1><p>Dagelijkse radar voor IT-landschap-signalen, IT-beslissers en gekwalificeerde formule-/ketenintegraties.</p><input id='pw' type='password' placeholder='Login code'><button class='btn' onclick='go()'>Open radar</button><div id='err' class='err'></div></div></div><div class='app'><div class='shell'><aside class='sidebar'><div class='brandmark'>CGI</div><h2>Signal Radar</h2><p>Retail & Consumer Services. Alleen concrete IT-landschap-, hiring-, leadership- en integratiesignalen.</p><button class='tab active' data-tab='signals' onclick="tab('signals')">Signal board</button><button class='tab' data-tab='coverage' onclick="tab('coverage')">Coverage & kwaliteit</button><button class='tab' data-tab='rejected' onclick="tab('rejected')">Afgewezen / archive</button><button class='tab' data-tab='people' onclick="tab('people')">LinkedIn evidence</button><button class='tab' data-tab='setup' onclick="tab('setup')">Setup</button></aside><main class='content-shell'><div class='hero'><div class='hero-grid'><div><div class='eyebrow'>CGI Retail & Consumer Services</div><h1>Opportunity Signal Board</h1><p>Dagelijkse one-YAML research op harde IT-signalen: leadership, Business Analyst/data/POS/ERP-vacatures, platformkeuzes, tenders, security-events en gekwalificeerde retailintegraties.</p></div><div id='runmeta' class='runmeta'></div></div></div><div id='stats' class='stats'></div><div class='wrap'><div id='content'></div></div></main></div></div><script>{js}</script></body></html>"""
              return html_doc
          
          def main():
              self_test()
              if RUN_SELF_TEST_ONLY:
                  return
              data = run_research()
              Path('_site').mkdir(exist_ok=True)
              Path('_site/index.html').write_text(render_html(data), encoding='utf-8')
              Path('_site/data.json').write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding='utf-8')
              print(json.dumps(data['coverage'], ensure_ascii=False, indent=2))
          
          if __name__ == '__main__':
