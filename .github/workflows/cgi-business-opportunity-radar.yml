          # ------------------------- Text helpers -------------------------
          TERM_CACHE = {}
          def strip_accents(s: str) -> str:
              return ''.join(c for c in unicodedata.normalize('NFKD', str(s or '')) if not unicodedata.combining(c))
          
          def low(s: str) -> str:
              return strip_accents(str(s or '')).lower()
          
          def compact_spaces(s: str) -> str:
              return re.sub(r'\s+', ' ', str(s or '').strip())
          
          def canonical_company_key(name: str) -> str:
              n = low(name)
              n = re.sub(r'\([^)]*\)', ' ', n)
              n = re.sub(r'\b(b\.?v\.?|n\.?v\.?|u\.?a\.?|se|ltd|limited|holding|holdings|group|groep|the netherlands|netherlands|nederland|retail|international|europe|benelux|services|service|management|operations|bv|nv|cooperatie|cooperatief|stichting)\b', ' ', n)
              n = re.sub(r'[^a-z0-9&+]+', ' ', n)
              return compact_spaces(n)
          
          def term_regex(term: str):
              key = term
              if key not in TERM_CACHE:
                  t = re.escape(low(term)).replace('\\ ', r'\s+')
                  TERM_CACHE[key] = re.compile(r'(?<![a-z0-9])' + t + r'(?![a-z0-9])', re.I)
              return TERM_CACHE[key]
          
          def has_term(text: str, term: str) -> bool:
              return bool(term_regex(term).search(low(text)))
          
          def has_any(text: str, terms: list[str]) -> bool:
              return any(has_term(text, t) for t in terms)
          
          def matched_terms(text: str, terms: list[str]) -> list[str]:
              return [t for t in terms if has_term(text, t)]
          
          def domain_of(url: str) -> str:
              try: return urllib.parse.urlparse(url or '').netloc.lower().replace('www.', '')
              except Exception: return ''
          
          def path_of(url: str) -> str:
              try: return urllib.parse.urlparse(url or '').path.lower()
              except Exception: return ''
          
          def norm_title(t: str) -> str:
              t = low(t)
              t = re.sub(r'\s+-\s+[^-]{2,40}$', '', t)
              t = re.sub(r'[^a-z0-9]+', ' ', t)
              return compact_spaces(t)
          
          # ------------------------- Dates -------------------------
          def parse_date(value):
              if not value:
                  return None
              if isinstance(value, dt.datetime):
                  return value.astimezone(dt.timezone.utc) if value.tzinfo else value.replace(tzinfo=dt.timezone.utc)
              s = str(value).strip()
              if not s:
                  return None
              # GDELT seendate: 20260615123000
              if re.fullmatch(r'\d{14}', s):
                  try:
                      return dt.datetime.strptime(s, '%Y%m%d%H%M%S').replace(tzinfo=dt.timezone.utc)
                  except Exception:
                      pass
              try:
                  d = email.utils.parsedate_to_datetime(s)
                  if d:
                      return d.astimezone(dt.timezone.utc) if d.tzinfo else d.replace(tzinfo=dt.timezone.utc)
              except Exception:
                  pass
              for fmt in ['%Y-%m-%d', '%d-%m-%Y', '%d/%m/%Y', '%Y/%m/%d', '%d %b %Y', '%d %B %Y']:
                  try:
                      return dt.datetime.strptime(s, fmt).replace(tzinfo=dt.timezone.utc)
                  except Exception:
                      pass
              rel = low(s)
              m = re.search(r'(\d+)\s*(minute|minuten|hour|hours|uur|uren|day|days|dag|dagen|week|weeks|weken|month|months|maand|maanden)\s*(ago|geleden)?', rel)
              if m:
                  n = int(m.group(1)); unit = m.group(2)
                  if unit.startswith(('minute','minut')): delta = dt.timedelta(minutes=n)
                  elif unit.startswith(('hour','uur','uren')): delta = dt.timedelta(hours=n)
                  elif unit.startswith(('week','weken')): delta = dt.timedelta(days=7*n)
                  elif unit.startswith(('month','maand')): delta = dt.timedelta(days=30*n)
                  else: delta = dt.timedelta(days=n)
                  return NOW_UTC - delta
              if rel in {'vandaag','today'}: return NOW_UTC
              if rel in {'gisteren','yesterday'}: return NOW_UTC - dt.timedelta(days=1)
              return None
          
          def age_days(published):
              d = parse_date(published)
              if not d: return None
              return max(0, (NOW_UTC - d).days)
          
          def date_iso(d):
              d = parse_date(d)
              return d.astimezone(LOCAL_TZ).strftime('%Y-%m-%d %H:%M') if d else 'onbekend'
          
          # ------------------------- Company universe -------------------------
          def load_companies():
              raw = COMPANIES_RAW
              p = Path('data/companies.txt')
              if p.exists():
                  # Additive: never removes the embedded user list, but lets you add aliases/accounts in the repo.
                  raw += '\n' + p.read_text(encoding='utf-8', errors='ignore')
              rows = [r.strip() for r in raw.splitlines() if r.strip() and r.strip().lower() != 'organisatie']
              accounts = {}
              for r in rows:
                  key = canonical_company_key(r)
                  if not key or len(key) < 2: continue
                  if key not in accounts:
                      accounts[key] = {'key': key, 'name': r, 'raw_names': [], 'aliases': set(), 'source_only': False}
                  accounts[key]['raw_names'].append(r)
                  accounts[key]['aliases'].add(r)
                  ck = canonical_company_key(r)
                  if ck and len(ck) >= 3: accounts[key]['aliases'].add(ck)
              for key, als in MANUAL_ALIASES.items():
                  # Attach to existing account with matching key substring, or create if absent.
                  best = None
                  for k in accounts:
                      if key in k or k in key:
                          best = k; break
                  if not best:
                      best = key
                      accounts[best] = {'key': best, 'name': als[0], 'raw_names': [als[0]], 'aliases': set(), 'source_only': False}
                  for a in als:
                      accounts[best]['aliases'].add(a)
                      accounts[best]['aliases'].add(canonical_company_key(a))
              for a in accounts.values():
                  a['aliases'] = sorted([x for x in a['aliases'] if x and len(canonical_company_key(x) or x) >= 2], key=lambda s: (-len(s), s.lower()))
                  k = a['key']
                  a['source_only'] = any(s == k or s in k or k in s for s in SOURCE_ONLY_NAMES)
              return list(accounts.values())
          
          ACCOUNTS = load_companies()
          ALIAS_INDEX = []
          for acc in ACCOUNTS:
              for alias in acc['aliases']:
                  a = low(alias)
                  if len(a) < 3 and a not in {'ah'}: continue
                  ALIAS_INDEX.append((a, acc))
          ALIAS_INDEX.sort(key=lambda x: -len(x[0]))
          
          def find_company_matches(text: str):
              t = low(text)
              out = []
              seen = set()
              for alias, acc in ALIAS_INDEX:
                  if acc['key'] in seen: continue
                  if re.search(r'(?<![a-z0-9])' + re.escape(alias).replace('\\ ', r'\s+') + r'(?![a-z0-9])', t, re.I):
                      out.append({'key': acc['key'], 'name': acc['name'], 'alias': alias, 'source_only': acc['source_only']})
                      seen.add(acc['key'])
              return out[:6]
          
          # ------------------------- Fetchers -------------------------
          def http_json(url, headers=None, payload=None, timeout=15):
              try:
                  data = None
                  req_headers = headers or {}
                  if payload is not None:
                      data = json.dumps(payload).encode('utf-8')
                      req_headers = dict(req_headers)
                      req_headers['Content-Type'] = 'application/json'
                  req = urllib.request.Request(url, data=data, headers=req_headers)
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      return json.loads(resp.read().decode('utf-8', errors='replace'))
              except Exception as e:
                  raise RuntimeError(str(e))
          
          def http_text(url, headers=None, timeout=15):
              try:
                  req = urllib.request.Request(url, headers=headers or {})
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      return resp.read().decode('utf-8', errors='replace')
              except Exception as e:
                  raise RuntimeError(str(e))
          
          def item(provider, query_pack, query, kind, title, url, snippet='', source='', published=None, raw=None):
              return {
                  'provider': provider, 'query_pack': query_pack, 'query': query, 'kind': kind,
                  'title': compact_spaces(title), 'url': url or '', 'snippet': compact_spaces(snippet),
                  'source': source or domain_of(url), 'published': published, 'raw': raw or {}
              }
          
          def google_news_rss(query_pack, query, kind):
              if not ENABLE_RSS_FALLBACK: return []
              q = query + f' when:{max(1, min(max(LOOKBACK_DAYS, INTEGRATION_LOOKBACK_DAYS), 120))}d'
              url = 'https://news.google.com/rss/search?' + urllib.parse.urlencode({'q': q, 'hl': 'nl', 'gl': 'NL', 'ceid': 'NL:nl'})
              xml = http_text(url)
              root = ET.fromstring(xml)
              out = []
              for it in root.findall('.//item'):
                  title = (it.findtext('title') or '').strip()
                  link = (it.findtext('link') or '').strip()
                  desc = re.sub('<[^<]+?>', ' ', it.findtext('description') or '')
                  pub = it.findtext('pubDate')
                  src_el = it.find('source')
                  src = src_el.text if src_el is not None else 'Google News RSS'
                  out.append(item('google_news_rss', query_pack, query, kind, title, link, desc, src, pub))
              return out
          
          def gdelt_search(query_pack, query, kind):
              if not ENABLE_GDELT: return []
              days = max(1, min(max(LOOKBACK_DAYS, INTEGRATION_LOOKBACK_DAYS), 90))
              params = {'query': query, 'mode': 'ArtList', 'format': 'json', 'maxrecords': str(MAX_RESULTS_PER_QUERY), 'sort': 'HybridRel', 'timespan': f'{days}d'}
              url = 'https://api.gdeltproject.org/api/v2/doc/doc?' + urllib.parse.urlencode(params)
              data = http_json(url)
              out = []
              for a in data.get('articles', []) or []:
                  out.append(item('gdelt', query_pack, query, kind, a.get('title',''), a.get('url',''), a.get('snippet','') or a.get('seendate',''), a.get('sourceCountry','GDELT'), a.get('seendate'), a))
              return out
          
          def brave_search(query_pack, query, kind):
              if not BRAVE_KEY: return []
              params = {'q': query, 'count': str(MAX_RESULTS_PER_QUERY), 'country': 'nl', 'search_lang': 'nl', 'safesearch': 'off'}
              # Brave accepts freshness on current API versions; if ignored by provider, local freshness gate still applies.
              params['freshness'] = 'pm' if max(LOOKBACK_DAYS, INTEGRATION_LOOKBACK_DAYS) <= 31 else 'py'
              url = 'https://api.search.brave.com/res/v1/web/search?' + urllib.parse.urlencode(params)
              data = http_json(url, headers={'X-Subscription-Token': BRAVE_KEY, 'Accept': 'application/json'})
              out = []
              for r in (data.get('web') or {}).get('results', []) or []:
                  out.append(item('brave', query_pack, query, kind, r.get('title',''), r.get('url',''), r.get('description',''), r.get('profile',{}).get('name','Brave'), r.get('age') or r.get('page_age'), r))
              return out
          
          def tavily_search(query_pack, query, kind):
              if not TAVILY_KEY: return []
              payload = {'api_key': TAVILY_KEY, 'query': query, 'search_depth': 'advanced', 'max_results': MAX_RESULTS_PER_QUERY, 'include_answer': False, 'include_raw_content': False}
              data = http_json('https://api.tavily.com/search', payload=payload)
              out = []
              for r in data.get('results', []) or []:
                  out.append(item('tavily', query_pack, query, kind, r.get('title',''), r.get('url',''), r.get('content',''), 'Tavily', r.get('published_date') or r.get('published'), r))
              return out
          
          def serpapi_news(query_pack, query, kind):
              if not SERPAPI_KEY: return []
              params = {'engine': 'google_news', 'q': query, 'gl': 'nl', 'hl': 'nl', 'api_key': SERPAPI_KEY, 'no_cache': 'true'}
              data = http_json('https://serpapi.com/search?' + urllib.parse.urlencode(params))
              out = []
              for r in data.get('news_results', []) or []:
                  out.append(item('serpapi_news', query_pack, query, kind, r.get('title',''), r.get('link',''), r.get('snippet',''), (r.get('source') or {}).get('name','Google News'), r.get('date'), r))
              return out
          
          def serpapi_jobs(query_pack, query, kind):
              if not SERPAPI_KEY: return []
              params = {'engine': 'google_jobs', 'q': query, 'location': 'Netherlands', 'gl': 'nl', 'hl': 'nl', 'google_domain': 'google.nl', 'api_key': SERPAPI_KEY, 'no_cache': 'true'}
              data = http_json('https://serpapi.com/search?' + urllib.parse.urlencode(params))
              out = []
              for r in data.get('jobs_results', []) or []:
                  det = r.get('detected_extensions') or {}
                  posted = det.get('posted_at') or r.get('date') or ''
                  via = ', '.join(r.get('via', []) if isinstance(r.get('via'), list) else [str(r.get('via',''))])
                  desc = r.get('description','')[:1000]
                  out.append(item('serpapi_jobs', query_pack, query, 'job', r.get('title',''), r.get('share_link') or r.get('related_links',[{}])[0].get('link','') if r.get('related_links') else '', desc, via or 'Google Jobs', posted, r))
              return out
          
          PROVIDERS = [brave_search, tavily_search, serpapi_news, serpapi_jobs, google_news_rss, gdelt_search]
          
          def dedupe_items(items):
              seen = set(); out = []
              for x in items:
                  key = (domain_of(x.get('url')), norm_title(x.get('title'))) if x.get('url') else ('', norm_title(x.get('title')))
                  h = hashlib.sha1(json.dumps(key, ensure_ascii=False).encode()).hexdigest()
                  if h in seen: continue
                  seen.add(h); out.append(x)
              return out
          
          # ------------------------- Manual feeds -------------------------
          def read_csv(path):
              p = Path(path)
              if not p.exists(): return []
              try:
                  with p.open(newline='', encoding='utf-8-sig') as f:
                      return list(csv.DictReader(f))
              except Exception:
                  return []
          
          def manual_items():
              out = []
              for row in read_csv('data/manual-signals.csv'):
                  txt = row.get('text') or row.get('summary') or ''
                  out.append(item('manual_feed', 'manual', row.get('query','manual'), 'manual', row.get('title') or txt[:120] or 'Manual signal', row.get('url',''), txt, row.get('source','manual'), row.get('date') or row.get('published'), row))
              for row in read_csv('data/linkedin-signals.csv'):
                  txt = row.get('text') or row.get('signal') or row.get('summary') or ''
                  title = row.get('title') or f"LinkedIn signaal: {row.get('person','onbekend')} - {row.get('role','')}: {txt[:90]}"
                  out.append(item('linkedin_signal_feed', 'linkedin-feed', 'linkedin-signal-feed', 'linkedin', title, row.get('url',''), txt, 'LinkedIn handmatige/goedgekeurde feed', row.get('date') or row.get('published'), row))
              # Optional remote JSON feed; expected {"signals":[...]}
              if LINKEDIN_SIGNAL_FEED_URL:
                  try:
                      data = http_json(LINKEDIN_SIGNAL_FEED_URL)
                      for row in data.get('signals', []) or []:
                          txt = row.get('text') or row.get('summary') or row.get('signal') or ''
                          title = row.get('title') or f"LinkedIn signaal: {row.get('person','onbekend')} - {row.get('role','')}: {txt[:90]}"
                          out.append(item('linkedin_remote_feed', 'linkedin-feed', 'linkedin-remote-feed', 'linkedin', title, row.get('url',''), txt, 'LinkedIn remote feed', row.get('date') or row.get('published'), row))
                  except Exception:
                      pass
              return out
          
          def normalize_linkedin_url(url):
              raw = (url or '').strip().strip('"').strip("'").replace('\r','').replace('\n','')
              if not raw: return ''
              raw = urllib.parse.unquote(raw)
              raw = raw.replace('http://', 'https://')
              raw = re.sub(r'\?.*$', '', raw)
              raw = re.sub(r'#.*$', '', raw)
              raw = raw.rstrip('/')
              m = re.search(r'https://(?:[a-z]{2}\.)?(?:www\.)?linkedin\.com/in/([^\s,;"\']+)', raw, re.I)
              if not m: return ''
              slug = m.group(1).strip('/ ')
              if not slug: return ''
              return 'https://www.linkedin.com/in/' + slug
          
          def linkedin_slug(url):
              u = normalize_linkedin_url(url)
              if not u: return ''
              return urllib.parse.unquote(u.split('/in/', 1)[1]).strip('/')
          
          def guess_name_from_linkedin_url(url):
              slug = linkedin_slug(url)
              if not slug: return ''
              s = urllib.parse.unquote(slug)
              s = re.sub(r'[^\w\-\sÀ-ÿ]', ' ', s, flags=re.UNICODE)
              parts = [p for p in re.split(r'[-_\s]+', s) if p]
              cleaned = []
              for part in parts:
                  lp = part.lower()
                  if lp in {'msc','mba','bsc','phd','drs','ing','ir','nl','com'}: continue
                  if re.fullmatch(r'\d+', part): continue
                  if re.search(r'\d', part) and len(part) > 3: continue
                  if len(part) == 1: continue
                  cleaned.append(part)
                  if len(cleaned) >= 4: break
              return ' '.join(w.capitalize() for w in cleaned)
          
          def extract_linkedin_urls(text):
              found = []
              for m in re.finditer(r'https?://(?:[a-z]{2}\.)?(?:www\.)?linkedin\.com/in/[^\s,;"<>]+', text or '', re.I):
                  u = normalize_linkedin_url(m.group(0))
                  if u: found.append(u)
              return found
          
          def row_get_any(row, names):
              lower = {str(k).strip().lower(): v for k, v in (row or {}).items()}
              for n in names:
                  key = n.lower()
                  if key in lower and str(lower[key]).strip():
                      return str(lower[key]).strip()
              return ''
          
          def people_watchlist():
              rows = []
              seen = set()
              paths = ['data/people-watchlist.csv', 'data/people-watchlist.txt', 'data/linkedin-watchlist.txt', 'data/linkedin-urls.csv']
              for path in paths:
                  p = Path(path)
                  if not p.exists():
                      continue
                  raw = p.read_text(encoding='utf-8-sig', errors='ignore')
                  try:
                      with p.open(newline='', encoding='utf-8-sig') as f:
                          reader = csv.DictReader(f)
                          for row in reader:
                              url_text = row_get_any(row, ['linkedin_url','linkedin url','linkedin','linkedin_url ','Linkedin URL','LinkedIn URL','url','profile_url','profile'])
                              if not url_text:
                                  url_text = ' '.join(str(v or '') for v in row.values())
                              for u in extract_linkedin_urls(url_text):
                                  if u in seen: continue
                                  seen.add(u)
                                  company = row_get_any(row, ['company','bedrijf','organisatie','account','parent_account'])
                                  role = row_get_any(row, ['role','functie','title','titel'])
                                  rows.append({
                                      'company': company,
                                      'name': row_get_any(row, ['name','naam','person','persoon']) or guess_name_from_linkedin_url(u),
                                      'role': role,
                                      'linkedin_url': u,
                                      'slug': linkedin_slug(u),
                                      'priority': row_get_any(row, ['priority','prioriteit']) or 'B',
                                      'notes': row_get_any(row, ['notes','notities','comment']) or '',
                                      'source_file': path,
                                      'needs_enrichment': not bool(company and role)
                                  })
                  except Exception:
                      pass
                  for u in extract_linkedin_urls(raw):
                      if u in seen: continue
                      seen.add(u)
                      rows.append({'company':'','name':guess_name_from_linkedin_url(u),'role':'','linkedin_url':u,'slug':linkedin_slug(u),'priority':'B','notes':'','source_file':path,'needs_enrichment':True})
              return rows
          
          def selected_people_for_scan(watchlist):
              if PEOPLE_WATCHLIST_MODE == 'off' or not watchlist:
                  return []
              if PEOPLE_WATCHLIST_MODE == 'all':
                  return watchlist[:MAX_PEOPLE_WATCHLIST_SCANS]
              day = int(NOW_LOCAL.strftime('%j'))
              n = min(len(watchlist), MAX_PEOPLE_WATCHLIST_SCANS)
              start = (day * n) % max(1, len(watchlist))
              return (watchlist + watchlist)[start:start+n]
          
          def build_people_watchlist_queries(watchlist):
              queries = []
              for p in selected_people_for_scan(watchlist):
                  name = (p.get('name') or '').strip()
                  company = (p.get('company') or '').strip()
                  slug = (p.get('slug') or '').strip()
                  url = (p.get('linkedin_url') or '').strip()
                  if slug:
                      queries.append(('people-watchlist-enrichment', f'site:linkedin.com/in "{slug}"', 'people'))
                  if name:
                      role_filter = '(CIO OR CTO OR "Head of Data" OR "Head of Digital" OR "IT Director" OR "Enterprise Architect" OR "Product Owner POS" OR "Business Analyst" OR "Business Analist")'
                      company_part = f'"{company}" ' if company else ''
                      queries.append(('people-watchlist-profile', f'site:linkedin.com/in "{name}" {company_part}{role_filter}', 'people'))
                      queries.append(('people-watchlist-signals', f'"{name}" {company_part}("Business Analyst" OR "Business Analist" OR "data transformatie" OR "data transformation" OR "Product Owner POS" OR ERP OR "SAP S/4HANA" OR "data platform" OR POS OR omnichannel)', 'linkedin'))
                      queries.append(('people-watchlist-posts', f'site:linkedin.com/posts "{name}" ("Business Analyst" OR "Business Analist" OR "data transformatie" OR "data transformation" OR "Product Owner POS" OR ERP OR "data platform" OR hiring)', 'linkedin'))
                  elif url:
                      queries.append(('people-watchlist-url', f'"{url}"', 'people'))
              return queries
          
          # ------------------------- Classification -------------------------
          def source_type(x):
              d = domain_of(x.get('url'))
              p = path_of(x.get('url'))
              provider = x.get('provider','')
              if provider in {'manual_feed','linkedin_signal_feed','linkedin_remote_feed'}: return provider
              if 'linkedin.com' in d: return 'linkedin_public_index'
              if any(j in d or j in p for j in JOB_DOMAINS): return 'jobs/careers'
              if any(s in d for s in STRONG_NEWS_DOMAINS) or provider in {'google_news_rss','serpapi_news','gdelt'}: return 'news/search'
              return 'web/search'
          
          def blocked_source_reason(x, text):
              d = domain_of(x.get('url')); p = path_of(x.get('url')); lt = low(text)
              if any(b in d for b in BLOCKED_DOMAINS): return 'blocked source domain'
              if any(b in d or b in p for b in LOW_VALUE_DOMAINS): return 'low-value consumer/commercial domain'
              if has_any(text, CONSUMER_NOISE_TERMS): return 'consumer/product/wiki/noise content'
              if re.search(r'/product/|/producten/|/p/|/shop/|/folder|/aanbied', p): return 'product/folder/shop page'
              return None
          
          def is_generic_page_without_evidence(x, text):
              lt = low(text)
              title = low(x.get('title',''))
              if has_any(title, GENERIC_PAGE_TERMS) and not (has_any(text, IT_ROLES) or has_any(text, IT_LANDSCAPE_TERMS) or has_any(text, LEADERSHIP_ROLES)):
                  return True
              return False
          
          def is_single_store_event(text):
              lt = low(text)
              return any(re.search(p, lt) for p in SINGLE_STORE_PATTERNS) and not has_any(text, ["alle vestigingen", "alle winkels", "meerdere vestigingen", "meerdere winkels"])
          
          def is_financial_only(text):
              return has_any(text, FINANCIAL_ONLY_TERMS) and not (has_any(text, RETAIL_OPS_TERMS) and has_any(text, SCALE_TERMS))
          
          def is_qualified_ma(text):
              if not has_any(text, MA_TERMS): return False
              if is_single_store_event(text): return False
              if is_financial_only(text): return False
              if not has_any(text, RETAIL_OPS_TERMS): return False
              if not has_any(text, SCALE_TERMS): return False
              return True
          
          def classify_item(x):
              text = compact_spaces(' '.join([x.get('title',''), x.get('snippet',''), x.get('source','')]))
              stype = source_type(x)
              matches = find_company_matches(text)
              x_age = age_days(x.get('published'))
              x['_age_days'] = x_age
              x['_source_type'] = stype
              x['_matches'] = matches
              reject = None
          
              block = blocked_source_reason(x, text)
              if block: reject = block
              elif is_generic_page_without_evidence(x, text): reject = 'generic page without concrete IT evidence'
              elif not matches: reject = 'no target-company match'
              elif all(m.get('source_only') for m in matches): reject = 'matched only source/vendor/manufacturer account, not a retail/consumer-services target'
          
              # Freshness: hard gate. Jobs can be undated only if from job/career source and specific IT role is present.
              is_job_candidate = has_any(text, IT_ROLES) and has_any(text, JOB_TERMS)
              if not reject:
                  if x_age is None:
                      if stype in {'manual_feed','linkedin_signal_feed','linkedin_remote_feed'}:
                          pass
                      elif stype == 'jobs/careers' and is_job_candidate:
                          pass
                      else:
                          reject = 'undated result; cannot prove it is current'
                  else:
                      max_age = INTEGRATION_LOOKBACK_DAYS if is_qualified_ma(text) else LOOKBACK_DAYS
                      if x_age > max_age:
                          reject = f'stale result ({x_age} days old; max {max_age})'
          
              if reject:
                  return {'published': False, 'reason': reject, 'item': x, 'text': text, 'score': 0, 'category': 'Rejected'}
          
              role_hits = matched_terms(text, IT_ROLES)
              job_hits = matched_terms(text, JOB_TERMS)
              it_hits = matched_terms(text, IT_LANDSCAPE_TERMS)
              change_hits = matched_terms(text, CHANGE_TERMS)
              leadership_hits = matched_terms(text, LEADERSHIP_ROLES)
              leadership_event_hits = matched_terms(text, LEADERSHIP_EVENTS)
              tender_hits = matched_terms(text, TENDER_TERMS)
              security_hits = matched_terms(text, SECURITY_TERMS)
              ma_hits = matched_terms(text, MA_TERMS)
              vendor_hits = matched_terms(text, VENDOR_NAMES)
          
              evidence = []
              score = 0
              category = None
              directness = 'direct'
              why = ''
              cgi = ''
              action = ''
          
              if role_hits and job_hits:
                  category = 'IT-vacature / capability demand'
                  score = 94 if stype in {'jobs/careers','serpapi_jobs','linkedin_signal_feed','manual_feed'} else 88
                  evidence = role_hits[:5] + job_hits[:3]
                  why = 'Een specifieke IT-/data-/architectuurrol wijst concreet op capability-vraag of programma-opbouw.'
                  cgi = 'Business analysis, data transformation, enterprise architecture, POS/ERP/CRM-integratie, delivery squads en managed services.'
                  action = 'Valideer of dit één losse rol is of onderdeel van een programma; map hiring manager en relevante IT-stakeholders.'
              elif tender_hits and (it_hits or role_hits):
                  category = 'IT-tender / RFP'
                  score = 92
                  evidence = tender_hits + it_hits[:5]
                  why = 'Een tender/RFP met IT-landschapstermen is directe koopintentie of marktoriëntatie.'
                  cgi = 'Bid/no-bid, solutioning, architecture, delivery approach, programme assurance en partnerschap.'
                  action = 'Snel bid/no-bid bepalen en accountcontext ophalen.'
              elif security_hits and not (security_hits == ['iam']):
                  category = 'Security / compliance IT-event'
                  score = 88
                  evidence = security_hits
                  why = 'Security- of compliance-events creëren urgentie voor IAM, SOC, remediation en structurele security maturity.'
                  cgi = 'Cyber assessment, IAM, SOC/MDR, cloud security, remediation, governance en compliance-programma.'
                  action = 'Waarde-gedreven benaderen: continuïteit, risico-reductie en maturity, niet opportunistisch.'
              elif leadership_hits and leadership_event_hits:
                  category = 'IT/Digital leadership change'
                  score = 86
                  evidence = leadership_hits + leadership_event_hits[:3]
                  why = 'Nieuwe IT-, data- of digital-leiders bepalen vaak snel roadmap, prioriteiten en partnerbehoefte.'
                  cgi = '100-dagen IT-roadmap, executive briefing, enterprise architecture, data/AI-strategie en programme assurance.'
                  action = 'Maak accountbrief: wie is nieuw, welke agenda is waarschijnlijk, welke CGI-haak is relevant?'
              elif it_hits and change_hits:
                  # Avoid generic "platform" only. Need at least a more concrete IT term or vendor.
                  concrete_it = [t for t in it_hits if t not in {'platform'}]
                  if concrete_it or vendor_hits:
                      category = 'Expliciete IT-landschap verandering'
                      score = 88
                      evidence = concrete_it[:5] + change_hits[:3] + vendor_hits[:3]
                      why = 'Een benoemd platform-, POS-, ERP-, data-, cloud- of integratieprogramma wijst direct op IT-veranderwerk.'
                      cgi = 'Roadmap, architecture, implementation, integration/API, data migration, testing, change en managed services.'
                      action = 'Maak een korte accountbrief met bewijs, hypothese, geraakt IT-landschap en één concrete CGI-haak.'
              elif vendor_hits and change_hits and it_hits:
                  category = 'Vendor/platform movement'
                  score = 86
                  evidence = vendor_hits[:4] + change_hits[:3] + it_hits[:3]
                  why = 'Een vendor-/platformkeuze leidt vaak tot implementatie, integratie, migratie, testing en run-vraagstukken.'
                  cgi = 'Implementatie-ondersteuning, integratie, test/cutover, data migration, QA en managed services.'
                  action = 'Check of CGI kan aansluiten als integratie-, data-, test- of deliverypartner.'
              elif is_qualified_ma(text):
                  category = 'Gekwalificeerde formule-/ketenintegratie'
                  score = 80
                  directness = 'indirect'
                  evidence = ma_hits[:4] + matched_terms(text, RETAIL_OPS_TERMS)[:4] + matched_terms(text, SCALE_TERMS)[:4]
                  why = 'Retail/formule-integratie kan meerdere POS-, ERP-, CRM-, finance-, data- en integratielandschappen raken. Dit is een hypothese die eerst gevalideerd moet worden.'
                  cgi = 'Post-merger IT integration, application rationalization, data migration, ERP/POS/CRM-harmonisatie, integratie-architectuur en change.'
                  action = 'Niet koud verkopen. Maak eerst een integratiehypothese en valideer POS/ERP/CRM/data/finance-impact.'
          
              if not category:
                  return {'published': False, 'reason': 'no concrete IT-landscape signal or qualified retail integration', 'item': x, 'text': text, 'score': 0, 'category': 'Rejected'}
          
              # Score tuning
              if stype in {'manual_feed','linkedin_signal_feed','linkedin_remote_feed'}: score += 4
              if stype in {'news/search','jobs/careers'}: score += 2
              if x_age is not None and x_age <= 14: score += 4
              elif x_age is not None and x_age <= 45: score += 2
              if x_age is None: score -= 5
              if directness == 'indirect': score = min(score, 83)
              if all(m.get('source_only') for m in matches): score -= 20
              score = max(0, min(99, score))
          
              priority = 'Actie binnen 48 uur' if score >= 90 and directness == 'direct' else ('Review deze week' if directness == 'direct' else 'Valideren deze week')
              confidence = 'Hoog' if (x_age is not None and x_age <= 30 and stype in {'news/search','jobs/careers','manual_feed','linkedin_signal_feed','linkedin_remote_feed'}) else ('Middel' if x_age is not None or stype == 'jobs/careers' else 'Laag')
              if score < MIN_SCORE:
                  return {'published': False, 'reason': f'below threshold ({score} < {MIN_SCORE})', 'item': x, 'text': text, 'score': score, 'category': category}
              return {
                  'published': True,
                  'signal': {
                      'id': hashlib.sha1((norm_title(x.get('title','')) + '|' + category + '|' + '|'.join(m['key'] for m in matches)).encode('utf-8')).hexdigest()[:12],
                      'company': matches[0]['name'], 'matched_alias': matches[0]['alias'], 'all_matches': matches, 'title': x.get('title',''), 'url': x.get('url',''),
                      'source': x.get('source') or domain_of(x.get('url')), 'provider': x.get('provider'), 'source_type': stype, 'published_at': date_iso(x.get('published')),
                      'age_days': x_age, 'category': category, 'directness': directness, 'score': score, 'priority': priority, 'confidence': confidence,
                      'evidence_hits': list(dict.fromkeys(evidence))[:12], 'why': why, 'cgi_angle': cgi, 'action': action, 'query_pack': x.get('query_pack'), 'query': x.get('query'),
                      'outreach': make_outreach(matches[0]['name'], x.get('title',''), category, directness)
                  }
              }
          
          def make_outreach(company, title, category, directness):
              if directness == 'indirect':
                  return f"Ik zag een mogelijk integratiesignaal rond {company}: '{title}'. Ik zou dit niet als koopintentie behandelen, maar eerst valideren of POS, ERP, CRM, data, finance of integraties geraakt worden. Als dat zo is, kan CGI helpen met een compacte integratie-roadmap en delivery-aanpak."
              return f"Ik zag een concreet IT-landschap-signaal rond {company}: '{title}'. Dit valt onder {category}. CGI kan helpen met analyse, architectuur, integratie en delivery-capaciteit. Ik zou eerst kort valideren welk programma, team of hiring need hierachter zit."
          
          # ------------------------- Research execution -------------------------
          def build_queries(watchlist=None):
              queries = []
              for pack, kind, qs in QUERY_PACKS:
                  for q in qs:
                      queries.append((pack, q, kind))
              if ENABLE_LINKEDIN_PUBLIC_INDEX:
                  for pack, kind, q in LINKEDIN_PUBLIC_QUERIES:
                      queries.append((pack, q, kind))
              # Reserve part of the query budget for curated people-watchlist research.
              # Otherwise a broad/company scan can push all people queries out of the MAX_QUERIES cap.
              watchlist_queries = build_people_watchlist_queries(watchlist or []) if watchlist else []
              watchlist_reserve = min(len(watchlist_queries), max(20, MAX_QUERIES // 3)) if watchlist_queries else 0
              if DEEP_SCAN_MODE != 'broad':
                  # Rotate to keep daily cost manageable, while broad event queries still cover the full universe.
                  day = int(NOW_LOCAL.strftime('%j'))
                  keys = sorted([a for a in ACCOUNTS if not a.get('source_only')], key=lambda a: a['key'])
                  if DEEP_SCAN_MODE == 'all':
                      selected = keys
                  else:
                      batch = max(1, MAX_COMPANY_DEEP_SCANS)
                      start = (day * batch) % max(1, len(keys))
                      selected = (keys + keys)[start:start+batch]
                      # Always add strategic/manual alias accounts.
                      must = ['ahold', 'jumbo', 'hema', 'intergamma', 'as watson', 'coolblue', 'picnic', 'action', 'ranzijn', 'tuinland', 'landal', 'roompot', 'xenos', 'blokker', 'jysk', 'intratuin', 'maxeda']
                      for a in keys:
                          if any(m in a['key'] for m in must) and a not in selected:
                              selected.append(a)
                  for acc in selected[:max(MAX_COMPANY_DEEP_SCANS, len(selected) if DEEP_SCAN_MODE=='all' else MAX_COMPANY_DEEP_SCANS+30)]:
                      name = acc['name']
                      queries.append(('company-it-deep-scan', f'"{name}" ("Business Analyst" OR "Business Analist" OR "Product Owner POS" OR "Enterprise Architect" OR "Head of Data" OR "CIO" OR "data platform" OR "ERP" OR "SAP S/4HANA" OR "POS")', 'web'))
                      queries.append(('company-integration-deep-scan', f'"{name}" (overname OR fusie OR "gaat samen" OR "neemt over") (winkels OR vestigingen OR formule OR keten OR hoofdkantoor)', 'web'))
                      if ENABLE_LINKEDIN_PUBLIC_INDEX:
                          queries.append(('linkedin-company-index', f'site:linkedin.com/posts "{name}" ("data platform" OR "Business Analyst" OR "Business Analist" OR "Product Owner POS" OR "Head of Data" OR "CIO" OR "ERP" OR "POS")', 'linkedin'))
                          if DISCOVER_PEOPLE:
                              queries.append(('linkedin-people-discovery', f'site:linkedin.com/in "{name}" (CIO OR CTO OR "Head of Data" OR "Head of Digital" OR "IT Director" OR "Enterprise Architect")', 'people'))
              if watchlist_queries:
                  regular_limit = max(0, MAX_QUERIES - watchlist_reserve)
                  return (queries[:regular_limit] + watchlist_queries[:watchlist_reserve])[:MAX_QUERIES]
              # hard cap
              return queries[:MAX_QUERIES]
          
          def run_research():
              watchlist = people_watchlist()
              watchlist_selected = selected_people_for_scan(watchlist)
              coverage = {'version': VERSION, 'run_at': NOW_LOCAL.strftime('%Y-%m-%d %H:%M %Z'), 'lookback_days': LOOKBACK_DAYS, 'integration_lookback_days': INTEGRATION_LOOKBACK_DAYS, 'min_score': MIN_SCORE, 'accounts_loaded': len(ACCOUNTS), 'providers': {}, 'queries_executed': 0, 'items_retrieved': 0, 'provider_errors': [], 'people_watchlist_loaded': len(watchlist), 'people_watchlist_selected_for_scan': len(watchlist_selected), 'people_watchlist_needs_enrichment': sum(1 for p in watchlist if p.get('needs_enrichment')), 'config': {
                  'brave': bool(BRAVE_KEY), 'tavily': bool(TAVILY_KEY), 'serpapi': bool(SERPAPI_KEY), 'rss_fallback': ENABLE_RSS_FALLBACK, 'gdelt': ENABLE_GDELT, 'linkedin_public_index': ENABLE_LINKEDIN_PUBLIC_INDEX, 'deep_scan_mode': DEEP_SCAN_MODE, 'people_watchlist_mode': PEOPLE_WATCHLIST_MODE, 'max_people_watchlist_scans': MAX_PEOPLE_WATCHLIST_SCANS_RAW
              }}
              all_items = []
              queries = build_queries(watchlist)
              for pack, q, kind in queries:
                  coverage['queries_executed'] += 1
                  for fetcher in PROVIDERS:
                      # Avoid Google Jobs for non-job queries to control cost/noise.
                      if fetcher.__name__ == 'serpapi_jobs' and kind != 'job': continue
                      # People/LinkedIn watchlist discovery uses real web search APIs only; RSS/GDELT/News are too noisy for profile/post discovery.
                      if kind in {'people','linkedin'} and fetcher.__name__ not in {'brave_search','tavily_search'}: continue
                      try:
                          got = fetcher(pack, q, kind)
                          all_items.extend(got)
                          coverage['providers'][fetcher.__name__] = coverage['providers'].get(fetcher.__name__, 0) + len(got)
                      except Exception as e:
                          coverage['provider_errors'].append({'provider': fetcher.__name__, 'query': q[:160], 'error': str(e)[:240]})
                  time.sleep(0.05)
              manual = manual_items()
              all_items.extend(manual)
              coverage['providers']['manual_and_linkedin_feeds'] = len(manual)
              coverage['items_retrieved'] = len(all_items)
              all_items = dedupe_items(all_items)
              coverage['items_after_dedupe'] = len(all_items)
          
              signals = []
              rejected = []
              people_candidates = []
              for x in all_items:
                  if x.get('kind') == 'people':
                      text = compact_spaces(x.get('title','') + ' ' + x.get('snippet',''))
                      matches = find_company_matches(text)
                      if has_any(text, LEADERSHIP_ROLES + IT_ROLES) or matches or x.get('query_pack','').startswith('people-watchlist'):
                          people_candidates.append({'title': x.get('title',''), 'url': x.get('url',''), 'source': x.get('source'), 'provider': x.get('provider'), 'query_pack': x.get('query_pack'), 'matched_companies': matches[:3], 'role_hits': matched_terms(text, LEADERSHIP_ROLES + IT_ROLES)[:6]})
                      continue
                  c = classify_item(x)
                  if c.get('published'):
                      signals.append(c['signal'])
                  else:
                      rejected.append({'title': x.get('title',''), 'source': x.get('source') or domain_of(x.get('url')), 'url': x.get('url'), 'provider': x.get('provider'), 'reason': c.get('reason'), 'score': c.get('score', 0), 'category': c.get('category',''), 'published_at': date_iso(x.get('published')), 'age_days': age_days(x.get('published')), 'query_pack': x.get('query_pack'), 'query': x.get('query')})
              signals = dedupe_signals(signals)
              signals = sorted(signals, key=lambda s: (s['directness'] != 'direct', -s['score'], s['age_days'] if s['age_days'] is not None else 999, s['company']))
              rejected = sorted(rejected, key=lambda r: (r.get('reason',''), r.get('age_days') if r.get('age_days') is not None else 999))[:250]
              coverage['signals_published'] = len(signals)
              coverage['rejected_count'] = len(rejected)
              coverage['people_candidates'] = len(people_candidates)
              coverage['reject_reasons'] = Counter(r['reason'] for r in rejected).most_common(20)
              return {'coverage': coverage, 'signals': signals, 'rejected': rejected, 'people': people_candidates[:400], 'watchlist': watchlist[:1000], 'watchlist_selected': watchlist_selected[:300]}
          
          def signal_cluster_key(s):
              companies = sorted([m['key'] for m in s.get('all_matches', []) if not m.get('source_only')]) or [canonical_company_key(s.get('company',''))]
              if s.get('directness') == 'indirect' and len(companies) > 1:
                  return 'ma|' + '|'.join(companies)
              if s.get('category') == 'IT-vacature / capability demand':
                  return 'job|' + companies[0] + '|' + '|'.join(sorted([e for e in s.get('evidence_hits', []) if e in IT_ROLES])[:2])
              return s.get('category','') + '|' + companies[0] + '|' + norm_title(s.get('title',''))[:80]
          
          def dedupe_signals(signals):
              grouped = {}
              for s in signals:
                  k = signal_cluster_key(s)
                  if k not in grouped or (s['score'], -(s['age_days'] or 999)) > (grouped[k]['score'], -(grouped[k]['age_days'] or 999)):
                      grouped[k] = dict(s)
                      grouped[k]['supporting_sources'] = []
                  else:
                      grouped[k].setdefault('supporting_sources', []).append({'title': s.get('title'), 'url': s.get('url'), 'source': s.get('source'), 'published_at': s.get('published_at')})
              return list(grouped.values())
          
          # ------------------------- Self-test -------------------------
          def self_test():
              tests = [
                  (item('test','test','x','web','Discounter Action implementeert TCS-platform voor prijsstrategie - Consultancy.nl','https://www.consultancy.nl/nieuws/action-tcs','', 'Consultancy.nl', 'Thu, 14 Jul 2022 07:00:00 GMT'), False, 'stale'),
                  (item('test','test','x','web','ERP-fiasco bij Lidl: bedrijf trekt stekker uit SAP-implementatie van 500 miljoen','https://www.consultancy.nl/nieuws/lidl-sap','', 'Consultancy.nl', 'Tue, 28 Aug 2018 07:00:00 GMT'), False, 'stale'),
                  (item('test','test','x','web','HEMA - Wikipedia','https://nl.wikipedia.org/wiki/HEMA','Het merk Reaktor is uitgefaseerd en vervangen door het HEMA-merk, waaronder HEMA elektrische apparaten verkoopt.', 'Wikipedia', NOW_UTC), False, 'blocked'),
                  (item('test','test','x','web','Melkprijs DOC Kaas gecorrigeerd door fusie met Arla','https://www.nieuweoogst.nl/nieuws/melkprijs-doc-kaas','melkprijs fusie', 'Nieuwe Oogst', NOW_UTC), False, 'noise/no retail'),
                  (item('test','test','x','web','Sonos speakers, soundbars en soundbases | MediaMarkt','https://www.mediamarkt.nl/nl/category/sonos','Een nieuw Sonos product kopen bij MediaMarkt', 'MediaMarkt', NOW_UTC), False, 'product'),
                  (item('test','test','x','web','Ter Overname: Bruna winkel in Vlissingen | Franchise+','https://franchiseplus.nl/bruna-vlissingen','Ter Overname: Bruna winkel in Vlissingen', 'Franchise+', NOW_UTC), False, 'single-store'),
                  (item('test','test','x','web','Louwman CEO vertrekt na drie jaar','https://automotive-online.nl/louwman-ceo','Paul de Krom vertrekt na drie jaar als ceo van Louwman Group', 'Automotive Online', NOW_UTC), False, 'ceo-only'),
                  (item('test','test','x','web','Ranzijn Tuin & Dier neemt alle 4 winkels van Tuinland over','https://retailtrends.nl/ranzijn-tuinland','Ranzijn neemt alle winkels en vestigingen van Tuinland over', 'RetailTrends', NOW_UTC), True, 'qualified ma'),
                  (item('test','test','x','job','Intergamma zoekt Business Analist Data Transformatie','https://werkenbijintergamma.nl/vacature/business-analist-data-transformatie','Business Analist Data Transformatie vacature bij Intergamma voor dataplatform en ERP-integratie', 'Intergamma Careers', NOW_UTC), True, 'job'),
                  (item('test','test','x','web','Jumbo neemt La Place over','https://www.parool.nl/nieuws/jumbo-la-place','V&D-restaurant La Place overgenomen door Jumbo Groep', 'Parool', 'Tue, 26 Jan 2016 08:00:00 GMT'), False, 'stale ma'),
                  (item('test','test','x','web','Hema leent 60 mln aan Jumbo-familie Van Eerd voor eigen overname','https://fd.nl/hema-leent','financiering overname familie Van Eerd', 'FD', NOW_UTC), False, 'financial-only'),
              ]
              failures = []
              for it, should_publish, note in tests:
                  res = classify_item(it)
                  ok = bool(res.get('published')) == should_publish
                  if not ok:
                      failures.append({'note': note, 'title': it['title'], 'expected': should_publish, 'got': res})
              if failures:
                  print(json.dumps(failures, ensure_ascii=False, indent=2))
                  raise SystemExit('Self-test failed')
              print('Self-test OK')
          
