      - name: Self-test quality gates
        shell: bash
        run: RUN_SELF_TEST_ONLY=true python radar.py

      - name: Build dashboard
        shell: bash
        run: python radar.py

      - name: Commit persisted LinkedIn watchlist
        if: ${{ github.event.inputs.linkedin_watchlist_inline != '' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .radar/linkedin-watchlist.txt
          git commit -m "Persist LinkedIn watchlist for signal radar" || echo "No watchlist changes"
          git push || echo "Push skipped"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
