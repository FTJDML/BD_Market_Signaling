                </section>
                <section id="accounts" class="section">
                  <div class="notice">Alle ruwe bedrijven uit je input blijven bewaard. Duplicaten zijn samengevoegd voor scanning. Vendor/source-only accounts staan in de lijst maar worden niet als retail opportunity-target gescand.</div>
                  <div class="toolbar" style="grid-template-columns:1fr .5fr .5fr .5fr">
                    <input id="accountSearch" placeholder="Zoek account of alias..." oninput="renderAccounts()" />
                    <select id="accountStatus" onchange="renderAccounts()"><option value="">Alle statussen</option><option>target candidate</option><option>source-only vendor</option></select>
                    <select id="scanEnabled" onchange="renderAccounts()"><option value="">Scan status</option><option value="true">Scan aan</option><option value="false">Scan uit</option></select>
                    <button onclick="renderAccounts()">Filter</button>
                  </div>
                  <div id="accountsTable"></div>
                </section>
                <section id="quality" class="section">
                  <div class="two-col">
                    <div class="panel"><h2>Reject-redenen</h2><div id="rejectCounts"></div></div>
                    <div class="panel"><h2>Waarom strenger?</h2><p>Voorbeelden zoals <code>werken bij Karwei</code> of een titel <code>HEMA</code> zijn geen opportunity-signaal. Ze worden nu afgewezen tenzij er een specifieke IT/transformatie-rol of concreet event in titel/snippet staat.</p></div>
                  </div>
                  <h2 style="margin-top:22px">Voorbeelden van afgewezen hits</h2>
                  <div id="rejectedTable"></div>
                </section>
                <section id="linkedin" class="section">
                  <div class="notice"><b>LinkedIn-aanpak:</b> geen scraping met login. Gebruik publieke index alleen strict, of koppel een toegestane feed via <code>LINKEDIN_SIGNAL_FEED_URL</code>. Plak handmatige LinkedIn-observaties hieronder om lokaal te toetsen.</div>
                  <div class="two-col">
                    <div class="panel"><h2>Handmatige LinkedIn check</h2><textarea id="manualText" placeholder="Plak bijvoorbeeld: Nieuwe Head of Data gestart bij X, of vacature Business Analyst Data Transformation bij Y..."></textarea><button onclick="manualCheck()">Check signaal</button></div>
                    <div class="panel"><h2>Resultaat</h2><div id="manualResult" class="small">Nog geen input.</div></div>
                  </div>
                </section>
                <section id="playbook" class="section">
                  <div class="notice"><b>Definitie:</b> een signaal is pas geldig als er concrete aanleiding is voor IT-verandering én een plausibele CGI-haak.</div>
                  <div class="two-col">
                    <div class="panel"><h2>Wel tonen</h2><p>Nieuwe CIO/CTO/CDO, overname/fusie, expliciete data/digital/POS/ERP-transformatie, specifieke IT-vacatures, vendor/platformkeuze, IT-tender, security-event.</p></div>
                    <div class="panel"><h2>Niet tonen</h2><p>Homepage, generieke LinkedIn company page, Facebook/Instagram, algemene werken-bij-pagina, vacature winkelmedewerker, titel alleen bedrijfsnaam, losse woorden zoals AI/app zonder programma of event.</p></div>
                  </div>
                </section>
              </main>
            </div>
            <script>
              const DATA = {data_json};
              const LOGIN_HASH = "{LOGIN_SHA256}";
              async function sha256(text) {{
                const enc = new TextEncoder().encode(text);
                const buf = await crypto.subtle.digest('SHA-256', enc);
                return Array.from(new Uint8Array(buf)).map(function(b) {{ return b.toString(16).padStart(2,'0'); }}).join('');
              }}
              async function login() {{
                const code = document.getElementById('code').value;
                const hash = await sha256(code);
                if (hash === LOGIN_HASH) {{ localStorage.setItem('cgiRadarAuth','ok'); boot(); }}
                else {{ document.getElementById('loginError').textContent = 'Ongeldige login code.'; }}
              }}
              function logout() {{ localStorage.removeItem('cgiRadarAuth'); location.reload(); }}
              function escapeHtml(s) {{ return String(s || '').replace(/[&<>'"]/g, function(c) {{ return {{'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}}[c]; }}); }}
              function boot() {{
                document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block';
                document.getElementById('runLocal').textContent = DATA.meta.run_local;
                document.getElementById('qualityMode').textContent = DATA.meta.quality_mode;
                document.getElementById('mSignals').textContent = DATA.meta.signals_published;
                document.getElementById('mScanned').textContent = DATA.meta.accounts_scanned;
                document.getElementById('mThreshold').textContent = DATA.meta.min_score;
                document.getElementById('mSourceOnly').textContent = DATA.meta.source_only_accounts;
                fillFilters(); renderSignals(); renderAccounts(); renderQuality();
              }}
              function showTab(id) {{
                document.querySelectorAll('.section').forEach(function(el) {{ el.classList.toggle('active', el.id===id); }});
                document.querySelectorAll('.tab').forEach(function(el) {{ el.classList.toggle('active', el.dataset.tab===id); }});
              }}
              function fillFilters() {{
                const cats = Array.from(new Set(DATA.signals.map(function(s) {{ return s.category; }}))).sort();
                const catEl = document.getElementById('categoryFilter'); cats.forEach(function(c) {{ const o=document.createElement('option'); o.textContent=c; o.value=c; catEl.appendChild(o); }});
                const prios = Array.from(new Set(DATA.signals.map(function(s) {{ return s.priority; }}))).sort();
                const pEl = document.getElementById('priorityFilter'); prios.forEach(function(p) {{ const o=document.createElement('option'); o.textContent=p; o.value=p; pEl.appendChild(o); }});
              }}
              function renderSignals() {{
                const q = (document.getElementById('search').value || '').toLowerCase();
                const cat = document.getElementById('categoryFilter').value;
                const prio = document.getElementById('priorityFilter').value;
                const conf = document.getElementById('confidenceFilter').value;
                let rows = DATA.signals.filter(function(s) {{
                  const hay = (s.company+' '+s.title+' '+s.category+' '+(s.hits||[]).join(' ')).toLowerCase();
                  return (!q || hay.includes(q)) && (!cat || s.category===cat) && (!prio || s.priority===prio) && (!conf || s.confidence===conf);
                }});
                const wrap = document.getElementById('signalCards');
                if (!rows.length) {{
                  wrap.innerHTML = '<div class="empty"><b>Geen concrete signalen boven de drempel.</b><p>Dat is bewust. Deze radar moet liever niets tonen dan bullshit-signalen produceren.</p></div>';
                  return;
                }}
                wrap.innerHTML = rows.map(function(s) {{
                  const hits = (s.hits || []).map(function(h) {{ return '<span class="pill">'+escapeHtml(h)+'</span>'; }}).join('');
                  const summary = s.summary ? '<p class="small">'+escapeHtml(s.summary).slice(0,360)+'</p>' : '';
                  const link = s.url ? '<a href="'+escapeHtml(s.url)+'" target="_blank" rel="noopener">Open bron</a>' : '';
                  return '<article class="signal">'
                    + '<div class="signal-head"><div><div class="company">'+escapeHtml(s.company)+'</div><div class="title">'+escapeHtml(s.title)+'</div>'
                    + '<div class="meta"><span>'+escapeHtml(s.source_kind)+'</span><span>'+escapeHtml(s.published_local)+'</span><span>Confidence: '+escapeHtml(s.confidence)+'</span>'+link+'</div></div>'
                    + '<div class="score"><div><b>'+s.score+'</b><br><span>'+escapeHtml(s.priority)+'</span></div></div></div>'
                    + '<div class="signal-body"><div class="panel"><span class="badge red">'+escapeHtml(s.category)+'</span> <span class="badge soft">'+escapeHtml(s.evidence_reason)+'</span><h3 style="margin-top:14px">Bewijs-hits</h3><div>'+hits+'</div>'+summary+'<h3>Waarom</h3><p>'+escapeHtml(s.why)+'</p></div>'
                    + '<div class="panel"><h3>CGI-angle</h3><p>'+escapeHtml(s.cgi)+'</p><h3>Actie</h3><p>'+escapeHtml(s.action)+'</p><h3>Outreach draft</h3><p class="small">'+escapeHtml(s.outreach)+'</p></div></div>'
                    + '</article>';
                }}).join('');
              }}
              function renderAccounts() {{
                const q = (document.getElementById('accountSearch').value || '').toLowerCase();
                const status = document.getElementById('accountStatus').value;
                const scan = document.getElementById('scanEnabled').value;
                let rows = DATA.accounts.filter(function(a) {{
                  const hay = (a.name+' '+a.query_name+' '+(a.aliases||[]).join(' ')+' '+a.status).toLowerCase();
                  return (!q || hay.includes(q)) && (!status || a.status===status) && (!scan || String(a.scan_enabled)===scan);
                }}).slice(0,600);
                document.getElementById('accountsTable').innerHTML = '<table><thead><tr><th>Account</th><th>Querynaam</th><th>Status</th><th>Aliases</th><th>Ruwe regels</th></tr></thead><tbody>'
                  + rows.map(function(a) {{ return '<tr><td><b>'+escapeHtml(a.name)+'</b></td><td>'+escapeHtml(a.query_name)+'</td><td>'+escapeHtml(a.status)+'</td><td>'+escapeHtml((a.aliases||[]).join(', '))+'</td><td>'+escapeHtml((a.raw_entries||[]).join(' | '))+'</td></tr>'; }}).join('')
                  + '</tbody></table>';
              }}
              function renderQuality() {{
                const counts = DATA.meta.reject_counts || {{}};
                const countRows = Object.keys(counts).map(function(k) {{ return '<tr><td>'+escapeHtml(k)+'</td><td><b>'+counts[k]+'</b></td></tr>'; }}).join('');
                document.getElementById('rejectCounts').innerHTML = '<table><thead><tr><th>Reden</th><th>Aantal</th></tr></thead><tbody>'+countRows+'</tbody></table>';
                const rej = DATA.meta.rejected_examples || [];
                document.getElementById('rejectedTable').innerHTML = '<table><thead><tr><th>Bedrijf</th><th>Titel</th><th>Bron</th><th>Reden</th></tr></thead><tbody>'
                  + rej.map(function(r) {{ return '<tr><td>'+escapeHtml(r.company)+'</td><td>'+escapeHtml(r.title)+'</td><td>'+escapeHtml(r.source)+'</td><td>'+escapeHtml(r.reason)+'</td></tr>'; }}).join('')
                  + '</tbody></table>';
              }}
              function manualCheck() {{
                const txt = (document.getElementById('manualText').value || '').toLowerCase();
                const role = /(business analyst|business analist|data transformatie|data transformation|enterprise architect|solution architect|integration architect|product owner pos|sap|erp|data platform|head of data|cio|cto|chief data)/i.test(txt);
                const event = /(benoemd|aangesteld|appointed|started|start als|vacature|hiring|gezocht|overname|fusie|digital transformation|digitale transformatie|data platform|pos|ransomware|datalek|tender|rfp)/i.test(txt);
                const bad = /(facebook|instagram|homepage|contact|openingstijden)/i.test(txt);
                const res = (!bad && role && event)
                  ? '<span class="badge red">Mogelijk signaal</span><p>Dit bevat zowel een concrete trigger als een CGI-relevante IT-rol of IT-thema. Valideer de bron en stakeholder voordat je outreach doet.</p>'
                  : '<span class="badge soft">Geen signaal</span><p>Te weinig concreet bewijs. Zoek naar een duidelijke rol, event, transformatieprogramma, vendorselectie of M&A-trigger.</p>';
                document.getElementById('manualResult').innerHTML = res;
              }}
              if (localStorage.getItem('cgiRadarAuth') === 'ok') boot();
              document.getElementById('code').addEventListener('keydown', function(e) {{ if(e.key==='Enter') login(); }});
            </script>
          </body>
          </html>'''
              return html_doc


          def write_outputs(signals, companies, raw_entries, meta):
              out = Path("_site")
              out.mkdir(exist_ok=True)
              (out / "index.html").write_text(generate_html(signals, companies, raw_entries, meta), encoding="utf-8")
              (out / "signals.json").write_text(json.dumps({"signals": signals, "meta": meta}, ensure_ascii=False, indent=2), encoding="utf-8")
              (out / "accounts.json").write_text(json.dumps({"accounts": companies, "raw_entries": raw_entries}, ensure_ascii=False, indent=2), encoding="utf-8")
              (out / "run-log.json").write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding="utf-8")


          def main():
              max_companies_raw = os.getenv("MAX_COMPANIES", "ALL").strip()
              max_companies = None if max_companies_raw.upper() == "ALL" else max(1, int(max_companies_raw))
              lookback_days = int(os.getenv("LOOKBACK_DAYS", "45"))
              min_score = int(os.getenv("MIN_SCORE", "75"))
              include_linkedin_public = os.getenv("INCLUDE_LINKEDIN_PUBLIC_INDEX", "true").lower() == "true"
              raw_entries, companies, signals, meta = scan(max_companies, lookback_days, min_score, include_linkedin_public)
              write_outputs(signals, companies, raw_entries, meta)
              print(json.dumps({"signals": len(signals), "accounts_scanned": meta["accounts_scanned"], "source_only": meta["source_only_accounts"], "quality_mode": meta["quality_mode"]}, ensure_ascii=False, indent=2))
              summary_path = os.getenv("GITHUB_STEP_SUMMARY", "").strip()
              if summary_path:
                  Path(summary_path).write_text(
                      "# CGI Business Opportunity Signal Radar - Strict V3\n\n"
                      + f"- Signals published: {len(signals)}\n"
                      + f"- Accounts scanned: {meta['accounts_scanned']}\n"
                      + f"- Source-only accounts: {meta['source_only_accounts']}\n"
                      + f"- Quality mode: {meta['quality_mode']}\n",
                      encoding="utf-8"
                  )

          if __name__ == "__main__":
              main()
          PY
          python -m py_compile radar.py
          python radar.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
