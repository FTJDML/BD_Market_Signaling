          @dataclass
          class Company:
              name: str
              canonical: str
              monitor_mode: str  # target | context
              fit_reason: str
              aliases: List[str]
          
          
          def clean_company_name(s: str) -> str:
              s = norm_space(s)
              if not s or s.lower() == "organisatie":
                  return ""
              # Drop explanatory parentheticals that were added in the raw list.
              s = re.sub(r"\s*\([^)]*exacte naam[^)]*\)", "", s, flags=re.I)
              s = re.sub(r"\s*\([^)]*kies juiste entiteit[^)]*\)", "", s, flags=re.I)
              return norm_space(s)
          
          
          def canonicalize_company(s: str) -> str:
              x = lower(clean_company_name(s))
              # Normalize a few common legal suffix differences, but don't over-destroy brand names.
              x = x.replace("b.v", "bv").replace("n.v", "nv")
              x = re.sub(r"\bholding\b", "", x)
              x = re.sub(r"\s+", " ", x).strip(" .-/")
              return x
          
          
          def infer_monitor_mode(name: str) -> Tuple[str, str]:
              n = lower(name)
              if n in ALWAYS_RETAIL_BRANDS:
                  return "target", "explicit retail/consumer-services brand"
              if contains_phrase(n, RETAIL_FIT_TERMS):
                  return "target", "name indicates retail/consumer services"
              if contains_phrase(n, NON_TARGET_CONTEXT_TERMS):
                  return "context", "supplier/manufacturer/vendor; only direct IT signals allowed"
              # Default: target because the user list is intended as retail/consumer universe, but M&A must still pass stricter evidence.
              return "target", "from user-provided target universe"
          
          
          def build_companies(raw: str) -> List[Company]:
              seen: Dict[str, Company] = {}
              for line in raw.splitlines():
                  name = clean_company_name(line)
                  if not name:
                      continue
                  can = canonicalize_company(name)
                  if not can:
                      continue
                  mode, reason = infer_monitor_mode(name)
                  if can not in seen:
                      seen[can] = Company(name=name, canonical=can, monitor_mode=mode, fit_reason=reason, aliases=[])
                  else:
                      if name not in seen[can].aliases and name != seen[can].name:
                          seen[can].aliases.append(name)
                      if seen[can].monitor_mode == "context" and mode == "target":
                          seen[can].monitor_mode = "target"
                          seen[can].fit_reason = reason
              return list(seen.values())
          
