                          continue
                      key = norm_key(clean_query_name(company_name))
                      company = companies_by_key.get(key) or {"id": slugify(key), "name": company_name, "query_name": clean_query_name(company_name), "aliases": []}
                      item = {
                          "title": str(row.get("title") or row.get("text") or "LinkedIn signaal"),
                          "summary": str(row.get("summary") or row.get("text") or ""),
                          "url": str(row.get("url") or row.get("link") or ""),
                          "source": str(row.get("source") or "LinkedIn approved feed"),
                          "source_kind": "LinkedIn approved feed/API",
                          "source_id": "linkedin_feed",
                          "published_raw": str(row.get("published") or row.get("date") or ""),
                      }
                      classified = classify(item["title"], item["summary"])
                      if not classified:
                          continue
                      sig, _ = item_to_signal(company, item, classified, now_utc)
                      sig["score"] = min(100, sig["score"] + 8)
                      sig["priority"] = priority(sig["score"])
                      sig["confidence"] = "Hoog"
                      imported.append(sig)
              except Exception as exc:
                  error = str(exc)
              return imported, error
          
          
          def scan(max_companies, lookback_days, min_score, include_linkedin_index):
              raw_entries, companies = parse_companies(USER_COMPANIES_RAW)
              selected = companies[:max_companies] if max_companies else companies
              now_utc = dt.datetime.now(dt.timezone.utc)
              signals = []
              errors = []
              seen = set()
              sources = [SOURCE_DEFS[0]]
              if include_linkedin_index:
                  sources.extend(SOURCE_DEFS[1:])
          
              for idx, company in enumerate(selected, start=1):
                  for src in sources:
                      query = source_query(src, company)
                      url = rss_url(src["engine"], query)
                      try:
                          items = fetch_rss(url, src)
                      except Exception as exc:
                          errors.append({"company": company["name"], "source": src["label"], "error": str(exc)[:220]})
                          continue
                      for item in items[:5]:
                          classified = classify(item["title"], item.get("summary", ""))
                          if not classified:
                              continue
                          sig, published_dt = item_to_signal(company, item, classified, now_utc)
                          if published_dt:
                              age_days = (now_utc - published_dt.astimezone(dt.timezone.utc)).days
                              if age_days > lookback_days:
                                  continue
                          if sig["score"] < min_score:
                              continue
                          dedupe = (company["id"], sig["url"] or norm_key(sig["title"]), sig["category_id"])
                          if dedupe in seen:
                              continue
                          seen.add(dedupe)
                          signals.append(sig)
                      time.sleep(0.06)
          
              by_key = {norm_key(c["query_name"]): c for c in companies}
              feed_signals, feed_error = load_linkedin_feed(by_key, now_utc)
              for sig in feed_signals:
                  if sig["score"] >= min_score:
                      signals.append(sig)
              if feed_error:
                  errors.append({"company": "LinkedIn feed", "source": "LINKEDIN_SIGNAL_FEED_URL", "error": feed_error[:300]})
          
              signals.sort(key=lambda s: (s["score"], s.get("published", "")), reverse=True)
              meta = {
                  "run_utc": now_utc.isoformat(),
                  "run_local": now_utc.astimezone(ZoneInfo("Europe/Amsterdam")).strftime("%d-%m-%Y %H:%M Europe/Amsterdam"),
                  "raw_entries_in_yaml": len(raw_entries),
                  "unique_accounts": len(companies),
                  "accounts_scanned": len(selected),
                  "signals_found_before_limit": len(signals),
                  "signals_published": min(500, len(signals)),
                  "lookback_days": lookback_days,
                  "min_score": min_score,
                  "include_linkedin_index": include_linkedin_index,
                  "linkedin_feed_enabled": bool(os.getenv("LINKEDIN_SIGNAL_FEED_URL", "").strip()),
                  "errors": errors[:80],
              }
              return raw_entries, companies, signals[:500], meta
          
          
          def generate_html(signals, companies, raw_entries, meta):
              data = {"signals": signals, "accounts": companies, "raw_entries": raw_entries, "meta": meta, "categories": SIGNAL_CATEGORIES}
              data_json = json.dumps(data, ensure_ascii=False).replace("</", "<\\/")
              html_doc = f'''<!doctype html>
          <html lang="nl">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>CGI Business Opportunity Signal Radar</title>
            <style>
              :root {{
                --cgi-red:#e31937; --cgi-purple:#5236ab; --cgi-black:#000000; --cgi-white:#ffffff;
                --text:#111111; --muted:#5e5e66; --line:#e7e7ed; --soft:#f7f7fa; --panel:#ffffff;
                --shadow: 0 16px 45px rgba(0,0,0,.10); --radius: 22px;
              }}
              * {{ box-sizing:border-box; }}
              body {{ margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--soft); color:var(--text); }}
              a {{ color:var(--cgi-purple); text-decoration:none; }} a:hover {{ text-decoration:underline; }}
              .login {{ min-height:100vh; display:grid; place-items:center; padding:28px; background:{CGI_GRADIENT}; }}
              .login-card {{ width:min(560px,100%); background:#fff; border-radius:28px; padding:34px; box-shadow:var(--shadow); }}
              .brand-kicker {{ font-weight:800; color:var(--cgi-red); letter-spacing:.08em; text-transform:uppercase; font-size:12px; }}
              h1 {{ margin:10px 0 8px; font-size:34px; line-height:1.05; letter-spacing:-.04em; }}
              h2 {{ margin:0 0 14px; font-size:23px; letter-spacing:-.02em; }}
              h3 {{ margin:0 0 10px; font-size:16px; }}
              p {{ line-height:1.5; }}
              .login input {{ width:100%; padding:15px 16px; border:1px solid var(--line); border-radius:14px; font-size:18px; margin:16px 0 10px; }}
              button, .button {{ border:0; border-radius:999px; padding:12px 16px; font-weight:800; cursor:pointer; background:var(--cgi-red); color:white; display:inline-flex; align-items:center; gap:8px; }}
              button.secondary {{ background:var(--cgi-purple); }} button.ghost {{ background:#fff; color:var(--text); border:1px solid var(--line); }}
              .error {{ color:var(--cgi-red); font-weight:700; min-height:22px; }}
              .app {{ display:none; }}
              header {{ background:{CGI_GRADIENT}; color:#fff; padding:28px 32px 34px; }}
              .topbar {{ display:flex; align-items:center; justify-content:space-between; gap:18px; margin-bottom:30px; }}
              .logo {{ display:flex; align-items:center; gap:12px; font-weight:900; letter-spacing:.02em; }}
              .logo-mark {{ width:44px; height:44px; border-radius:14px; background:#fff; color:var(--cgi-red); display:grid; place-items:center; font-weight:900; }}
              .hero {{ display:grid; grid-template-columns: 1.2fr .8fr; gap:24px; align-items:end; }}
              .hero h1 {{ color:#fff; max-width:900px; font-size:42px; }}
              .hero p {{ color:rgba(255,255,255,.88); max-width:820px; margin:0; }}
              .hero-card {{ background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.25); border-radius:22px; padding:20px; }}
              .hero-card strong {{ display:block; font-size:32px; }}
              main {{ padding:24px 32px 60px; max-width:1500px; margin:0 auto; }}
              .stats {{ display:grid; grid-template-columns: repeat(5,minmax(140px,1fr)); gap:14px; margin-top:-44px; margin-bottom:20px; }}
              .stat {{ background:#fff; border:1px solid var(--line); border-radius:20px; padding:18px; box-shadow:0 8px 28px rgba(0,0,0,.07); }}
              .stat .num {{ font-size:28px; font-weight:900; letter-spacing:-.03em; }}
              .stat .lbl {{ color:var(--muted); font-size:13px; margin-top:5px; }}
              .toolbar {{ background:#fff; border:1px solid var(--line); border-radius:22px; padding:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px; position:sticky; top:0; z-index:5; }}
              .tabs {{ display:flex; gap:8px; flex-wrap:wrap; }}
              .tab {{ background:#fff; color:var(--text); border:1px solid var(--line); }} .tab.active {{ background:var(--cgi-black); color:#fff; border-color:var(--cgi-black); }}
              .filters {{ margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; }}
              input, select, textarea {{ border:1px solid var(--line); border-radius:12px; padding:11px 12px; font:inherit; background:#fff; }}
              #search {{ width:min(420px,40vw); }}
              .panel {{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:20px; box-shadow:0 8px 28px rgba(0,0,0,.05); margin-bottom:18px; }}
              .grid {{ display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:16px; }}
              .signal {{ border:1px solid var(--line); border-radius:22px; padding:18px; background:#fff; display:flex; flex-direction:column; gap:12px; }}
              .signal.high {{ border-top:5px solid var(--cgi-red); }} .signal.mid {{ border-top:5px solid var(--cgi-purple); }} .signal.low {{ border-top:5px solid #000; }}
              .row {{ display:flex; align-items:center; justify-content:space-between; gap:12px; }}
              .company {{ font-weight:900; font-size:16px; }} .title {{ font-size:17px; font-weight:800; line-height:1.25; }}
              .meta {{ color:var(--muted); font-size:12px; display:flex; gap:8px; flex-wrap:wrap; }}
              .badge {{ border-radius:999px; padding:6px 9px; background:#f1f1f5; font-weight:800; font-size:12px; }}
              .badge.red {{ background:#ffecef; color:#b00020; }} .badge.purple {{ background:#eee9ff; color:#3d238e; }} .badge.black {{ background:#000; color:#fff; }}
              .score {{ min-width:58px; height:58px; border-radius:18px; display:grid; place-items:center; font-size:22px; font-weight:900; color:#fff; background:var(--cgi-black); }}
              .score.hot {{ background:var(--cgi-red); }} .score.warm {{ background:var(--cgi-purple); }}
              details {{ border-top:1px solid var(--line); padding-top:10px; }} summary {{ cursor:pointer; font-weight:900; }}
              .kv {{ display:grid; grid-template-columns:120px 1fr; gap:8px; font-size:13px; margin:8px 0; }} .kv b {{ color:var(--muted); }}
              .accounts-list {{ columns: 3 260px; column-gap:24px; }} .account-line {{ break-inside:avoid; padding:7px 0; border-bottom:1px solid #f0f0f3; font-size:13px; }}
              .source-note {{ border-left:5px solid var(--cgi-purple); padding:14px 16px; background:#f4f1ff; border-radius:14px; }}
              textarea {{ width:100%; min-height:190px; resize:vertical; }}
              .manual-result {{ margin-top:12px; }}
              .hidden {{ display:none !important; }}
              @media (max-width:980px) {{ .hero, .grid {{ grid-template-columns:1fr; }} .stats {{ grid-template-columns: repeat(2,1fr); }} #search {{ width:100%; }} .filters {{ margin-left:0; width:100%; }} }}
            </style>
          </head>
          <body>
            <section id="login" class="login">
              <div class="login-card">
                <div class="brand-kicker">CGI signal radar</div>
                <h1>Business Opportunity Signal Radar</h1>
                <p>Voer de toegangscode in om het dashboard te openen.</p>
                <input id="loginCode" type="password" placeholder="Login code" autocomplete="current-password" />
                <button onclick="login()">Open dashboard</button>
                <div id="loginError" class="error"></div>
                <p style="color:#666;font-size:13px;margin-top:18px">Let op: dit is een lichte client-side toegangspoort voor GitHub Pages, geen enterprise security-laag.</p>
              </div>
            </section>
          
            <div id="app" class="app">
              <header>
                <div class="topbar">
                  <div class="logo"><div class="logo-mark">CGI</div><div>Business Opportunity Signal Radar</div></div>
                  <button class="ghost" onclick="logout()">Uitloggen</button>
                </div>
                <section class="hero">
                  <div>
                    <div class="brand-kicker" style="color:#fff">Retail & Consumer Services NL</div>
                    <h1>Dagelijkse signalen die kunnen wijzen op CGI-relevante IT-opportunities.</h1>
                    <p>De agent combineert nieuws, publieke zoekresultaten, LinkedIn-indexsignalen en optioneel een goedgekeurde LinkedIn-feed. Elk signaal krijgt een score, CGI-angle en suggested action.</p>
                  </div>
                  <div class="hero-card">
                    <span>Laatste run</span>
                    <strong id="runLocal"></strong>
                    <p id="runSettings"></p>
                  </div>
                </section>
              </header>
          
              <main>
                <section class="stats" id="stats"></section>
                <section class="toolbar">
                  <div class="tabs">
                    <button class="tab active" data-tab="signals" onclick="setTab('signals')">Signalen</button>
                    <button class="tab" data-tab="accounts" onclick="setTab('accounts')">Accounts</button>
                    <button class="tab" data-tab="linkedin" onclick="setTab('linkedin')">LinkedIn input</button>
                    <button class="tab" data-tab="sources" onclick="setTab('sources')">Bronnen</button>
                    <button class="tab" data-tab="playbook" onclick="setTab('playbook')">Playbook</button>
                  </div>
                  <div class="filters">
                    <input id="search" placeholder="Zoek bedrijf, signaal, bron..." oninput="renderSignals()" />
                    <select id="categoryFilter" onchange="renderSignals()"></select>
                    <select id="priorityFilter" onchange="renderSignals()">
                      <option value="">Alle prioriteiten</option><option>Actie binnen 48 uur</option><option>Review deze week</option><option>Monitoren en verrijken</option><option>Context</option>
                    </select>
                  </div>
                </section>
          
                <section id="tab-signals" class="tabpane"><div id="signalsList" class="grid"></div></section>
                <section id="tab-accounts" class="tabpane hidden"><div class="panel"><h2>Alle accounts uit jouw lijst</h2><p>Alle ruwe regels staan in de YAML; duplicaten zijn technisch gegroepeerd voor scanning. Hieronder zie je de unieke monitoraccounts plus eventuele aliases.</p><div id="accountsList" class="accounts-list"></div></div></section>
                <section id="tab-linkedin" class="tabpane hidden">
                  <div class="panel">
                    <h2>LinkedIn signaal-inbox</h2>
                    <div class="source-note"><b>Gebruik:</b> plak hier een LinkedIn-post, profielwijziging of Sales Navigator-notitie. Het dashboard classificeert het lokaal en geeft een CGI-angle. De dagelijkse agent gebruikt daarnaast publieke LinkedIn-indexresultaten en optioneel een goedgekeurde feed via <code>LINKEDIN_SIGNAL_FEED_URL</code>.</div>
                    <p><b>Bedrijf</b></p><input id="manualCompany" placeholder="Bijv. Landal, Ahold Delhaize, HEMA" style="width:100%;margin-bottom:12px" />
                    <p><b>LinkedIn tekst of notitie</b></p><textarea id="manualText" placeholder="Plak hier tekst van een LinkedIn bedrijfspost, profielwijziging of medewerker-update..."></textarea>
                    <p><button onclick="scoreManualLinkedIn()">Score LinkedIn signaal</button></p>
                    <div id="manualResult" class="manual-result"></div>
                  </div>
                </section>
                <section id="tab-sources" class="tabpane hidden">
                  <div class="panel"><h2>Bronnen en beperkingen</h2><div class="source-note"><b>LinkedIn:</b> deze agent logt niet in op LinkedIn en scraped geen profielen. Hij gebruikt publieke zoekindex-snippets en kan worden uitgebreid met een goedgekeurde LinkedIn/API/feed-bron via een GitHub Secret.</div><div id="sourceInfo"></div></div>
                </section>
                <section id="tab-playbook" class="tabpane hidden"><div class="panel"><h2>Opportunity playbook</h2><div id="playbook"></div></div></section>
              </main>
            </div>
          
            <script id="radar-data" type="application/json">{data_json}</script>
            <script>
              const LOGIN_HASH = "{LOGIN_SHA256}";
              const DATA = JSON.parse(document.getElementById('radar-data').textContent);
              let activeTab = 'signals';
          
              async function sha256(text) {{
                const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
                return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
              }}
              async function login() {{
                const value = document.getElementById('loginCode').value;
                const hash = await sha256(value);
                if (hash === LOGIN_HASH) {{ localStorage.setItem('cgi_signal_radar_auth','ok'); showApp(); }}
                else {{ document.getElementById('loginError').textContent = 'Onjuiste login code.'; }}
              }}
              function logout() {{ localStorage.removeItem('cgi_signal_radar_auth'); location.reload(); }}
              function showApp() {{ document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; init(); }}
          
              function init() {{
                document.getElementById('runLocal').textContent = DATA.meta.run_local || '-';
                document.getElementById('runSettings').textContent = `{"$"}{{DATA.meta.accounts_scanned}} accounts gescand · lookback {"$"}{{DATA.meta.lookback_days}} dagen · minimumscore {"$"}{{DATA.meta.min_score}}`;
                document.getElementById('stats').innerHTML = [
                  ['Signalen', DATA.signals.length], ['Actie 48 uur', DATA.signals.filter(s=>s.priority==='Actie binnen 48 uur').length],
                  ['Unieke accounts', DATA.meta.unique_accounts], ['Ruwe inputregels', DATA.meta.raw_entries_in_yaml], ['LinkedIn actief', DATA.meta.include_linkedin_index ? 'Ja' : 'Nee']
                ].map(([l,n])=>`<div class="stat"><div class="num">{"$"}{{n}}</div><div class="lbl">{"$"}{{l}}</div></div>`).join('');
                const cats = [...new Set(DATA.signals.map(s=>s.category))].sort();
                document.getElementById('categoryFilter').innerHTML = '<option value="">Alle categorieën</option>' + cats.map(c=>`<option>{"$"}{{escapeHtml(c)}}</option>`).join('');
                renderSignals(); renderAccounts(); renderSources(); renderPlaybook();
              }}
              function setTab(tab) {{
                activeTab = tab;
                document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
                document.querySelectorAll('.tabpane').forEach(p=>p.classList.add('hidden'));
                document.getElementById('tab-'+tab).classList.remove('hidden');
              }}
              function escapeHtml(x) {{ return String(x ?? '').replace(/[&<>"']/g, m => ({{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}}[m])); }}
              function signalClass(score) {{ return score >= 80 ? 'high' : score >= 65 ? 'mid' : 'low'; }}
              function scoreClass(score) {{ return score >= 80 ? 'hot' : score >= 65 ? 'warm' : ''; }}
              function renderSignals() {{
                const q = document.getElementById('search').value.toLowerCase().trim();
                const cat = document.getElementById('categoryFilter').value;
                const pri = document.getElementById('priorityFilter').value;
                const filtered = DATA.signals.filter(s => (!cat || s.category===cat) && (!pri || s.priority===pri) && (!q || [s.company,s.title,s.summary,s.source,s.category,s.cgi].join(' ').toLowerCase().includes(q)));
                document.getElementById('signalsList').innerHTML = filtered.map(s => `
                  <article class="signal {"$"}{{signalClass(s.score)}}">
                    <div class="row"><div><div class="company">{"$"}{{escapeHtml(s.company)}}</div><div class="meta"><span>{"$"}{{escapeHtml(s.source_kind)}}</span><span>{"$"}{{escapeHtml(s.published_local)}}</span><span>Confidence: {"$"}{{escapeHtml(s.confidence)}}</span></div></div><div class="score {"$"}{{scoreClass(s.score)}}">{"$"}{{s.score}}</div></div>
                    <div><span class="badge red">{"$"}{{escapeHtml(s.priority)}}</span> <span class="badge purple">{"$"}{{escapeHtml(s.category)}}</span></div>
                    <div class="title">{"$"}{{escapeHtml(s.title)}}</div>
                    <div class="meta">Bron: {"$"}{{escapeHtml(s.source)}} · Hits: {"$"}{{(s.hits||[]).map(escapeHtml).join(', ')}}</div>
                    <details><summary>CGI-angle en actie</summary>
                      <div class="kv"><b>Waarom</b><span>{"$"}{{escapeHtml(s.why)}}</span></div>
                      <div class="kv"><b>CGI</b><span>{"$"}{{escapeHtml(s.cgi)}}</span></div>
                      <div class="kv"><b>Actie</b><span>{"$"}{{escapeHtml(s.action)}}</span></div>
                      <div class="kv"><b>Outreach</b><span>{"$"}{{escapeHtml(s.outreach)}}</span></div>
                    </details>
                    {"$"}{{s.url ? `<a class="button" href="{"$"}{{escapeHtml(s.url)}}" target="_blank" rel="noopener">Open bron</a>` : ''}}
                  </article>`).join('') || '<div class="panel"><h2>Geen signalen met deze filters</h2><p>Verlaag de minimumscore of vergroot de lookback-periode in de workflow-run.</p></div>';
              }}
              function renderAccounts() {{
                document.getElementById('accountsList').innerHTML = DATA.accounts.map(a => `<div class="account-line"><b>{"$"}{{escapeHtml(a.query_name)}}</b><br><span style="color:#666">{"$"}{{escapeHtml(a.name)}}</span>{"$"}{{a.aliases?.length ? `<br><span style="color:#5236ab">Aliases: {"$"}{{a.aliases.map(escapeHtml).join(', ')}}</span>` : ''}}</div>`).join('');
              }}
              function renderSources() {{
                document.getElementById('sourceInfo').innerHTML = `
                  <h3>Actieve bronlagen</h3>
                  <p><b>Nieuws:</b> Google News RSS op bedrijfsnaam + signaalwoorden.</p>
                  <p><b>LinkedIn bedrijfspagina's:</b> publieke zoekindexresultaten voor <code>site:linkedin.com/company</code>.</p>
                  <p><b>LinkedIn medewerkers:</b> publieke zoekindexresultaten voor <code>site:linkedin.com/in</code> rond CIO/CTO/CDO, data, architecture, POS, ERP en transformation rollen.</p>
                  <p><b>Optionele feed:</b> zet een GitHub Secret <code>LINKEDIN_SIGNAL_FEED_URL</code> naar een toegestane JSON-feed uit bijvoorbeeld LinkedIn API, Sales Navigator-export, CRM of handmatige enrichment.</p>
                  <h3>Laatste run errors</h3>
                  <p>{"$"}{{DATA.meta.errors?.length ? DATA.meta.errors.map(e=>`{"$"}{{escapeHtml(e.company)}} · {"$"}{{escapeHtml(e.source)}} · {"$"}{{escapeHtml(e.error)}}`).join('<br>') : 'Geen errors vastgelegd.'}}</p>`;
              }}
              function renderPlaybook() {{
                document.getElementById('playbook').innerHTML = DATA.categories.map(c => `<div class="panel"><h3>{"$"}{{escapeHtml(c.label)}}</h3><p><b>Waarom interessant:</b> {"$"}{{escapeHtml(c.why)}}</p><p><b>CGI-angle:</b> {"$"}{{escapeHtml(c.cgi)}}</p><p><b>Actie:</b> {"$"}{{escapeHtml(c.action)}}</p></div>`).join('');
              }}
              function scoreManualLinkedIn() {{
                const company = document.getElementById('manualCompany').value || 'Onbekend bedrijf';
                const text = document.getElementById('manualText').value || '';
                const lower = text.toLowerCase();
                let best = null;
                for (const c of DATA.categories) {{
                  const hits = c.keywords.filter(k => lower.includes(String(k).toLowerCase()));
                  if (hits.length) {{ const score = Math.min(100, 40 + hits.length*8 + (company ? 8 : 0)); if (!best || score > best.score) best = {{...c, hits, score}}; }}
                }}
                const el = document.getElementById('manualResult');
                if (!best) {{ el.innerHTML = '<div class="panel"><h3>Geen duidelijk signaal gevonden</h3><p>Voeg meer context toe, zoals rol, programma, overname, vacature, platform of technologie.</p></div>'; return; }}
                el.innerHTML = `<article class="signal {"$"}{{signalClass(best.score)}}"><div class="row"><div><div class="company">{"$"}{{escapeHtml(company)}}</div><div class="meta">Handmatige LinkedIn input</div></div><div class="score {"$"}{{scoreClass(best.score)}}">{"$"}{{best.score}}</div></div><span class="badge purple">{"$"}{{escapeHtml(best.label)}}</span><p><b>Hits:</b> {"$"}{{best.hits.map(escapeHtml).join(', ')}}</p><p><b>Waarom:</b> {"$"}{{escapeHtml(best.why)}}</p><p><b>CGI-angle:</b> {"$"}{{escapeHtml(best.cgi)}}</p><p><b>Actie:</b> {"$"}{{escapeHtml(best.action)}}</p></article>`;
              }}
              document.getElementById('loginCode').addEventListener('keydown', e => {{ if(e.key==='Enter') login(); }});
              if (localStorage.getItem('cgi_signal_radar_auth') === 'ok') showApp();
            </script>
          </body>
          </html>'''
              return html_doc
          
          
          def main():
              max_raw = os.getenv("MAX_COMPANIES", "ALL").strip()
              max_companies = None if not max_raw or max_raw.upper() == "ALL" else int(max_raw)
              lookback_days = int(os.getenv("LOOKBACK_DAYS", "21"))
              min_score = int(os.getenv("MIN_SCORE", "45"))
              include_linkedin_index = os.getenv("INCLUDE_LINKEDIN_INDEX", "true").lower() in ["1", "true", "yes", "ja"]
              raw_entries, companies, signals, meta = scan(max_companies, lookback_days, min_score, include_linkedin_index)
              site = Path("_site")
              site.mkdir(exist_ok=True)
              (site / ".nojekyll").write_text("", encoding="utf-8")
              (site / "index.html").write_text(generate_html(signals, companies, raw_entries, meta), encoding="utf-8")
              (site / "signals.json").write_text(json.dumps({"meta": meta, "signals": signals}, ensure_ascii=False, indent=2), encoding="utf-8")
              (site / "accounts.json").write_text(json.dumps({"accounts": companies, "raw_entries": raw_entries}, ensure_ascii=False, indent=2), encoding="utf-8")
              summary = [
                  "# CGI Business Opportunity Signal Radar",
                  "",
                  f"Run: {meta['run_local']}",
                  f"Ruwe regels in YAML: {meta['raw_entries_in_yaml']}",
                  f"Unieke accounts: {meta['unique_accounts']}",
                  f"Accounts gescand: {meta['accounts_scanned']}",
                  f"Signalen gepubliceerd: {meta['signals_published']}",
                  f"LinkedIn-index actief: {meta['include_linkedin_index']}",
                  "",
                  "## Top signalen",
              ]
              for s in signals[:15]:
                  summary.append(f"- **{s['score']}** | {s['company']} | {s['category']} | {s['title']}")
              if not signals:
                  summary.append("Geen signalen gevonden met de huidige filters.")
              Path(os.getenv("GITHUB_STEP_SUMMARY", "step-summary.md")).write_text("\n".join(summary), encoding="utf-8")
              print(json.dumps(meta, ensure_ascii=False, indent=2))
          
          if __name__ == "__main__":
              main()
