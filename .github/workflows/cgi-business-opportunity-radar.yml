name: CGI Retail IT Signal Radar V14 One YAML LinkedIn Scan

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Freshness window voor directe IT-vacatures in dagen"
        required: false
        default: "45"
      integration_lookback_days:
        description: "Freshness window voor gekwalificeerde M&A/formule-integratie"
        required: false
        default: "180"
      leadership_lookback_days:
        description: "Shelf-life voor CIO/CTO/CDO/Head of Data-signalen"
        required: false
        default: "210"
      program_lookback_days:
        description: "Shelf-life voor platform/POS/ERP/data/cloud-programma's"
        required: false
        default: "180"
      job_lookback_days:
        description: "Shelf-life voor concrete IT-vacatures"
        required: false
        default: "45"
      min_score:
        description: "Minimumscore voor publicatie"
        required: false
        default: "80"
      deep_scan_mode:
        description: "broad, broad_plus_rotating, all"
        required: false
        default: "broad_plus_rotating"
      max_company_deep_scans:
        description: "Aantal company-specific deep scans per run"
        required: false
        default: "100"
      max_queries:
        description: "Hard maximum aantal zoekqueries per run. Hoog gezet zodat LinkedIn URL-watchlist echt ruimte krijgt."
        required: false
        default: "3200"
      max_results_per_query:
        description: "Max resultaten per query/provider"
        required: false
        default: "10"
      include_linkedin_public_index:
        description: "Extra publieke LinkedIn company/post indexqueries. Watchlist URL scans staan hier los van."
        required: false
        default: "true"
      linkedin_watchlist_inline:
        description: "Optioneel: plak LinkedIn profiel-URL's hier als je geen CSV kunt uploaden. Voor scheduled runs zet je ze in het INLINE_LINKEDIN_URLS block in deze YAML."
        required: false
        default: ""
      linkedin_direct_fetch:
        description: "true = probeer publieke LinkedIn-profielpagina's URL-voor-URL te openen zonder login/cookies. Geen bypass; alleen publieke content."
        required: false
        default: "true"
      people_watchlist_mode:
        description: "off, rotating, all. all = alle URL's uit YAML/input/repo proberen te scannen binnen querybudget."
        required: false
        default: "all"
      max_people_watchlist_scans:
        description: "Aantal LinkedIn watchlist-profielen per run. Gebruik ALL voor alle URL's."
        required: false
        default: "ALL"
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cgi-retail-it-signal-radar-v13
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '45' }}
      INTEGRATION_LOOKBACK_DAYS: ${{ github.event.inputs.integration_lookback_days || '180' }}
      LEADERSHIP_LOOKBACK_DAYS: ${{ github.event.inputs.leadership_lookback_days || '210' }}
      PROGRAM_LOOKBACK_DAYS: ${{ github.event.inputs.program_lookback_days || '180' }}
      JOB_LOOKBACK_DAYS: ${{ github.event.inputs.job_lookback_days || '45' }}
      MIN_SCORE: ${{ github.event.inputs.min_score || '80' }}
      DEEP_SCAN_MODE: ${{ github.event.inputs.deep_scan_mode || 'broad_plus_rotating' }}
      MAX_COMPANY_DEEP_SCANS: ${{ github.event.inputs.max_company_deep_scans || '100' }}
      MAX_QUERIES: ${{ github.event.inputs.max_queries || '3200' }}
      MAX_RESULTS_PER_QUERY: ${{ github.event.inputs.max_results_per_query || '10' }}
      ENABLE_LINKEDIN_PUBLIC_INDEX: ${{ github.event.inputs.include_linkedin_public_index || 'true' }}
      ENABLE_LINKEDIN_DIRECT_FETCH: ${{ github.event.inputs.linkedin_direct_fetch || 'true' }}
      INLINE_LINKEDIN_URLS: ${{ github.event.inputs.linkedin_watchlist_inline || '' }}
      PEOPLE_WATCHLIST_MODE: ${{ github.event.inputs.people_watchlist_mode || 'all' }}
      MAX_PEOPLE_WATCHLIST_SCANS: ${{ github.event.inputs.max_people_watchlist_scans || 'ALL' }}
      ENABLE_RSS_FALLBACK: "true"
      ENABLE_GDELT: "true"
      DISCOVER_PEOPLE: "true"
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      LINKEDIN_SIGNAL_FEED_URL: ${{ secrets.LINKEDIN_SIGNAL_FEED_URL }}
      LINKEDIN_ALERTS_IMAP_HOST: ${{ secrets.LINKEDIN_ALERTS_IMAP_HOST }}
      LINKEDIN_ALERTS_IMAP_PORT: ${{ secrets.LINKEDIN_ALERTS_IMAP_PORT }}
      LINKEDIN_ALERTS_IMAP_USER: ${{ secrets.LINKEDIN_ALERTS_IMAP_USER }}
      LINKEDIN_ALERTS_IMAP_PASSWORD: ${{ secrets.LINKEDIN_ALERTS_IMAP_PASSWORD }}
      LINKEDIN_ALERTS_IMAP_FOLDER: ${{ secrets.LINKEDIN_ALERTS_IMAP_FOLDER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Persist pasted LinkedIn watchlist for future daily runs
        if: ${{ github.event.inputs.linkedin_watchlist_inline != '' }}
        shell: bash
        env:
          WATCHLIST_INPUT: ${{ github.event.inputs.linkedin_watchlist_inline }}
        run: |
          mkdir -p .radar
          printf "%s\n" "$WATCHLIST_INPUT" > .radar/linkedin-watchlist.txt

      - name: Write radar application
        shell: bash
        run: |
          cat > radar.py <<'PY'
          #!/usr/bin/env python3
