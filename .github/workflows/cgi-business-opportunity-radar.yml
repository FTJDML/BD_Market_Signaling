          TERM_CACHE = {}
          def strip_accents(s: str) -> str:
              return ''.join(c for c in unicodedata.normalize('NFKD', s) if not unicodedata.combining(c))

          def low(s: str) -> str:
              return strip_accents(str(s or '')).lower()

          def compact_spaces(s: str) -> str:
              return re.sub(r'\s+', ' ', str(s or '').strip())

          def canonical_company_key(name: str) -> str:
              n = low(name)
              n = re.sub(r'\([^)]*\)', ' ', n)
              n = re.sub(r'\b(b\.?v\.?|n\.?v\.?|u\.?a\.?|se|ltd|limited|holding|holdings|group|groep|the netherlands|netherlands|nederland|retail|international|europe|benelux|services|service|management|operations|bv|nv|cooperatie|cooperatief|stichting)\b', ' ', n)
              n = re.sub(r'[^a-z0-9&+]+', ' ', n)
              return compact_spaces(n)

          def has_term(text: str, term: str) -> bool:
              key = term
              if key not in TERM_CACHE:
                  # If term is short/acronym, require word-ish boundaries to avoid "ai" inside "retail".
                  t = re.escape(low(term)).replace('\\ ', r'\s+')
                  TERM_CACHE[key] = re.compile(r'(?<![a-z0-9])' + t + r'(?![a-z0-9])', re.I)
              return bool(TERM_CACHE[key].search(low(text)))

          def has_any(text: str, terms: list[str]) -> bool:
              return any(has_term(text, t) for t in terms)

          def matched_terms(text: str, terms: list[str]) -> list[str]:
              return [t for t in terms if has_term(text, t)]

          def domain_of(url: str) -> str:
              try: return urllib.parse.urlparse(url).netloc.lower().replace('www.', '')
              except Exception: return ''

          def path_of(url: str) -> str:
              try: return urllib.parse.urlparse(url).path.lower()
              except Exception: return ''

          def make_aliases(raw: str) -> list[str]:
              aliases = []
              clean = re.sub(r'\([^)]*\)', ' ', raw).strip()
              variants = [raw, clean]
              # Strip common legal/company words for a brand alias.
              base = canonical_company_key(raw)
              if base:
                  variants.append(base)
              # Keep pre-slash alternatives.
              for sep in ['/', '|', ' - ']:
                  if sep in raw:
                      variants.extend([x.strip() for x in raw.split(sep) if x.strip()])
              key = canonical_company_key(raw)
              for k, vals in MANUAL_ALIASES.items():
                  if k in key or key in k:
                      variants.extend(vals)
              for v in variants:
                  v = compact_spaces(v)
                  if not v: continue
                  # Remove legal suffixes from display aliases.
                  v2 = re.sub(r'\b(B\.?V\.?|N\.?V\.?|U\.?A\.?|Holding|Holdings|Group|Groep|Nederland|Netherlands|Retail|International|Europe|Benelux)\b', ' ', v, flags=re.I)
                  v2 = compact_spaces(v2)
                  for x in [v, v2]:
                      if len(x) >= 3 and low(x) not in {'bv','nv','group','holding','retail'}:
                          aliases.append(x)
              # Deduplicate; prefer longer aliases first to avoid "AH" matching too often.
              seen, out = set(), []
              for a in sorted(aliases, key=lambda z: (-len(z), low(z))):
                  k = low(a)
                  if k not in seen:
                      seen.add(k); out.append(a)
              return out[:10]

          def build_accounts() -> list[dict]:
              rows = [r.strip() for r in COMPANIES_RAW.splitlines() if r.strip()]
              if rows and low(rows[0]) == 'organisatie': rows = rows[1:]
              seen = {}
              for raw in rows:
                  key = canonical_company_key(raw)
                  if not key: continue
                  source_only = any(s in key for s in SOURCE_ONLY_NAMES)
                  aliases = make_aliases(raw)
                  if key in seen:
                      seen[key]['raw_count'] += 1
                      for a in aliases:
                          if low(a) not in [low(x) for x in seen[key]['aliases']]:
                              seen[key]['aliases'].append(a)
                      seen[key]['source_only'] = seen[key]['source_only'] and source_only
                  else:
                      seen[key] = {'name': raw, 'key': key, 'aliases': aliases, 'source_only': source_only, 'raw_count': 1}
              return list(seen.values())

          def is_blocked_source(item: dict) -> tuple[bool, str]:
              url = item.get('url',''); title = item.get('title','')
              d = domain_of(url); t = low(title)
              if any(b in d for b in BLOCKED_DOMAINS) or 'wikipedia' in t:
                  return True, 'blocked source: Wikipedia/social/non-evidence domain'
              return False, ''

          def source_confidence(url: str, source: str) -> str:
              d = domain_of(url)
              if source.lower().startswith('manual') or 'linkedin feed' in source.lower(): return 'Hoog'
              if any(x in d for x in STRONG_NEWS_DOMAINS): return 'Hoog'
              if any(x in url.lower() for x in JOB_DOMAINS): return 'Hoog'
              if 'linkedin.com' in d: return 'Middel'
              return 'Middel'

          def source_type(url: str, source: str) -> str:
              d = domain_of(url)
              if 'linkedin.com' in d: return 'LinkedIn feed / publieke index'
              if any(x in url.lower() for x in JOB_DOMAINS): return 'IT-vacaturebron'
              if source.lower().startswith('manual'): return 'Handmatig signaal'
              return 'Nieuws / publieke bron'

          def match_accounts(text: str, accounts: list[dict]) -> list[dict]:
              ltext = low(text)
              found = []
              for a in accounts:
                  if a.get('source_only'): continue
                  for alias in a['aliases']:
                      al = low(alias)
                      if len(al) < 4 and al not in {'ah'}:
                          continue
                      # For one-word aliases, require exact boundary.
                      if has_term(ltext, al):
                          found.append({**a, 'matched_alias': alias})
                          break
              # Prefer longest matched alias and dedupe by account key.
              dedup = {}
              for a in sorted(found, key=lambda x: -len(x.get('matched_alias',''))):
                  dedup.setdefault(a['key'], a)
              return list(dedup.values())

          def product_or_generic_reject(title: str, snippet: str, url: str) -> tuple[bool, str]:
              text = f'{title} {snippet}'
              p = path_of(url)
              # Reject product/consumer unless it explicitly contains IT vacancy or IT change.
              explicit_it = has_any(text, IT_ROLES) or (has_any(text, IT_LANDSCAPE_TERMS) and has_any(text, CHANGE_TERMS))
              if has_any(text, NOISE_TERMS) and not explicit_it:
                  return True, 'consumer/product/price/marketing content, not IT landscape signal'
              if any(x in p for x in ['/product', '/producten', '/category', '/categorie', '/assortiment', '/folder', '/aanbied', '/shop/']) and not explicit_it:
                  return True, 'product/category/folder URL path'
              if has_any(title, GENERIC_PAGE_TERMS) and not explicit_it and not (has_any(text, MA_TERMS) and has_any(text, SCALE_TERMS)):
                  return True, 'generic homepage/careers page without specific IT role or event'
              return False, ''

          def is_single_store(text: str) -> bool:
              if has_any(text, SINGLE_LOCATION_TERMS) and not has_any(text, ['alle vestigingen','meerdere vestigingen','keten','formule','hoofdkantoor']):
                  return True
              return False

          def classify_item(company: dict, item: dict) -> tuple[dict|None, str]:
              title = compact_spaces(item.get('title',''))
              snippet = compact_spaces(item.get('snippet',''))
              url = item.get('url','')
              source = item.get('source','')
              text = f'{title} {snippet}'
              if not title and not snippet: return None, 'empty item'
              blocked, reason = is_blocked_source(item)
              if blocked: return None, reason
              bad, reason = product_or_generic_reject(title, snippet, url)
              if bad: return None, reason
              if company.get('source_only'): return None, 'source-only vendor/supplier, not retail target'

              evidence = []
              category = ''
              strength = 'Direct'
              score = 0
              reason_short = ''

              it_role_hits = matched_terms(text, IT_ROLES)
              job_hits = matched_terms(text, JOB_TERMS)
              landscape_hits = matched_terms(text, IT_LANDSCAPE_TERMS)
              change_hits = matched_terms(text, CHANGE_TERMS)
              leadership_role_hits = matched_terms(text, LEADERSHIP_ROLES)
              leadership_event_hits = matched_terms(text, LEADERSHIP_EVENTS)
              ma_hits = matched_terms(text, MA_TERMS)
              tender_hits = matched_terms(text, TENDER_TERMS)
              security_hits = matched_terms(text, SECURITY_TERMS)

              # 1. Direct IT hiring/capability demand.
              if it_role_hits and (job_hits or any(x in low(url) for x in JOB_DOMAINS) or 'linkedin feed' in low(source)):
                  category = 'IT-vacature / capability demand'
                  evidence = it_role_hits[:5] + job_hits[:3]
                  score = 90
                  reason_short = 'specific IT/transformation role'
              # 2. Tender/RFP.
              elif tender_hits and (landscape_hits or it_role_hits):
                  category = 'IT-tender / RFP'
                  evidence = tender_hits + landscape_hits[:5]
                  score = 91
                  reason_short = 'tender/RFP with IT scope'
              # 3. Explicit landscape change.
              elif landscape_hits and change_hits:
                  category = 'Expliciete IT-landschap verandering'
                  evidence = landscape_hits[:6] + change_hits[:4]
                  score = 87
                  reason_short = 'IT platform/landscape change event'
              # 4. Vendor/platform choice. (Subset of landscape, but explicit vendor + change should be highlighted.)
              elif landscape_hits and has_any(text, ['kiest','selecteert','gekozen','partners with','samenwerking met']):
                  category = 'Vendor/platform keuze'
                  evidence = landscape_hits[:6]
                  score = 86
                  reason_short = 'vendor/platform choice'
              # 5. IT/digital leadership. CEO alone does not count.
              elif leadership_role_hits and leadership_event_hits:
                  category = 'IT/Digital leadership change'
                  evidence = leadership_role_hits[:4] + leadership_event_hits[:4]
                  score = 85
                  reason_short = 'IT/data/digital leadership event'
              # 6. Security/compliance event.
              elif security_hits and (change_hits or has_any(text, ['incident','aanval','datalek','ransomware','maturity','programma','audit'])):
                  category = 'Security/compliance IT-event'
                  evidence = security_hits + change_hits[:4]
                  score = 84
                  reason_short = 'security/compliance event'
              # 7. Qualified M&A / integration. Indirect, must be real retail/formula/chain change, not financial/consumer/single-store.
              elif ma_hits:
                  if has_any(text, FINANCIAL_ONLY_TERMS):
                      return None, 'financial-only M&A article, no IT-landscape trigger'
                  if is_single_store(text):
                      return None, 'single-store/franchise transaction, too small for CGI IT-landscape signal'
                  # Accept if scaled language exists, or if the title is an acquisition of a named formula/chain and not single-location.
                  scaled = has_any(text, SCALE_TERMS)
                  formula_like = bool(re.search(r'\b(overgenomen door|neemt over|acquired by|verkoopt alle vestigingen aan)\b', low(text)))
                  if not scaled and not formula_like:
                      return None, 'M&A term without scale/formula/integration evidence'
                  category = 'Gekwalificeerde M&A / formule-integratie'
                  strength = 'Indirect'
                  evidence = ma_hits + matched_terms(text, SCALE_TERMS)[:5]
                  score = 78 if scaled else 76
                  reason_short = 'qualified retail/formula integration event'
              else:
                  return None, 'no concrete IT-landscape, IT-role, IT-leadership, tender, security or qualified integration trigger'

              confidence = source_confidence(url, source)
              if confidence == 'Hoog': score += 4
              if source.lower().startswith('manual') or 'linkedin feed' in source.lower(): score += 5
              if strength == 'Indirect': score = min(score, 82)
              priority = 'Valideren deze week' if strength == 'Indirect' else ('Actie binnen 48 uur' if score >= 86 else 'Review deze week')
              why_map = {
                  'IT-vacature / capability demand': 'Een specifieke IT/transformatie-vacature is een sterk signaal dat er capaciteit of expertise nodig is.',
                  'IT-tender / RFP': 'Een tender/RFP met IT-scope is directe buying intent.',
                  'Expliciete IT-landschap verandering': 'Een benoemd platform-, data-, ERP-, POS-, cloud- of integratieprogramma wijst direct op IT-veranderwerk.',
                  'Vendor/platform keuze': 'Vendor- of platformkeuze leidt vaak tot integratie, migratie, testing, change en managed services.',
                  'IT/Digital leadership change': 'Nieuwe IT-, data- of digital-leiders bepalen vaak snel roadmap, prioriteiten en partnerbehoefte.',
                  'Security/compliance IT-event': 'Security- of compliance-events creëren urgentie rond remediation, IAM, governance en monitoring.',
                  'Gekwalificeerde M&A / formule-integratie': 'Retail/formule-integratie creëert vaak meerdere POS-, ERP-, CRM-, finance-, data- en integratielandschappen. Dit is een hypothese die eerst gevalideerd moet worden.'
              }
              cgi_map = {
                  'IT-vacature / capability demand': 'Business analysis, product ownership, architecture, data engineering, integration, testing, cloud/ERP/POS delivery squads en managed services.',
                  'IT-tender / RFP': 'Bid/no-bid review, solutioning, delivery model, pricing, partnerstrategie en proposal support.',
                  'Expliciete IT-landschap verandering': 'Roadmap, architecture, implementation, integration/API, data migration, testing, change, cloud en managed services.',
                  'Vendor/platform keuze': 'Implementation support, integration architecture, data migration, testing, change adoption, programme assurance en run/managed services.',
                  'IT/Digital leadership change': 'Executive briefing, 100-dagen IT roadmap, enterprise architecture, data/AI-strategie, programme assurance en delivery-capaciteit.',
                  'Security/compliance IT-event': 'Cyber assessment, IAM, SOC/MDR, cloud security, remediation, governance en compliance-programma\'s.',
                  'Gekwalificeerde M&A / formule-integratie': 'Post-merger IT integration, application rationalization, data migration, ERP/POS/CRM-harmonisatie, integratie-architectuur en change.'
              }
              action = 'Niet koud verkopen. Maak eerst een integratiehypothese en valideer welk POS/ERP/CRM/data-landschap geraakt wordt.' if strength == 'Indirect' else 'Maak een korte accountbrief met bewijs, hypothese, betrokken IT-landschap en één concrete CGI-haak.'
              if category == 'IT-vacature / capability demand':
                  action = 'Bekijk de vacaturedetails en koppel de rol aan een mogelijk programma. Zoek de hiring manager of IT-stakeholder.'
              signal = {
                  'id': hashlib.sha1(f"{company['key']}|{title}|{url}".encode()).hexdigest()[:12],
                  'company': company['name'], 'matched_alias': company.get('matched_alias',''), 'title': title, 'snippet': snippet, 'url': url,
                  'source': source, 'source_type': source_type(url, source), 'published': item.get('published',''), 'category': category,
                  'reason_short': reason_short, 'evidence_hits': sorted(set([e for e in evidence if e]))[:10],
                  'score': max(0, min(100, score)), 'priority': priority, 'confidence': confidence, 'strength': strength,
                  'why': why_map[category], 'cgi_angle': cgi_map[category], 'action': action,
                  'outreach': make_outreach(company['name'], title, category, strength)
              }
              return signal, 'accepted'

          def make_outreach(company: str, title: str, category: str, strength: str) -> str:
              if strength == 'Indirect':
                  return f"Ik zag een mogelijk integratiesignaal rond {company}: '{title}'. Ik zou dit niet direct als koopintentie behandelen, maar eerst valideren of POS, ERP, CRM, data, finance of integraties geraakt worden. Als dat zo is, kan CGI helpen met een compacte integratie-roadmap en delivery-aanpak."
              return f"Ik zag een concreet IT-landschap-signaal rond {company}: '{title}'. Dit valt onder {category}. CGI kan helpen met analyse, architectuur, integratie en delivery-capaciteit. Ik zou eerst kort valideren welk programma of team hierachter zit."

          def make_rejection(item: dict, company: dict|None, reason: str) -> dict:
              return {'company': (company or {}).get('name',''), 'title': item.get('title',''), 'url': item.get('url',''), 'source': item.get('source',''), 'reason': reason}

          def parse_search_result_date(row: dict) -> str:
              return row.get('published','')

          def brave_search(query: str, api_key: str, count: int = 25) -> list[dict]:
              if not api_key: return []
              params = urllib.parse.urlencode({'q': query, 'country': 'nl', 'search_lang': 'nl', 'count': str(min(count,20)), 'freshness': 'pm'})
              req = urllib.request.Request('https://api.search.brave.com/res/v1/web/search?' + params, headers={'Accept':'application/json','X-Subscription-Token': api_key})
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      data = json.loads(resp.read().decode('utf-8','replace'))
              except Exception as exc:
                  return [{'title':'SEARCH_ERROR', 'snippet':str(exc), 'url':'', 'source':'error', 'published':''}]
              out=[]
              for row in data.get('web',{}).get('results',[])[:count]:
                  out.append({'title': html.unescape(row.get('title','')), 'snippet': html.unescape(row.get('description','')), 'url': row.get('url',''), 'source':'Brave Search', 'published': row.get('age','')})
              return out

          def rss_search(query: str, count: int = 25) -> list[dict]:
              url = 'https://news.google.com/rss/search?' + urllib.parse.urlencode({'q': query, 'hl':'nl', 'gl':'NL', 'ceid':'NL:nl'})
              try:
                  with urllib.request.urlopen(url, timeout=18) as resp:
                      root = ET.fromstring(resp.read())
              except Exception as exc:
                  return [{'title':'RSS_ERROR', 'snippet':str(exc), 'url':'', 'source':'error', 'published':''}]
              items=[]
              for item in root.findall('./channel/item')[:count]:
                  title = html.unescape(item.findtext('title') or '')
                  link = item.findtext('link') or ''
                  desc = re.sub('<[^>]+>', ' ', item.findtext('description') or '')
                  pub = item.findtext('pubDate') or ''
                  items.append({'title': title, 'snippet': html.unescape(compact_spaces(desc)), 'url': link, 'source':'Google News RSS fallback', 'published': pub})
              return items

          def read_csv_items(path: Path, source_label: str) -> list[dict]:
              if not path.exists(): return []
              rows=[]
              with path.open('r', encoding='utf-8-sig', newline='') as f:
                  for r in csv.DictReader(f):
                      rows.append({'company': compact_spaces(r.get('company','')), 'person': compact_spaces(r.get('person','') or r.get('name','')), 'role': compact_spaces(r.get('role','')), 'title': compact_spaces(r.get('title','') or r.get('text','')[:120]), 'snippet': compact_spaces(r.get('text','') or r.get('summary','') or r.get('notes','')), 'url': compact_spaces(r.get('url','')), 'published': compact_spaces(r.get('date','') or r.get('published','')), 'source': source_label})
              return rows

          def read_people_watchlist(path: Path) -> list[dict]:
              if not path.exists(): return []
              with path.open('r', encoding='utf-8-sig', newline='') as f:
                  return [dict(r) for r in csv.DictReader(f)]

          def event_key(signal: dict) -> str:
              text = low(signal.get('title','') + ' ' + signal.get('snippet',''))
              if has_any(text, ['ranzijn']) and has_any(text, ['tuinland']): return 'ma:ranzijn-tuinland'
              base = signal.get('company','') + '|' + signal.get('category','') + '|'
              words = [w for w in re.sub(r'[^a-z0-9]+',' ',text).split() if w not in {'de','het','een','en','van','voor','door','met','naar','the','bij','in'}]
              return base + ' '.join(words[:12])

          def run_self_tests(accounts: list[dict]) -> None:
              def acc(name): return {'name': name, 'key': canonical_company_key(name), 'aliases': make_aliases(name), 'source_only': False, 'matched_alias': name}
              cases = [
                  (acc('DOC Kaas'), {'title':'Melkprijs DOC Kaas gecorrigeerd door fusie met Arla - Nieuwe Oogst','snippet':'Melkprijs DOC Kaas gecorrigeerd door fusie met Arla','url':'https://www.nieuweoogst.nl/melkprijs','source':'test'}, False, 'melkprijs'),
                  (acc('HEMA B.V.'), {'title':'HEMA - Wikipedia','snippet':'Het merk verkoopt elektrische apparaten','url':'https://nl.wikipedia.org/wiki/HEMA','source':'test'}, False, 'wikipedia'),
                  ({'name':'Sonos Europe B.V.','key':'sonos','source_only':True}, {'title':'Sonos speakers, soundbars en soundbases | MediaMarkt','snippet':'Een nieuw Sonos product kopen bij MediaMarkt','url':'https://www.mediamarkt.nl/category/sonos-speakers','source':'test'}, False, 'product'),
                  (acc('Bruna B.V.'), {'title':'Ter Overname: Bruna winkel in Vlissingen | Franchise+','snippet':'Bruna winkel in Vlissingen','url':'https://franchiseplus.nl/ter-overname-bruna-winkel-vlissingen','source':'test'}, False, 'single store'),
                  (acc('JYSK B.V.'), {'title':'JYSK folder | JYSK aanbiedingen van deze week','snippet':'meubels en woningdecoratie','url':'https://www.jysk.nl/folder','source':'test'}, False, 'folder'),
                  (acc('HEMA B.V.'), {'title':'Hema leent 60 mln aan Jumbo-familie Van Eerd voor eigen overname','snippet':'financiering','url':'https://fd.nl/bedrijfsleven/hema-leent','source':'test'}, False, 'financial'),
                  (acc('Coolblue B.V.'), {'title':'Over Coolblue - Coolblue','snippet':'Coolblue Energie-klanten krijgen korting','url':'https://www.coolblue.nl/over-coolblue','source':'test'}, False, 'about'),
                  (acc('Louwman Group'), {'title':'Paul de Krom vertrekt na drie jaar als ceo van Louwman Group','snippet':'ceo vertrekt','url':'https://www.automotive-online.nl/','source':'test'}, False, 'CEO-only'),
                  (acc('Ranzijn tuin & dier B.V.'), {'title':'Tuinland overgenomen door Ranzijn Tuin & Dier - mena.nl','snippet':'Tuinland overgenomen door Ranzijn Tuin & Dier','url':'https://mena.nl/artikel/tuinland-overgenomen-door-ranzijn-tuin-dier','source':'test'}, True, 'Ranzijn/Tuinland'),
                  (acc('Tuinland'), {'title':'Tuinland verkoopt alle vestigingen aan Ranzijn, hoofdkantoor in Assen sluit','snippet':'alle vestigingen','url':'https://www.rtvdrenthe.nl/nieuws/tuinland-ranzijn','source':'test'}, True, 'Tuinland all stores'),
                  (acc('Intergamma B.V.'), {'title':'Intergamma zoekt Business Analist Data Transformatie','snippet':'Vacature Business Analist voor data transformatie en SAP programma','url':'https://werkenbij.intergamma.nl/vacatures/business-analist-data-transformatie','source':'test'}, True, 'business analyst'),
                  (acc('HEMA B.V.'), {'title':'HEMA zoekt Product Owner POS','snippet':'Vacature voor Product Owner POS en checkout platform','url':'https://werkenbij.hema.nl/vacature/product-owner-pos','source':'test'}, True, 'POS vacancy'),
                  (acc('Ahold Delhaize'), {'title':'Ahold Delhaize benoemt Chief Data & AI Officer','snippet':'nieuwe Chief Data & AI Officer aangesteld','url':'https://newsroom.aholddelhaize.com/chief-data-ai-officer','source':'test'}, True, 'data leader'),
                  (acc('Retailer B.V.'), {'title':'Retailer kiest SAP S/4HANA voor ERP-transformatie','snippet':'SAP S/4HANA migratie en ERP programma','url':'https://www.consultancy.nl/news/sap-s4hana-retailer','source':'test'}, True, 'SAP transform'),
              ]
              failures=[]
              for company,item,expected,label in cases:
                  signal,reason = classify_item(company,item)
                  if bool(signal) != expected:
                      failures.append({'case':label,'expected':expected,'got':bool(signal),'reason':reason,'signal':signal})
              # Account alias self-test: exact legal names should not be required.
              ranzijn_text = 'Tuinland overgenomen door Ranzijn Tuin & Dier'
              matched = match_accounts(ranzijn_text, accounts)
              if not any('ranzijn' in low(a['name']) or 'tuinland' in low(a['name']) for a in matched):
                  failures.append({'case':'alias matching Ranzijn/Tuinland','expected':True,'got':False,'matched':matched[:3]})
              if failures:
                  print(json.dumps({'self_test_failures': failures}, ensure_ascii=False, indent=2)); raise SystemExit(1)

          def collect_items(accounts: list[dict], api_key: str, rss_enabled: bool, include_linkedin: bool, max_results: int) -> tuple[list[dict], list[dict], dict]:
              queries = list(SIGNAL_QUERIES)
              if include_linkedin: queries.extend(LINKEDIN_QUERIES)
              items, rejected = [], []
              stats = {'queries_run':0, 'items_seen':0, 'items_matched_target':0, 'search_errors':0}
              for label, query in queries:
                  stats['queries_run'] += 1
                  if api_key:
                      found = brave_search(query, api_key, max_results)
                  elif rss_enabled:
                      found = rss_search(query, max_results)
                  else:
                      found = []
                  for it in found:
                      if it.get('title') in {'SEARCH_ERROR','RSS_ERROR'}:
                          stats['search_errors'] += 1; rejected.append(make_rejection(it, None, it.get('snippet','search error'))); continue
                      stats['items_seen'] += 1
                      it['query_label'] = label
                      matches = match_accounts(it.get('title','') + ' ' + it.get('snippet',''), accounts)
                      if not matches:
                          rejected.append(make_rejection(it, None, 'geen match met target-account/alias uit jouw lijst'))
                          continue
                      stats['items_matched_target'] += len(matches)
                      for m in matches:
                          items.append((m, it))
                  time.sleep(0.15)
              return items, rejected, stats

          def process_items(pairs: list[tuple[dict,dict]], min_score: int) -> tuple[list[dict], list[dict]]:
              signals, rejected = [], []
              for company, item in pairs:
                  signal, reason = classify_item(company, item)
                  if signal and signal['score'] >= min_score:
                      signals.append(signal)
                  else:
                      rejected.append(make_rejection(item, company, reason if not signal else 'below minimum score'))
              # Deduplicate by event, keep highest score + strongest source.
              best = {}
              for s in signals:
                  k = event_key(s)
                  if k not in best or s['score'] > best[k]['score']:
                      best[k] = s
              out = sorted(best.values(), key=lambda s: (s['strength']!='Direct', -s['score'], s.get('company','')))
              return out, rejected

          def build_dashboard(data: dict) -> str:
              payload = json.dumps(data, ensure_ascii=False)
              return """<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CGI IT Landscape Signal Radar</title><style>
          :root{--red:#e31937;--purple:#5236ab;--black:#000;--white:#fff;--soft:#f6f4fb;--line:#e8e4ef;--text:#111;--muted:#68606f;--ok:#0f7b45;--warn:#a66300}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:var(--text)}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#e31937 0%,#a82465 48%,#5236ab 100%);padding:24px}.login-card{background:#fff;border-radius:24px;padding:34px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)}.brand{font-weight:800;letter-spacing:.02em;color:#000;font-size:18px;margin-bottom:8px}h1{font-size:30px;line-height:1.05;margin:0 0 12px}p{line-height:1.45}input,select{padding:14px 16px;border:1px solid var(--line);border-radius:12px;font-size:16px}input{width:100%}button{background:var(--red);color:#fff;border:0;border-radius:999px;padding:12px 18px;font-weight:700;cursor:pointer}.app{display:none}.top{background:#000;color:#fff;padding:22px 28px}.top h1{font-size:28px;margin:0 0 6px}.top p{margin:0;color:#ddd}.bar{height:8px;background:linear-gradient(90deg,#e31937,#a82465,#5236ab)}.wrap{padding:22px 28px;max-width:1500px;margin:0 auto}.grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:18px}.metric{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}.metric b{display:block;font-size:30px;margin-top:4px}.metric span{color:var(--muted);font-size:13px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 18px}.tab{border:1px solid var(--line);background:#fff;color:#111;padding:10px 14px;border-radius:999px}.tab.active{background:var(--purple);color:#fff;border-color:var(--purple)}.panel{display:none}.panel.active{display:block}.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.filters input,.filters select{max-width:360px}.card{border:1px solid var(--line);border-radius:20px;padding:18px;margin:13px 0;background:#fff;box-shadow:0 4px 18px rgba(82,54,171,.06)}.card.indirect{border-left:6px solid var(--purple)}.card.direct{border-left:6px solid var(--red)}.row{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}.title{font-size:18px;font-weight:800;margin:6px 0}.meta{color:var(--muted);font-size:13px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;margin:2px 4px 2px 0;font-size:12px;font-weight:700;background:var(--soft);color:#2d2148}.pill.red{background:#fde8ec;color:#9a0c21}.pill.purple{background:#ede8ff;color:#39207e}.pill.green{background:#e8f6ef;color:#075c35}.score{min-width:82px;text-align:center;border-radius:18px;padding:10px;background:#000;color:#fff}.score b{font-size:28px;display:block}.section{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}.section h3{font-size:13px;color:var(--purple);text-transform:uppercase;letter-spacing:.04em;margin:0 0 6px}.empty{background:var(--soft);border:1px dashed var(--purple);padding:22px;border-radius:20px;color:#2d2148}.table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}.table th,.table td{border-bottom:1px solid var(--line);text-align:left;padding:10px;font-size:13px;vertical-align:top}.table th{background:var(--soft)}code,pre{background:#f3f1f7;border:1px solid var(--line);border-radius:10px;padding:2px 6px}pre{padding:12px;overflow:auto}.reason{color:var(--muted);font-size:12px}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.row{display:block}.score{margin-top:12px}.wrap{padding:16px}.top{padding:18px}.filters input,.filters select{max-width:100%}}
          </style></head><body><div id="login" class="login"><div class="login-card"><div class="brand">CGI</div><h1>IT Landscape Signal Radar</h1><p>Alleen concrete IT-landschap-signalen voor Retail & Consumer Services. Geen Wikipedia, productpagina's, consumentennieuws of melkprijs.</p><input id="code" type="password" placeholder="Login code"><p><button onclick="login()">Open radar</button></p><p id="loginMsg" style="color:#e31937;font-weight:700"></p></div></div><div id="app" class="app"><div class="bar"></div><header class="top"><h1>CGI IT Landscape Signal Radar</h1><p>Calibrated strict: directe IT-signalen + gekwalificeerde formule-/ketenintegratie. Default: liever niets dan bullshit.</p></header><main class="wrap"><div class="grid" id="metrics"></div><div class="tabs" id="tabs"></div><div id="panels"></div></main></div><script id="payload" type="application/json">""" + html.escape(payload) + """</script><script>
          const DATA=JSON.parse(document.getElementById('payload').textContent);const LOGIN=DATA.meta.login_code;function esc(s){return String(s??'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}function login(){const v=document.getElementById('code').value;if(v===LOGIN){sessionStorage.setItem('bd_signal_login','1');showApp();}else{document.getElementById('loginMsg').textContent='Onjuiste code';}}function showApp(){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';render();}if(sessionStorage.getItem('bd_signal_login')==='1')showApp();function metric(l,v){return '<div class="metric"><span>'+esc(l)+'</span><b>'+esc(v)+'</b></div>';}function render(){document.getElementById('metrics').innerHTML=[metric('Gepubliceerde signalen',DATA.signals.length),metric('Gescannde queries',DATA.meta.queries_run),metric('Zoekresultaten gezien',DATA.meta.items_seen),metric('Target matches',DATA.meta.items_matched_target),metric('Drempel',DATA.meta.min_score)].join('');const tabs=['Signalen','Coverage','Afgewezen','IT beslissers','Setup'];document.getElementById('tabs').innerHTML=tabs.map(function(t,i){return '<button class="tab '+(i===0?'active':'')+'" onclick="tab('+i+')">'+esc(t)+'</button>';}).join('');document.getElementById('panels').innerHTML=tabs.map(function(t,i){return '<section class="panel '+(i===0?'active':'')+'" id="p'+i+'">'+panel(t)+'</section>';}).join('');}function tab(i){document.querySelectorAll('.tab').forEach(function(e,j){e.classList.toggle('active',i===j);});document.querySelectorAll('.panel').forEach(function(e,j){e.classList.toggle('active',i===j);});}function panel(t){if(t==='Signalen')return signalPanel();if(t==='Coverage')return coveragePanel();if(t==='Afgewezen')return rejectedPanel();if(t==='IT beslissers')return peoplePanel();return setupPanel();}function pill(text,cls){return '<span class="pill '+(cls||'')+'">'+esc(text)+'</span>';}function signalPanel(){if(!DATA.signals.length)return '<div class="empty"><b>Geen concrete signalen boven de drempel.</b><br>Dat kan kloppen, maar check Coverage. Als queries of target matches 0 zijn, is dit een dekkingprobleem, geen marktconclusie. Voeg een Brave Search API key of handmatige feeds toe.</div>';var cats=[...new Set(DATA.signals.map(function(s){return s.category;}))].map(function(c){return '<option>'+esc(c)+'</option>';}).join('');return '<div class="filters"><input id="q" placeholder="Zoek bedrijf, titel, categorie..." oninput="filterSignals()"><select id="cat" onchange="filterSignals()"><option value="">Alle categorieën</option>'+cats+'</select></div><div id="signalList">'+DATA.signals.map(card).join('')+'</div>';}function card(s){var cls=s.strength==='Indirect'?'indirect':'direct';var hits=(s.evidence_hits||[]).map(function(h){return pill(h,'');}).join('');return '<article class="card '+cls+'" data-search="'+esc((s.company+' '+s.title+' '+s.category).toLowerCase())+'" data-cat="'+esc(s.category)+'"><div class="row"><div><div>'+pill(s.strength,s.strength==='Indirect'?'purple':'red')+pill(s.category,'')+pill(s.confidence,'green')+'</div><div class="title">'+esc(s.company)+' — '+esc(s.title)+'</div><div class="meta">Matched alias: '+esc(s.matched_alias||'')+' · '+esc(s.source_type)+' · '+esc(s.published||'datum onbekend')+' · <a href="'+esc(s.url)+'" target="_blank" rel="noopener">Open bron</a></div><div>'+hits+'</div></div><div class="score"><b>'+esc(s.score)+'</b><span>'+esc(s.priority)+'</span></div></div><div class="section"><h3>Waarom</h3><p>'+esc(s.why)+'</p></div><div class="section"><h3>CGI-angle</h3><p>'+esc(s.cgi_angle)+'</p></div><div class="section"><h3>Actie</h3><p>'+esc(s.action)+'</p></div><div class="section"><h3>Outreach draft</h3><p>'+esc(s.outreach)+'</p></div></article>';}function filterSignals(){const q=(document.getElementById('q').value||'').toLowerCase();const c=document.getElementById('cat').value;document.querySelectorAll('#signalList .card').forEach(function(el){el.style.display=(!q||el.dataset.search.includes(q))&&(!c||el.dataset.cat===c)?'block':'none';});}function coveragePanel(){return '<div class="card"><h2>Coverage</h2><p>Versie: <b>'+esc(DATA.meta.version)+'</b><br>Laatste run: <b>'+esc(DATA.meta.generated_at_local)+'</b><br>Ruwe inputregels: <b>'+esc(DATA.meta.raw_accounts)+'</b><br>Unieke monitoraccounts: <b>'+esc(DATA.meta.unique_accounts)+'</b><br>Source-only/vendor accounts niet als retail target gescand: <b>'+esc(DATA.meta.source_only_accounts)+'</b><br>Zoekmethode: <b>'+esc(DATA.meta.search_method)+'</b><br>Zoekqueries: <b>'+esc(DATA.meta.queries_run)+'</b><br>Zoekresultaten gezien: <b>'+esc(DATA.meta.items_seen)+'</b><br>Resultaten met targetmatch: <b>'+esc(DATA.meta.items_matched_target)+'</b><br>Search errors: <b>'+esc(DATA.meta.search_errors)+'</b></p><p><b>Belangrijk:</b> deze versie gebruikt aliassen/merknamen. Dus Ranzijn tuin & dier B.V. kan matchen op Ranzijn of Ranzijn Tuin & Dier; HEMA B.V. op HEMA; Intergamma op Gamma/Karwei.</p><h3>Afwijsredenen top 15</h3><pre>'+esc(JSON.stringify(DATA.meta.reject_reasons,null,2))+'</pre></div>';}function rejectedPanel(){var rows=DATA.rejected.slice(0,400).map(function(r){return '<tr><td>'+esc(r.company||'')+'</td><td>'+esc(r.title)+'</td><td>'+esc(r.reason)+'</td><td><a href="'+esc(r.url)+'" target="_blank">bron</a></td></tr>';}).join('');return '<table class="table"><thead><tr><th>Bedrijf</th><th>Titel</th><th>Waarom afgewezen</th><th>Bron</th></tr></thead><tbody>'+rows+'</tbody></table>';}function peoplePanel(){if(!DATA.people.length)return '<div class="empty">Geen people-watchlist gevonden. Voeg <code>data/people-watchlist.csv</code> toe met company,name,role,linkedin_url,priority,notes.</div>';var rows=DATA.people.map(function(p){return '<tr><td>'+esc(p.company)+'</td><td>'+esc(p.name)+'</td><td>'+esc(p.role)+'</td><td>'+esc(p.priority||'')+'</td><td><a href="'+esc(p.linkedin_url||'')+'" target="_blank">LinkedIn</a></td></tr>';}).join('');return '<table class="table"><thead><tr><th>Bedrijf</th><th>Naam</th><th>Rol</th><th>Prio</th><th>Link</th></tr></thead><tbody>'+rows+'</tbody></table>';}function setupPanel(){return '<div class="card"><h2>Setup</h2><p>Voor automatische websignalering is <code>BRAVE_SEARCH_API_KEY</code> het beste. Zonder key gebruikt de radar Google News RSS-fallback; die ziet vooral nieuws/M&A, niet alle vacatures en LinkedIn-posts.</p><pre>Secrets:\nBRAVE_SEARCH_API_KEY\nLINKEDIN_SIGNAL_FEED_URL optioneel</pre><p>Handmatige feeds:</p><pre>data/manual-signals.csv\ncolumns: date,company,title,url,source,text\n\ndata/linkedin-signals.csv\ncolumns: date,company,person,role,url,text\n\ndata/people-watchlist.csv\ncolumns: company,name,role,linkedin_url,priority,notes</pre><p><b>Hard filter:</b> Wikipedia, productpagina\'s, consumentenaanbiedingen, melkprijs/commodity-artikelen, single-store franchiseverkopen en CEO-only items zonder IT-context worden afgewezen.</p></div>';}
          </script></body></html>"""

          def run() -> None:
              min_score = int(os.getenv('MIN_SCORE','76') or '76')
              max_results = int(os.getenv('MAX_RESULTS_PER_QUERY','25') or '25')
              include_linkedin = (os.getenv('INCLUDE_LINKEDIN_PUBLIC_INDEX','false') or 'false').lower() == 'true'
              rss_enabled = (os.getenv('ENABLE_RSS_FALLBACK','true') or 'true').lower() == 'true'
              api_key = os.getenv('BRAVE_SEARCH_API_KEY','').strip()
              accounts = build_accounts()
              run_self_tests(accounts)

              Path('_site').mkdir(exist_ok=True)
              Path('data').mkdir(exist_ok=True)
              manual = read_csv_items(Path('data/manual-signals.csv'), 'Manual signal feed')
              linkedin = read_csv_items(Path('data/linkedin-signals.csv'), 'LinkedIn feed')
              people = read_people_watchlist(Path('data/people-watchlist.csv'))

              # Optional external signal feed.
              feed_url = os.getenv('LINKEDIN_SIGNAL_FEED_URL','').strip()
              if feed_url:
                  try:
                      with urllib.request.urlopen(feed_url, timeout=20) as resp:
                          data = json.loads(resp.read().decode('utf-8','replace'))
                      for row in data.get('signals',[]):
                          linkedin.append({'company': row.get('company',''), 'person': row.get('person',''), 'role': row.get('role',''), 'title': row.get('title','') or row.get('signal','') or row.get('text','')[:120], 'snippet': row.get('summary','') or row.get('text','') or row.get('signal',''), 'url': row.get('url',''), 'published': row.get('date','') or row.get('published',''), 'source':'LinkedIn feed URL'})
                  except Exception as exc:
                      manual.append({'company':'Feed','title':'LINKEDIN_SIGNAL_FEED_URL error','snippet':str(exc),'url':feed_url,'source':'error','published':''})

              rejected = []
              # Manual/LinkedIn feed items can provide company explicitly, so classify them directly.
              manual_pairs = []
              account_by_key = {a['key']: a for a in accounts}
              for item in manual + linkedin:
                  key = canonical_company_key(item.get('company',''))
                  company = account_by_key.get(key) or ({**next((a for a in accounts if any(low(item.get('company','')) == low(al) for al in a['aliases'])), {'name': item.get('company',''), 'key': key, 'aliases':[item.get('company','')], 'source_only':False})})
                  company = {**company, 'matched_alias': item.get('company','')}
                  manual_pairs.append((company, item))

              search_pairs, search_rejected, stats = collect_items(accounts, api_key, rss_enabled, include_linkedin, max_results)
              all_pairs = manual_pairs + search_pairs
              signals, rejected2 = process_items(all_pairs, min_score)
              rejected.extend(search_rejected + rejected2)

              reason_counts = Counter(r.get('reason','') for r in rejected)
              raw_rows = [r.strip() for r in COMPANIES_RAW.splitlines() if r.strip()]
              raw_count = max(0, len(raw_rows)-1 if raw_rows and low(raw_rows[0]) == 'organisatie' else len(raw_rows))
              meta = {
                  'version': VERSION, 'login_code': LOGIN_CODE,
                  'generated_at_local': NOW_UTC.astimezone(LOCAL_TZ).strftime('%d-%m-%Y %H:%M Europe/Amsterdam'),
                  'raw_accounts': raw_count, 'unique_accounts': len(accounts), 'source_only_accounts': sum(1 for a in accounts if a.get('source_only')),
                  'min_score': min_score, 'search_method': 'Brave Search API' if api_key else ('Google News RSS fallback' if rss_enabled else 'manual feeds only'),
                  'queries_run': stats.get('queries_run',0), 'items_seen': stats.get('items_seen',0), 'items_matched_target': stats.get('items_matched_target',0), 'search_errors': stats.get('search_errors',0),
                  'reject_reasons': dict(reason_counts.most_common(15))
              }
              data = {'meta': meta, 'signals': signals, 'rejected': rejected[:1200], 'people': people, 'accounts_sample': accounts[:50]}
              Path('_site/signals.json').write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding='utf-8')
              Path('_site/index.html').write_text(build_dashboard(data), encoding='utf-8')
              summary = [
                  '# CGI IT Landscape Signal Radar V8', '',
                  f'- Signals: {len(signals)}', f'- Queries: {meta["queries_run"]}', f'- Items seen: {meta["items_seen"]}', f'- Target matches: {meta["items_matched_target"]}',
                  f'- Search method: {meta["search_method"]}', '',
                  'Deze radar publiceert alleen directe IT-landschap-signalen of gekwalificeerde formule-/ketenintegratie.'
              ]
              Path('_site/README.txt').write_text('\n'.join(summary), encoding='utf-8')
              print('\n'.join(summary))

          if __name__ == '__main__':
              run()
          PY

      - name: Run radar
        shell: bash
        env:
          MIN_SCORE: ${{ github.event.inputs.min_score || '76' }}
          MAX_RESULTS_PER_QUERY: ${{ github.event.inputs.max_results_per_query || '25' }}
          INCLUDE_LINKEDIN_PUBLIC_INDEX: ${{ github.event.inputs.include_linkedin_public_index || 'false' }}
          ENABLE_RSS_FALLBACK: ${{ github.event.inputs.enable_rss_fallback || 'true' }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          LINKEDIN_SIGNAL_FEED_URL: ${{ secrets.LINKEDIN_SIGNAL_FEED_URL }}
        run: |
          python -m py_compile radar.py
          python radar.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
