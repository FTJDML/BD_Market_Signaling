name: CGI IT Landscape Signal Radar V8 Calibrated

on:
  workflow_dispatch:
    inputs:
      min_score:
        description: "Minimumscore. 76 toont gekwalificeerde M&A/formule-integratie; 86 toont vooral directe IT-signalen."
        required: false
        default: "76"
      max_results_per_query:
        description: "Aantal zoekresultaten per signaalquery"
        required: false
        default: "25"
      include_linkedin_public_index:
        description: "Publieke LinkedIn zoekindex gebruiken. Advies: false; gebruik liever linkedin-signals.csv."
        required: false
        default: "false"
      enable_rss_fallback:
        description: "Google News RSS fallback gebruiken als er geen Brave API key is."
        required: false
        default: "true"
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cgi-it-landscape-signal-radar-v8
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write radar application
        shell: bash
        run: |
          cat > radar.py <<'PY'

