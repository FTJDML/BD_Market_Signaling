                  f"Dit lijkt te raken aan {category['label'].lower()}. "
                  f"CGI helpt retailers en consumer-services organisaties juist bij de vertaling van dit soort business events naar uitvoerbare IT-roadmaps en delivery. "
                  f"Zou het nuttig zijn om kort te toetsen waar de grootste complexiteit zit?"
              )
          
          
          def company_terms(company: dict):
              terms = [company["query_name"]]
              terms += company.get("aliases", [])[:3]
              clean = []
              for term in terms:
                  term = clean_query_name(term)
                  if len(term) >= 3 and term.lower() not in [x.lower() for x in clean]:
                      clean.append(term)
              return clean[:3]
          
          
          def source_query(source_def: dict, company: dict):
              terms = company_terms(company)
              term = terms[0] if terms else company["query_name"]
              return source_def["query"].format(term=term)
          
          
          def item_to_signal(company, item, classified, now_utc):
              category = classified["category"]
              published_dt = parse_date(item.get("published_raw", ""))
              if published_dt and published_dt.tzinfo is None:
                  published_dt = published_dt.replace(tzinfo=dt.timezone.utc)
              text_lower = f"{item['title']} {item.get('summary','')}".lower()
              company_bonus = 10 if any(t.lower() in text_lower for t in company_terms(company)) else 0
              source_kind_bonus = 6 if item.get("source_id", "").startswith("linkedin") else 0
              owned_bonus = 5 if any(h in (item.get("url","")+" "+item.get("source","")).lower() for h in OWNED_SOURCE_HINTS) else 0
              score = min(100, int(16 + classified["strength"] + freshness_points(published_dt, now_utc) + company_bonus + source_kind_bonus + owned_bonus))
              local = "Onbekende datum"
              iso = ""
              if published_dt:
                  local_dt = published_dt.astimezone(ZoneInfo("Europe/Amsterdam"))
                  local = local_dt.strftime("%d-%m-%Y %H:%M")
                  iso = local_dt.isoformat()
              signal = {
                  "id": hashlib.sha1((company["id"] + item.get("url", "") + item.get("title", "")).encode("utf-8", "ignore")).hexdigest()[:16],
                  "company": company["name"],
                  "query_name": company["query_name"],
                  "title": item["title"],
                  "summary": item.get("summary", ""),
                  "url": item.get("url", ""),
                  "source": item.get("source", ""),
                  "source_kind": item.get("source_kind", ""),
                  "source_id": item.get("source_id", ""),
                  "published": iso,
                  "published_local": local,
                  "category": category["label"],
                  "category_id": category["id"],
                  "hits": classified["hits"],
                  "score": score,
                  "priority": priority(score),
                  "why": category["why"],
                  "cgi": category["cgi"],
                  "action": category["action"],
                  "outreach": build_outreach(company["name"], category, item["title"]),
              }
              signal["confidence"] = confidence(signal)
              return signal, published_dt
          
          
