          def slugify(value: str) -> str:
              value = value.lower().strip()
              value = re.sub(r"[’']", "", value)
              value = re.sub(r"[^a-z0-9À-ÿ]+", "-", value)
              value = re.sub(r"-+", "-", value).strip("-")
              return value or hashlib.sha1(value.encode()).hexdigest()[:8]


          def norm_text(value: str) -> str:
              value = html.unescape(value or "").lower()
              value = re.sub(r"[’']", "'", value)
              value = re.sub(r"[\u2010-\u2015]", "-", value)
              value = re.sub(r"\s+", " ", value)
              return value.strip()


          def norm_key(value: str) -> str:
              original = norm_text(value)
              value = re.sub(r"\b(b\.?v\.?|n\.?v\.?|bv|nv|holding|holdings|groep|group|nederland|netherlands|international|retail|services|beheer|topco|u\.?a\.?|b\.?a\.?)\b", " ", original)
              value = re.sub(r"\s+", " ", value).strip()
              return value or original


          def clean_query_name(raw: str) -> str:
              s = raw.strip()
              s = re.sub(r"\s*\(.*?\)\s*", " ", s)
              if " / " in s:
                  s = s.split(" / ")[0]
              s = re.sub(r"(?i)\bB\s*\.?\s*V\s*\.?", "", s)
              s = re.sub(r"(?i)\bN\s*\.?\s*V\s*\.?", "", s)
              s = re.sub(r"(?i)\bB\s*\.?\s*A\s*\.?", "", s)
              s = re.sub(r"(?i)\bU\s*\.?\s*A\s*\.?", "", s)
              s = re.sub(r"\b(exacte naam via CI|kies juiste entiteit in CI)\b", "", s, flags=re.I)
              s = re.sub(r"\s+", " ", s).strip(" -,.•")
              return s or raw.strip()


          def account_status(name: str, query_name: str) -> str:
              text = norm_text(name + " " + query_name)
              if any(p in text for p in SOURCE_ONLY_VENDOR_PATTERNS):
                  return "source-only vendor"
              return "target candidate"


          def parse_companies(raw: str):
              raw_entries = []
              for line in raw.splitlines():
                  name = line.strip()
                  if not name or name.lower() == "organisatie":
                      continue
                  raw_entries.append(name)
              seen = {}
              for idx, name in enumerate(raw_entries, start=1):
                  q = clean_query_name(name)
                  key = norm_key(q) or norm_key(name)
                  if key not in seen:
                      aliases = []
                      for k, vals in MANUAL_ALIASES.items():
                          if k in key or key in k:
                              aliases.extend(vals)
                      status = account_status(name, q)
                      seen[key] = {
                          "id": slugify(key),
                          "name": name,
                          "query_name": q,
                          "raw_entries": [name],
                          "aliases": sorted(set([a for a in aliases if a.lower() != q.lower()])),
                          "first_seen_line": idx,
                          "status": status,
                          "scan_enabled": status == "target candidate",
                      }
                  else:
                      if name not in seen[key]["raw_entries"]:
                          seen[key]["raw_entries"].append(name)
              companies = list(seen.values())
              companies.sort(key=lambda c: c["query_name"].lower())
              return raw_entries, companies


          def company_terms(company: dict):
              terms = [company.get("query_name", ""), clean_query_name(company.get("name", ""))]
              terms += company.get("aliases", [])[:5]
              clean = []
              for term in terms:
                  term = clean_query_name(term)
                  if len(term) >= 2 and term.lower() not in [x.lower() for x in clean]:
                      clean.append(term)
              return clean[:6]


          def item_mentions_company(company: dict, title: str, summary: str, url: str) -> bool:
              visible = f"{title} {summary} {url}"
              visible_norm = norm_text(visible)
              for term in company_terms(company):
                  t = term.strip()
                  if not t:
                      continue
                  tl = norm_text(t)
                  # Ambiguous short brands must appear as a word, preferably with original capitalization somewhere.
                  if len(tl) <= 5 or tl in AMBIGUOUS_BRANDS:
                      if re.search(r"\b" + re.escape(t) + r"\b", visible):
                          return True
                      if re.search(r"\b" + re.escape(tl) + r"\b", visible_norm):
                          # Accept common all-caps brands, but avoid lowercase generic words where possible.
                          if t.isupper() or tl in {"hema", "kfc", "aldi", "jysk", "xenos", "karwei", "bol"}:
                              return True
                          continue
                  else:
                      if tl in visible_norm:
                          return True
              return False


          def contains_any(text: str, terms):
              return [t for t in terms if t.lower() in text]


          def fetch_url(url: str, timeout=12) -> bytes:
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0 (compatible; CGI-Business-Signal-Radar-Strict/3.0; +https://github.com/)"
              })
              with urllib.request.urlopen(req, timeout=timeout) as response:
                  return response.read()


          def rss_url(engine: str, query: str) -> str:
              encoded = urllib.parse.quote_plus(query)
              if engine == "google_news":
                  return f"https://news.google.com/rss/search?q={encoded}&hl=nl&gl=NL&ceid=NL:nl"
              if engine == "bing":
                  return f"https://www.bing.com/search?q={encoded}&format=rss&mkt=nl-NL"
              raise ValueError(engine)


          def strip_html(text: str) -> str:
              text = re.sub(r"<[^>]+>", " ", text or "")
              return html.unescape(re.sub(r"\s+", " ", text)).strip()


          def fetch_rss(url: str, source_def: dict):
              data = fetch_url(url)
              root = ET.fromstring(data)
              items = []
              for item in root.findall(".//item")[:8]:
                  title = strip_html(item.findtext("title", default=""))
                  link = item.findtext("link", default="")
                  pub = item.findtext("pubDate", default="")
                  desc = strip_html(item.findtext("description", default=""))
                  source = ""
                  source_el = item.find("source")
                  if source_el is not None and source_el.text:
                      source = strip_html(source_el.text)
                  if not source:
                      source = source_def["label"]
                  if title:
                      items.append({
                          "title": title,
                          "url": link,
                          "published_raw": pub,
                          "summary": desc,
                          "source": source,
                          "source_kind": source_def["label"],
                          "source_id": source_def["id"],
                          "query": source_def.get("rendered_query", ""),
                      })
              return items


          def parse_date(value: str):
              if not value:
                  return None
              try:
                  return email.utils.parsedate_to_datetime(value)
              except Exception:
                  pass
              for fmt in ["%Y-%m-%dT%H:%M:%SZ", "%Y-%m-%d", "%d-%m-%Y"]:
                  try:
                      return dt.datetime.strptime(value[:len(fmt)], fmt).replace(tzinfo=dt.timezone.utc)
                  except Exception:
                      continue
              return None


          def is_blocked_source(url: str, source: str) -> bool:
              text = norm_text((url or "") + " " + (source or ""))
              return any(domain in text for domain in BLOCKED_DOMAINS)


          def looks_like_generic_page(title: str, summary: str, company: dict) -> bool:
              text = f"{title} {summary}"
              text_norm = norm_text(text)
              title_norm = norm_text(title)
              terms = [norm_text(t) for t in company_terms(company)]
              if title_norm in terms:
                  return True
              # If it is just a short title without a verb/event, reject.
              if len(title_norm) <= 35 and not contains_any(text_norm, LEADERSHIP_EVENTS + MA_TERMS + DIGITAL_EVENT_TERMS + HIRING_TERMS + SECURITY_TERMS + TENDER_TERMS):
                  return True
              # Generic careers page is not enough; specific IT roles are handled by vacancy gate.
              if re.search(r"\b(werken bij|vacatures?\s*&\s*carri[eè]re|jobs?\s*&\s*careers?|careers?\s+in\s+retail)\b", text_norm, re.I):
                  if not contains_any(text_norm, IT_ROLE_TERMS):
                      return True
              return False


          def source_quality(item: dict) -> int:
              sid = item.get("source_id", "")
              source_text = norm_text(item.get("source", "") + " " + item.get("url", ""))
              if sid == "linkedin_feed":
                  return 5
              if sid == "news_strict":
                  if any(x in source_text for x in ["newsroom", "press", "pers", "investor", "jaarverslag", "annual report"]):
                      return 5
                  return 4
              if sid == "linkedin_public_strict":
                  return 2
              if sid == "web_it_jobs_strict":
                  return 2
              return 1


          def freshness_points(published_dt, now_utc):
              if not published_dt:
                  return 1
              age_days = max(0, (now_utc - published_dt.astimezone(dt.timezone.utc)).total_seconds() / 86400)
              if age_days <= 2:
                  return 5
              if age_days <= 7:
                  return 4
              if age_days <= 21:
                  return 3
              if age_days <= 45:
                  return 1
              return 0


          def gate_signal(company: dict, item: dict):
              title = item.get("title", "")
              summary = item.get("summary", "")
              url = item.get("url", "")
              source = item.get("source", "")
              text_original = f"{title} {summary}"
              text = norm_text(text_original)
              sid = item.get("source_id", "")

              if company.get("status") == "source-only vendor":
                  return None, "source-only vendor account, not a retail target"
              if is_blocked_source(url, source):
                  return None, "blocked social source"
              if not item_mentions_company(company, title, summary, url):
                  return None, "company not clearly mentioned"
              if looks_like_generic_page(title, summary, company):
                  return None, "generic page without concrete IT event or IT role"

              candidates = []

              role_hits = contains_any(text, IT_ROLE_TERMS)
              hiring_hits = contains_any(text, HIRING_TERMS)
              leadership_role_hits = contains_any(text, LEADERSHIP_ROLES)
              leadership_event_hits = contains_any(text, LEADERSHIP_EVENTS)
              ma_hits = contains_any(text, MA_TERMS)
              digital_hits = contains_any(text, DIGITAL_STRONG_TERMS)
              digital_event_hits = contains_any(text, DIGITAL_EVENT_TERMS)
              pos_hits = contains_any(text, POS_TERMS)
              pos_action_hits = contains_any(text, POS_ACTION_TERMS)
              supply_hits = contains_any(text, SUPPLY_TERMS)
              supply_tech_hits = contains_any(text, SUPPLY_TECH_TERMS)
              vendor_hits = contains_any(text, VENDOR_TERMS)
              vendor_action_hits = contains_any(text, VENDOR_ACTION_TERMS)
              security_hits = contains_any(text, SECURITY_TERMS)
              tender_hits = contains_any(text, TENDER_TERMS)
              it_scope_hits = contains_any(text, IT_SCOPE_TERMS)
              cost_hits = contains_any(text, COST_TERMS)
              cost_it_hits = contains_any(text, COST_IT_TERMS)

              if leadership_role_hits and leadership_event_hits:
                  candidates.append(("leadership", leadership_role_hits + leadership_event_hits, "leadership role + appointment/departure event"))
              if ma_hits:
                  candidates.append(("ma_integration", ma_hits, "M&A/integration event"))
              if digital_hits and digital_event_hits:
                  candidates.append(("digital_transformation", digital_hits + digital_event_hits, "strong digital/data transformation term + action verb"))
              if pos_hits and (pos_action_hits or (role_hits and hiring_hits)):
                  candidates.append(("pos_storetech", pos_hits + pos_action_hits + role_hits[:3], "POS/store-tech term + rollout/vendor/vacancy action"))
              if role_hits and hiring_hits:
                  candidates.append(("vacancy_capability", role_hits + hiring_hits[:2], "specific IT/transformation role + hiring signal"))
              if supply_hits and supply_tech_hits:
                  candidates.append(("supply_chain", supply_hits + supply_tech_hits[:3], "supply-chain term + technology/automation term"))
              if vendor_hits and vendor_action_hits and company.get("status") != "source-only vendor":
                  candidates.append(("vendor_partner", vendor_hits + vendor_action_hits, "technology vendor/platform term + selection/implementation action"))
              if security_hits:
                  candidates.append(("security_compliance", security_hits, "security/compliance event"))
              if tender_hits and it_scope_hits:
                  candidates.append(("tender_procurement", tender_hits + it_scope_hits[:3], "tender/RFP term + IT scope"))
              if cost_hits and cost_it_hits:
                  candidates.append(("cost_efficiency", cost_hits + cost_it_hits, "cost/efficiency pressure + IT/automation term"))

              if not candidates:
                  return None, "no strict signal gate passed"

              # In LinkedIn public index we require a stronger gate than normal web/news because snippets are noisy.
              if sid == "linkedin_public_strict":
                  allowed = {"leadership", "vacancy_capability", "digital_transformation", "pos_storetech", "vendor_partner"}
                  candidates = [c for c in candidates if c[0] in allowed]
                  if not candidates:
                      return None, "LinkedIn public index result did not pass strict LinkedIn gates"

              candidates.sort(key=lambda c: CATEGORY_CONFIG[c[0]]["base"], reverse=True)
              cat_id, hits, reason = candidates[0]
              hits = sorted(set([h for h in hits if h]))[:8]
              return {"category_id": cat_id, "hits": hits, "reason": reason}, None


          def priority(score: int) -> str:
              if score >= 90:
                  return "Actie binnen 48 uur"
              if score >= 82:
                  return "Review deze week"
              if score >= 75:
                  return "Monitoren en handmatig verifiëren"
              return "Niet tonen"


          def confidence(signal, source_quality_points: int):
              if signal["source_id"] == "linkedin_feed":
                  return "Hoog"
              if source_quality_points >= 4 and signal["evidence_reason"] != "specific IT/transformation role + hiring signal":
                  return "Hoog"
              if source_quality_points >= 2:
                  return "Middel"
              return "Laag"


          def build_outreach(company: str, category: dict, title: str, evidence_reason: str):
              return (
                  f"Ik zag een concreet signaal rond {company}: '{title}'. "
                  f"De reden dat ik dit relevant vind: {evidence_reason}. "
                  f"Dit raakt mogelijk aan {category['label'].lower()}. CGI kan helpen om dit te vertalen naar een uitvoerbare IT-roadmap, architectuurkeuzes en delivery-capaciteit. "
                  f"Ik zou dit eerst kort willen valideren voordat we een commerciële stap zetten."
              )


          def item_to_signal(company, item, gate, now_utc):
              cat = CATEGORY_CONFIG[gate["category_id"]]
              published_dt = parse_date(item.get("published_raw", ""))
              if published_dt and published_dt.tzinfo is None:
                  published_dt = published_dt.replace(tzinfo=dt.timezone.utc)
              sq = source_quality(item)
              evidence_bonus = min(4, max(0, len(gate["hits"]) - 1))
              score = min(96, int(cat["base"] + freshness_points(published_dt, now_utc) + sq + evidence_bonus))
              local = "Onbekende datum"
              iso = ""
              if published_dt:
                  local_dt = published_dt.astimezone(ZoneInfo("Europe/Amsterdam"))
                  local = local_dt.strftime("%d-%m-%Y %H:%M")
                  iso = local_dt.isoformat()
              signal = {
                  "id": hashlib.sha1((company["id"] + item.get("url", "") + item.get("title", "") + gate["category_id"]).encode("utf-8", "ignore")).hexdigest()[:16],
                  "company": company["name"],
                  "query_name": company["query_name"],
                  "account_status": company.get("status", "target candidate"),
                  "title": item["title"],
                  "summary": item.get("summary", ""),
                  "url": item.get("url", ""),
                  "source": item.get("source", ""),
                  "source_kind": item.get("source_kind", ""),
                  "source_id": item.get("source_id", ""),
                  "published": iso,
                  "published_local": local,
                  "category": cat["label"],
                  "category_id": gate["category_id"],
                  "hits": gate["hits"],
                  "evidence_reason": gate["reason"],
                  "score": score,
                  "priority": priority(score),
                  "why": cat["why"],
                  "cgi": cat["cgi"],
                  "action": cat["action"],
                  "outreach": build_outreach(company["name"], cat, item["title"], gate["reason"]),
              }
              signal["confidence"] = confidence(signal, sq)
              return signal, published_dt


          def source_query(source_def: dict, company: dict):
              terms = company_terms(company)
              term = terms[0] if terms else company["query_name"]
              return source_def["query"].format(term=term)


          def load_linkedin_feed(companies_by_key, now_utc):
              feed_url = os.getenv("LINKEDIN_SIGNAL_FEED_URL", "").strip()
              if not feed_url:
                  return [], None, []
              imported = []
              rejected = []
              error = None
              try:
                  raw = fetch_url(feed_url, timeout=20).decode("utf-8", "replace")
                  data = json.loads(raw)
                  rows = data.get("signals", data if isinstance(data, list) else [])
                  for row in rows:
                      company_name = str(row.get("company", "")).strip()
                      if not company_name:
                          continue
                      key = norm_key(clean_query_name(company_name))
                      company = companies_by_key.get(key) or {"id": slugify(key), "name": company_name, "query_name": clean_query_name(company_name), "aliases": [], "status": "target candidate"}
                      item = {
                          "title": str(row.get("title") or row.get("text") or "LinkedIn signaal"),
                          "summary": str(row.get("summary") or row.get("text") or ""),
                          "url": str(row.get("url") or row.get("link") or ""),
                          "source": str(row.get("source") or "LinkedIn approved feed"),
                          "source_kind": "LinkedIn approved feed/API",
                          "source_id": "linkedin_feed",
                          "published_raw": str(row.get("published") or row.get("date") or ""),
                      }
                      gate, reason = gate_signal(company, item)
                      if not gate:
                          rejected.append({"company": company_name, "title": item["title"][:180], "source": "LinkedIn feed", "reason": reason})
                          continue
                      sig, _ = item_to_signal(company, item, gate, now_utc)
                      sig["score"] = min(98, sig["score"] + 4)
                      sig["priority"] = priority(sig["score"])
                      sig["confidence"] = "Hoog"
                      imported.append(sig)
              except Exception as exc:
                  error = str(exc)
              return imported, error, rejected


          def scan(max_companies, lookback_days, min_score, include_linkedin_public):
              raw_entries, companies = parse_companies(USER_COMPANIES_RAW)
              eligible = [c for c in companies if c.get("scan_enabled")]
              source_only = [c for c in companies if not c.get("scan_enabled")]
              selected = eligible[:max_companies] if max_companies else eligible
              now_utc = dt.datetime.now(dt.timezone.utc)
              signals = []
              errors = []
              rejected_examples = []
              reject_counts = {}
              seen = set()
              sources = [SOURCE_DEFS[0], SOURCE_DEFS[1]]
              if include_linkedin_public:
                  sources.append(SOURCE_DEFS[2])

              offline = os.getenv("OFFLINE_SMOKE_TEST", "false").lower() == "true"

              for idx, company in enumerate(selected, start=1):
                  for src in sources:
                      query = source_query(src, company)
                      src_run = dict(src)
                      src_run["rendered_query"] = query
                      url = rss_url(src["engine"], query)
                      try:
                          items = [] if offline else fetch_rss(url, src_run)
                      except Exception as exc:
                          errors.append({"company": company["name"], "source": src["label"], "error": str(exc)[:220]})
                          continue
                      for item in items[:6]:
                          gate, reject_reason = gate_signal(company, item)
                          if not gate:
                              reason = reject_reason or "rejected"
                              reject_counts[reason] = reject_counts.get(reason, 0) + 1
                              if len(rejected_examples) < 80:
                                  rejected_examples.append({
                                      "company": company["name"], "title": item.get("title", "")[:180],
                                      "source": item.get("source_kind", ""), "reason": reason
                                  })
                              continue
                          sig, published_dt = item_to_signal(company, item, gate, now_utc)
                          if published_dt:
                              age_days = (now_utc - published_dt.astimezone(dt.timezone.utc)).days
                              if age_days > lookback_days:
                                  reject_counts["older than lookback"] = reject_counts.get("older than lookback", 0) + 1
                                  continue
                          if sig["score"] < min_score:
                              reject_counts["below score threshold"] = reject_counts.get("below score threshold", 0) + 1
                              continue
                          dedupe = (company["id"], sig["url"] or norm_key(sig["title"]), sig["category_id"])
                          if dedupe in seen:
                              continue
                          seen.add(dedupe)
                          signals.append(sig)
                      time.sleep(0.04)

              by_key = {norm_key(c["query_name"]): c for c in companies}
              feed_signals, feed_error, feed_rejected = load_linkedin_feed(by_key, now_utc)
              rejected_examples.extend(feed_rejected[: max(0, 80-len(rejected_examples))])
              for r in feed_rejected:
                  reject_counts[r.get("reason", "LinkedIn feed rejected")] = reject_counts.get(r.get("reason", "LinkedIn feed rejected"), 0) + 1
              for sig in feed_signals:
                  if sig["score"] >= min_score:
                      signals.append(sig)
              if feed_error:
                  errors.append({"company": "LinkedIn feed", "source": "LINKEDIN_SIGNAL_FEED_URL", "error": feed_error[:300]})

              signals.sort(key=lambda s: (s["score"], s.get("published", "")), reverse=True)
              meta = {
                  "run_utc": now_utc.isoformat(),
                  "run_local": now_utc.astimezone(ZoneInfo("Europe/Amsterdam")).strftime("%d-%m-%Y %H:%M Europe/Amsterdam"),
                  "raw_entries_in_yaml": len(raw_entries),
                  "unique_accounts": len(companies),
                  "target_accounts_scan_enabled": len(eligible),
                  "source_only_accounts": len(source_only),
                  "accounts_scanned": len(selected),
                  "signals_found_before_limit": len(signals),
                  "signals_published": min(300, len(signals)),
                  "lookback_days": lookback_days,
                  "min_score": min_score,
                  "include_linkedin_public_index": include_linkedin_public,
                  "linkedin_feed_enabled": bool(os.getenv("LINKEDIN_SIGNAL_FEED_URL", "").strip()),
                  "quality_mode": "strict_v3_default_to_no_signal",
                  "reject_counts": dict(sorted(reject_counts.items(), key=lambda kv: kv[1], reverse=True)[:30]),
                  "rejected_examples": rejected_examples[:80],
                  "errors": errors[:80],
              }
              return raw_entries, companies, signals[:300], meta


