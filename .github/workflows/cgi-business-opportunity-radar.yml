r{text-decoration:underline}.empty{background:#fff;border:2px dashed #d8d3df;border-radius:24px;padding:40px;text-align:center;color:#58525f}.table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow2)}.table th{background:#faf8fb;color:#4e4856;font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:left}.table th,.table td{padding:12px 13px;border-bottom:1px solid #eeeaf1;vertical-align:top}.table tr:last-child td{border-bottom:0}.split{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}.callout{border-radius:22px;padding:17px 18px;margin-bottom:18px;border:1px solid var(--line);box-shadow:var(--shadow2);background:#fff}.callout strong{display:block;margin-bottom:5px}.callout.ok{border-left:6px solid var(--purple)}.callout.warn{border-left:6px solid #eaa300}.callout.danger{border-left:6px solid var(--red)}.status-ok{color:#116b34;font-weight:950}.status-warn{color:#9b6500;font-weight:950}.status-bad{color:#9a0015;font-weight:950}.source-list{padding-left:19px;margin:6px 0 0}.source-list li{margin:6px 0;color:#4f4855}.source-list small{color:#7a7280}pre{white-space:pre-wrap;background:#0f0c14;color:#fff;border-radius:18px;padding:16px;overflow:auto}.badgebar{display:flex;gap:6px;flex-wrap:wrap}@media(max-width:1100px){.shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.hero-grid{grid-template-columns:1fr}.runmeta{text-align:left}.stats{grid-template-columns:repeat(2,1fr)}.split{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}@media(max-width:700px){.login-card{padding:28px}.login h1,.hero h1{font-size:34px}.stats{grid-template-columns:1fr}.wrap,.hero,.stats{padding-left:18px;padding-right:18px}.grid{grid-template-columns:1fr}.card h3{margin-right:0}.score{position:relative;right:auto;top:auto;display:inline-block;margin-bottom:8px}}

