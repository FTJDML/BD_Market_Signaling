name: CGI Retail IT Signal Radar V10 People Watchlist

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Freshness window voor directe IT-signalen in dagen"
        required: false
        default: "45"
      integration_lookback_days:
        description: "Freshness window voor gekwalificeerde M&A/formule-integratie"
        required: false
        default: "120"
      min_score:
        description: "Minimumscore voor publicatie"
        required: false
        default: "80"
      deep_scan_mode:
        description: "broad, broad_plus_rotating, all. Gebruik all alleen met API budget."
        required: false
        default: "broad_plus_rotating"
      max_company_deep_scans:
        description: "Aantal company-specific deep scans per run bij rotating"
        required: false
        default: "80"
      max_queries:
        description: "Hard maximum aantal zoekqueries per run"
        required: false
        default: "260"
      max_results_per_query:
        description: "Max resultaten per query/provider"
        required: false
        default: "10"
      include_linkedin_public_index:
        description: "Publieke LinkedIn zoekindex gebruiken via search APIs. Geen LinkedIn scraping."
        required: false
        default: "false"
      people_watchlist_mode:
        description: "off, rotating, all. Bepaalt of data/people-watchlist.csv/txt/urls.txt wordt gebruikt voor people-first onderzoek."
        required: false
        default: "rotating"
      max_people_watchlist_scans:
        description: "Aantal LinkedIn watchlist-profielen dat per run via publieke search-index wordt verrijkt/gecheckt. Gebruik ALL alleen met API-budget."
        required: false
        default: "120"
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cgi-retail-it-signal-radar-v10
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '45' }}
      INTEGRATION_LOOKBACK_DAYS: ${{ github.event.inputs.integration_lookback_days || '120' }}
      MIN_SCORE: ${{ github.event.inputs.min_score || '80' }}
      DEEP_SCAN_MODE: ${{ github.event.inputs.deep_scan_mode || 'broad_plus_rotating' }}
      MAX_COMPANY_DEEP_SCANS: ${{ github.event.inputs.max_company_deep_scans || '80' }}
      MAX_QUERIES: ${{ github.event.inputs.max_queries || '260' }}
      MAX_RESULTS_PER_QUERY: ${{ github.event.inputs.max_results_per_query || '10' }}
      ENABLE_LINKEDIN_PUBLIC_INDEX: ${{ github.event.inputs.include_linkedin_public_index || 'false' }}
      PEOPLE_WATCHLIST_MODE: ${{ github.event.inputs.people_watchlist_mode || 'rotating' }}
      MAX_PEOPLE_WATCHLIST_SCANS: ${{ github.event.inputs.max_people_watchlist_scans || '120' }}
      ENABLE_RSS_FALLBACK: "true"
      ENABLE_GDELT: "true"
      DISCOVER_PEOPLE: "true"
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      LINKEDIN_SIGNAL_FEED_URL: ${{ secrets.LINKEDIN_SIGNAL_FEED_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write V10 radar application
        shell: bash
        run: |
          cat > radar.py <<'PY'
          #!/usr/bin/env python3
          from __future__ import annotations
          import csv, datetime as dt, email.utils, hashlib, html, json, os, re, sys, time, unicodedata, urllib.parse, urllib.request, xml.etree.ElementTree as ET
          from pathlib import Path
          from collections import Counter, defaultdict
          try:
              from zoneinfo import ZoneInfo
          except Exception:
              ZoneInfo = None
          
          LOGIN_CODE = "BD_Signal_26!"
          VERSION = "v10_people_watchlist_url_only_supported"
          LOCAL_TZ = ZoneInfo("Europe/Amsterdam") if ZoneInfo else dt.timezone(dt.timedelta(hours=2), name="Europe/Amsterdam")
          NOW_UTC = dt.datetime.now(dt.timezone.utc)
          NOW_LOCAL = NOW_UTC.astimezone(LOCAL_TZ)
          
