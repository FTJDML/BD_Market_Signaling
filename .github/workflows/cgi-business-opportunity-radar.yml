name: CGI Business Opportunity Signal Radar

on:
  workflow_dispatch:
    inputs:
      max_companies:
        description: "Aantal bedrijven scannen: ALL of bijvoorbeeld 150"
        required: false
        default: "ALL"
      lookback_days:
        description: "Alleen signalen uit de laatste X dagen"
        required: false
        default: "21"
      min_score:
        description: "Minimumscore om in dashboard te tonen"
        required: false
        default: "45"
      include_linkedin_index:
        description: "Publieke LinkedIn zoekindex meenemen: true/false"
        required: false
        default: "true"
  schedule:
    # Dagelijks om 05:17 UTC. Dat is 07:17 in Nederland tijdens zomertijd.
    # GitHub schedule gebruikt UTC; kies bewust niet precies op het hele uur.
    - cron: "17 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "cgi-business-opportunity-signal-radar"
  cancel-in-progress: true

jobs:
  scan-and-publish:
    name: Scan signals and publish CGI dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      MAX_COMPANIES: ${{ github.event.inputs.max_companies || 'ALL' }}
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '21' }}
      MIN_SCORE: ${{ github.event.inputs.min_score || '45' }}
      INCLUDE_LINKEDIN_INDEX: ${{ github.event.inputs.include_linkedin_index || 'true' }}
      # Optioneel: maak een GitHub Secret LINKEDIN_SIGNAL_FEED_URL aan met een toegestane JSON-feed.
      # De agent scraped LinkedIn niet. De feed moet afkomstig zijn uit een toegestane API/export/manual workflow.
      LINKEDIN_SIGNAL_FEED_URL: ${{ secrets.LINKEDIN_SIGNAL_FEED_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build radar dashboard
