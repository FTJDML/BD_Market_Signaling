              function card(s){let supp=(s.supporting_sources||[]).slice(0,5).map(x=>`<li><a class="link" target="_blank" href="${esc(x.url)}">${esc(x.source||'bron')}</a> — ${esc(x.title||'')}</li>`).join('');return `<div class="card signal ${s.directness==='indirect'?'indirect-card':''}"><div class="score">${s.score}</div><span class="pill ${s.directness}">${esc(s.directness)}</span><span class="pill neutral">${esc(s.priority)}</span><span class="pill neutral">${esc(s.shelf_life||'')}</span><h3>${esc(s.company)} — ${esc(s.title)}</h3><div class="meta">${esc(s.source_type)} · ${esc(s.source)} · ${esc(s.published_at)} · ${s.age_days??'?'} dagen oud</div><div class="small">Matched alias: <b>${esc(s.matched_alias)}</b> · ${s.supporting_count?`+${s.supporting_count} vergelijkbare bronnen geclusterd`: 'unieke bron'}</div><div class="section-title">Bewijs</div><div>${(s.evidence_hits||[]).map(e=>'<span class="pill neutral">'+esc(e)+'</span>').join('')}</div><div class="section-title">Waarom relevant voor CGI</div><div class="small">${esc(s.why)}</div><div class="section-title">CGI-angle</div><div class="small">${esc(s.cgi_angle)}</div><div class="section-title">Actie</div><div class="small">${esc(s.action)}</div>${supp?`<div class="section-title">Samengevoegde bronnen</div><ul class="source-list">${supp}</ul>`:''}<div style="margin-top:14px"><a class="link" target="_blank" href="${esc(s.url)}">Open primaire bron</a></div></div>`;}
              function renderCoverage(){const c=DATA.coverage||{}, providers=c.providers||{}, cfg=c.config||{};document.getElementById('content').innerHTML=`<div class="split"><div><div class="callout ok"><strong>Quality gates actief</strong>Oude archive-items, Wikipedia, productpagina's, folders, consumentencontent, financiële-only items en single-store overnames worden geblokkeerd. CIO/CTO/CDO-signalen hebben een langere shelf-life dan gewone nieuwsitems.</div><div class="card"><h3>Providerdekking</h3><table class="table"><tbody>${Object.entries(providers).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('')}</tbody></table></div></div><div><div class="card"><h3>Config</h3><table class="table"><tbody>${Object.entries(cfg).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join('')}</tbody></table></div></div></div><div class="card" style="margin-top:18px"><h3>Waarom items zijn afgewezen</h3><table class="table"><tbody>${(c.reject_reasons||[]).map(r=>`<tr><td>${esc(r[0])}</td><td>${r[1]}</td></tr>`).join('')}</tbody></table></div>`;}
              function renderRejected(){document.getElementById('content').innerHTML=`<table class="table"><thead><tr><th>Titel</th><th>Bron</th><th>Datum</th><th>Reden</th><th>Query</th></tr></thead><tbody>${DATA.rejected.map(r=>`<tr><td>${esc(r.title)}</td><td>${esc(r.source)}<br><a class="link" href="${esc(r.url)}" target="_blank">open</a></td><td>${esc(r.published_at)}<br>${r.age_days??'?'} dagen</td><td>${esc(r.reason)}</td><td>${esc(r.query_pack)}<br><span class="small">${esc(r.query)}</span></td></tr>`).join('')}</tbody></table>`;}
              function renderPeople(){const c=DATA.coverage||{};const mailbox=c.linkedin_alert_mailbox_configured;const feed=(c.linkedin_signal_feed_items||0)>0;const evidence=(c.linkedin_evidence_file_items||0)>0;const searchReady=c.people_watchlist_api_ready;const directFetch=c.linkedin_direct_fetch_enabled;let cls=(c.linkedin_direct_fetch_attempted||0)>0?'ok':(searchReady?'warn':'danger');let msg=`De radar gebruikt de LinkedIn URL's nu als echte scanlijst: per URL wordt een publieke profiel-fetch geprobeerd en daarnaast worden zoekqueries rond de exacte profielslug/naam gebouwd. Als LinkedIn een loginwall geeft, zie je dat hier per profiel terug; er wordt dan niets verzonnen.`;document.getElementById('content').innerHTML=`<div class="callout ${cls}"><strong>LinkedIn URL-scan status</strong>${msg}</div><div class="quality"><div class="mini"><b>${c.people_watchlist_loaded||0}</b><br>watchlist URL’s</div><div class="mini"><b>${c.linkedin_alert_email_items||0}</b><br>alert-mails verwerkt</div><div class="mini"><b>${c.linkedin_signal_feed_items||0}</b><br>feeditems verwerkt</div><div class="mini"><b>${c.linkedin_evidence_file_items||0}</b><br>evidence-bestanden</div><div class="mini"><b>${c.people_watchlist_queries_executed||0}</b><br>search queries</div><div class="mini"><b>${c.linkedin_direct_fetch_attempted||0}</b><br>profielen geopend</div><div class="mini"><b>${c.linkedin_direct_fetch_accessible||0}</b><br>publiek gelezen</div><div class="mini"><b>${c.linkedin_direct_fetch_blocked||0}</b><br>loginwall/fout</div></div><div class="split"><div class="card"><h3>Wat werkt betrouwbaar?</h3><table class="table"><tbody><tr><td>Sales Navigator / LinkedIn alert mailbox</td><td class="${mailbox?'status-ok':'status-bad'}">${mailbox?'verbonden':'niet verbonden'}</td></tr><tr><td>data/linkedin-signals.csv</td><td class="${feed?'status-ok':'status-warn'}">${feed?'items gevonden':'geen items'}</td></tr><tr><td>data/linkedin-evidence/</td><td class="${evidence?'status-ok':'status-warn'}">${evidence?'bestanden gevonden':'geen bestanden'}</td></tr><tr><td>Directe publieke profiel-fetch per URL</td><td class="${directFetch?'status-ok':'status-bad'}">${directFetch?'actief':'uit'}</td></tr><tr><td>URL watchlist via search API</td><td class="${searchReady?'status-ok':'status-warn'}">${searchReady?'actief via Tavily/Brave':'geen Tavily/Brave'}</td></tr></tbody></table></div><div class="card"><h3>Wat er technisch gebeurt</h3><p class="small">De YAML probeert elke URL in de watchlist publiek te openen, registreert of LinkedIn de pagina toont of blokkeert, en voert daarnaast zoekqueries uit op profielslug en naam. Alleen concrete IT-, hiring-, leadership- of transformatietaal mag een signaal worden.</p></div></div><h3>Watchlist geselecteerd voor deze run</h3><table class="table"><thead><tr><th>Naam</th><th>Bedrijf</th><th>Rol</th><th>LinkedIn</th><th>Status</th></tr></thead><tbody>${(DATA.watchlist_selected||[]).map(p=>`<tr><td>${esc(p.name||'')}</td><td>${esc(p.company||'')}</td><td>${esc(p.role||'')}</td><td><a class="link" href="${esc(p.linkedin_url||'')}" target="_blank">open</a></td><td>${p.needs_enrichment?'URL-only: verrijken met bedrijf/rol':'verrijkt'}</td></tr>`).join('')||'<tr><td>Geen profielen geselecteerd.</td></tr>'}</tbody></table><h3>LinkedIn profiel-fetch status</h3><table class="table"><thead><tr><th>Naam</th><th>Status</th><th>HTTP</th><th>Snippet</th></tr></thead><tbody>${(c.linkedin_direct_fetch_status_rows||[]).map(r=>`<tr><td>${esc(r.name||'')}</td><td>${esc(r.status||'')}</td><td>${esc(String(r.http_status||''))}</td><td class="small">${esc(r.snippet||'')}</td></tr>`).join('')||'<tr><td>Geen directe LinkedIn fetches uitgevoerd.</td></tr>'}</tbody></table><h3>People candidates uit publieke index</h3><table class="table"><tbody>${DATA.people.map(p=>`<tr><td>${esc(p.title)}</td><td>${esc(p.source)}<br><a class="link" href="${esc(p.url)}" target="_blank">open</a></td><td>${esc((p.role_hits||[]).join(', '))}</td><td>${esc((p.matched_companies||[]).map(m=>m.name).join(', '))}</td></tr>`).join('')||'<tr><td>Geen people candidates gevonden.</td></tr>'}</tbody></table>`;}
              function renderSetup(){document.getElementById('content').innerHTML=`<div class="card"><h3>One-YAML setup</h3><p>Geen extra uploads nodig. De workflow werkt met ingebouwde bedrijvenlijst, automatische LinkedIn discovery en een optioneel inline LinkedIn URL-block in deze YAML. API keys verbeteren de dekking, maar losse CSV-bestanden zijn optioneel.</p><pre>BRAVE_SEARCH_API_KEY
