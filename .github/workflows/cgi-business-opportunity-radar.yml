          def source_quality(item: RawItem) -> Tuple[bool, str]:
              d = url_domain(item.url)
              u = lower(item.url)
              text = lower(item.title + " " + item.snippet)
              if any(b in d for b in BANNED_DOMAINS):
                  return False, "banned source domain (Wikipedia/social/product/consumer source)"
              if any(part in u for part in BANNED_URL_PARTS) and not has_word(text, IT_ROLE_TERMS + IT_LANDSCAPE_TERMS):
                  return False, "consumer/product URL without concrete IT evidence"
              # Homepage/generic pages are allowed only if they contain an explicit IT role or platform program.
              if contains_phrase(text, GENERIC_PAGE_PHRASES) and not (has_word(text, IT_ROLE_TERMS) or (has_word(text, IT_LANDSCAPE_TERMS) and contains_phrase(text, TRANSFORMATION_TERMS + PROGRAM_VERBS))):
                  return False, "generic company/careers page without a specific IT role or IT program"
              return True, "usable source"
          
          
          def is_consumer_noise(item: RawItem) -> Optional[str]:
              text = lower(item.title + " " + item.snippet)
              # Do not reject Product Owner by the word product.
              text_without_product_owner = text.replace("product owner", "productowner")
              if contains_phrase(text_without_product_owner, CONSUMER_NOISE_PHRASES):
                  # If the same item has hard IT proof, keep it.
                  hard = has_word(text, IT_ROLE_TERMS) or (has_word(text, IT_LANDSCAPE_TERMS) and contains_phrase(text, TRANSFORMATION_TERMS + PROGRAM_VERBS))
                  if not hard:
                      return "consumer/product/price content, not an IT-landscape signal"
              return None
          
          
          def is_single_store_franchise_noise(text: str) -> bool:
              t = lower(text)
              single_store_patterns = [
                  r"\bwinkel in [a-zà-ÿ'-]+", r"\bfiliaal in [a-zà-ÿ'-]+", r"ter overname: .* winkel",
                  r"franchise\+.*winkel", r"winkel te koop", r"franchisenemer gezocht",
              ]
              return any(re.search(p, t, re.I) for p in single_store_patterns)
          
          
          def classify_item(item: RawItem, company: Company) -> Decision:
              text = norm_space(item.title + " " + item.snippet + " " + item.role + " " + item.person)
              text_l = lower(text)
              ok, q = source_quality(item)
              if not ok:
                  return reject(item, q)
              noise = is_consumer_noise(item)
              if noise:
                  return reject(item, noise)
          
              evidence: List[str] = []
          
              # 1. IT tender / procurement
              tender_hits = find_terms(text, TENDER_TERMS)
              if tender_hits and has_word(text, IT_LANDSCAPE_TERMS + IT_ROLE_TERMS):
                  evidence = tender_hits + find_terms(text, IT_LANDSCAPE_TERMS + IT_ROLE_TERMS)[:4]
                  return accept("IT tender / procurement", 98, "Hoog", evidence, q)
          
              # 2. Specific IT roles / hiring
              role_hits = find_terms(text, IT_ROLE_TERMS)
              job_hits = find_terms(text, JOB_CONTEXT_TERMS)
              if role_hits and (job_hits or item.source_type.lower().startswith("linkedin") or contains_phrase(item.url, ["/jobs", "vacature", "careers", "werkenbij"])):
                  # Generic role profile without event is not enough unless it is a watchlist/feed item.
                  if item.source_type == "LinkedIn publieke index" and contains_phrase(item.url, LINKEDIN_PROFILE_HINTS) and not find_terms(text, LEADERSHIP_EVENT_TERMS + JOB_CONTEXT_TERMS):
                      return reject(item, "LinkedIn profile discovery only; no concrete job change, post, or hiring signal")
                  evidence = role_hits[:5] + job_hits[:3]
                  return accept("IT vacature / capability build-up", 96, "Hoog", evidence, q)
          
              # 3. IT/digital leadership change
              leader_hits = find_terms(text, LEADERSHIP_IT_TERMS)
              event_hits = find_terms(text, LEADERSHIP_EVENT_TERMS)
              if leader_hits and event_hits:
                  evidence = leader_hits[:5] + event_hits[:3]
                  return accept("IT/Digital leadership change", 94, "Hoog", evidence, q)
          
              # General CEO/COO/CFO only with explicit digital transformation context; score lower.
              gen_leader_hits = find_terms(text, GENERAL_LEADER_TERMS)
              if gen_leader_hits and event_hits and (has_word(text, IT_LANDSCAPE_TERMS) or contains_phrase(text, ["digital transformation", "digitale transformatie", "data-driven", "omnichannel platform", "technology agenda"])):
                  evidence = gen_leader_hits[:2] + event_hits[:3] + find_terms(text, IT_LANDSCAPE_TERMS)[:3]
                  return accept("IT/Digital leadership change", 82, "Middel", evidence, q)
          
              # 4. Explicit platform/transformation programme
              it_hits = find_terms(text, IT_LANDSCAPE_TERMS)
              trans_hits = find_terms(text, TRANSFORMATION_TERMS + PROGRAM_VERBS)
              if it_hits and trans_hits:
                  evidence = it_hits[:6] + trans_hits[:4]
                  return accept("Expliciete IT-/data-/platformtransformatie", 92, "Hoog", evidence, q)
          
              # 5. Vendor/platform choice
              vendor_hits = find_terms(text, VENDOR_TERMS)
              if vendor_hits and find_terms(text, PROGRAM_VERBS + ["selectie", "gekozen", "kiest", "partner", "partnership"]):
                  evidence = vendor_hits[:5] + find_terms(text, PROGRAM_VERBS)[:3]
                  return accept("Vendor/platform-keuze", 91, "Hoog", evidence, q)
          
              # 6. Security event. Must be a real event, not IAM substring.
              sec_hits = find_terms(text, SECURITY_EVENT_TERMS)
              if sec_hits:
                  evidence = sec_hits[:4]
                  return accept("Security/compliance IT-event", 90, "Hoog", evidence, q)
          
              # 7. Qualified M&A / formula integration.
              mna_hits = find_terms(text, MNA_TERMS)
              if mna_hits:
                  # Never accept financial/commodity/single-store M&A as CGI IT-landscape signal.
                  if contains_phrase(text, MNA_FALSE_POSITIVE_TERMS) or is_single_store_franchise_noise(text):
                      return reject(item, "M&A-like wording but single-store, financial, commodity or non-operational context")
                  if company.monitor_mode == "context" and not has_word(text, IT_LANDSCAPE_TERMS):
                      return reject(item, "M&A at supplier/manufacturer/vendor without explicit IT-landscape evidence")
                  qualified = contains_phrase(text, MNA_QUALIFIERS) or re.search(r"\bovergenomen door\b|\bneemt .* over\b|\bverkoopt alle vestigingen\b", text_l)
                  retail_formula_names = contains_phrase(text, ["tuinland", "ranzijn", "roompot", "landal", "xenos", "blokker", "intertoys", "kwantum", "leen bakker", "intratuin", "bruna"])
                  if qualified or retail_formula_names:
                      evidence = mna_hits[:4] + find_terms(text, MNA_QUALIFIERS)[:4]
                      # Qualified M&A is a hypothesis, not proof of IT need. Keep score above 75 but not 95+ unless IT terms also present.
                      score = 88 if has_word(text, IT_LANDSCAPE_TERMS) else 78
                      conf = "Middel" if score < 85 else "Hoog"
                      return accept("Qualified M&A / formule-integratie", score, conf, evidence, q)
                  return reject(item, "M&A event not qualified as chain/formula/multi-site integration")
          
              return reject(item, "no concrete IT role, IT programme, platform/vendor choice, IT leadership change or qualified formula integration")
          
          
          def accept(category: str, score: int, confidence: str, evidence: List[str], source_quality_text: str) -> Decision:
              meta = CATEGORY_META[category]
              return Decision(True, category, score, confidence, sorted(set(evidence), key=lambda x: evidence.index(x)), "", meta["cgi"], meta["action"], meta["why"], source_quality_text)
          
          
          def reject(item: RawItem, reason: str) -> Decision:
              return Decision(False, "Rejected", 0, "Laag", [], reason, "", "", "", reason)
          
          # ----------------------------- Search -----------------------------
          
          class SearchClient:
              def __init__(self):
                  self.brave_key = os.environ.get("BRAVE_SEARCH_API_KEY", "").strip()
                  self.calls = 0
                  self.enable_rss = os.environ.get("ENABLE_RSS_FALLBACK", "false").lower() in ("1", "true", "yes", "y")
                  self.errors: List[str] = []
          
              def brave(self, q: str, count: int = 5, freshness_days: int = 30) -> List[Dict[str, Any]]:
                  if not self.brave_key:
                      return []
                  params = {
                      "q": q,
                      "count": str(max(1, min(count, 10))),
                      "search_lang": "nl",
                      "country": "nl",
                      "safesearch": "moderate",
                      "freshness": f"pd{freshness_days}",
                  }
                  url = "https://api.search.brave.com/res/v1/web/search?" + urllib.parse.urlencode(params)
                  req = urllib.request.Request(url, headers={"Accept": "application/json", "X-Subscription-Token": self.brave_key})
                  try:
                      with urllib.request.urlopen(req, timeout=20) as r:
                          data = json.loads(r.read().decode("utf-8"))
                      self.calls += 1
                      results = data.get("web", {}).get("results", []) or []
                      return results
                  except Exception as e:
                      self.errors.append(f"Brave error for {q[:80]}: {e}")
                      return []
          
              def google_news_rss(self, q: str, count: int = 5) -> List[Dict[str, Any]]:
                  # Fallback when no API key exists. News only; no LinkedIn.
                  url = "https://news.google.com/rss/search?" + urllib.parse.urlencode({"q": q, "hl": "nl", "gl": "NL", "ceid": "NL:nl"})
                  try:
                      with urllib.request.urlopen(url, timeout=20) as r:
                          xml = r.read().decode("utf-8", errors="ignore")
                      items = re.findall(r"<item>(.*?)</item>", xml, flags=re.S)[:count]
                      out = []
                      for it in items:
                          title = html.unescape(re.search(r"<title>(.*?)</title>", it, flags=re.S).group(1)) if re.search(r"<title>(.*?)</title>", it, flags=re.S) else ""
                          link = html.unescape(re.search(r"<link>(.*?)</link>", it, flags=re.S).group(1)) if re.search(r"<link>(.*?)</link>", it, flags=re.S) else ""
                          desc = html.unescape(re.search(r"<description>(.*?)</description>", it, flags=re.S).group(1)) if re.search(r"<description>(.*?)</description>", it, flags=re.S) else ""
                          pub = html.unescape(re.search(r"<pubDate>(.*?)</pubDate>", it, flags=re.S).group(1)) if re.search(r"<pubDate>(.*?)</pubDate>", it, flags=re.S) else ""
                          out.append({"title": title, "url": link, "description": re.sub("<.*?>", " ", desc), "published": pub})
                      return out
                  except Exception as e:
                      self.errors.append(f"Google News RSS error for {q[:80]}: {e}")
                      return []
          
          
          def search_company(company: Company, client: SearchClient, include_linkedin: bool, lookback_days: int) -> List[RawItem]:
              name = company.name
              items: List[RawItem] = []
              # Queries are intentionally narrow. We do not search generic consumer/marketing topics.
              q_base = f'"{name}"'
              queries = [
                  (q_base + ' ("Business Analyst" OR "business analist" OR "data transformation" OR "data transformatie" OR "enterprise architect" OR "solution architect" OR "Product Owner POS" OR "Product Owner data" OR "ERP lead" OR "SAP" OR "data platform")', "Web/vacature met IT-bewijs"),
                  (q_base + ' (CIO OR CTO OR "Chief Digital Officer" OR "Chief Data Officer" OR "Head of Data" OR "Head of Digital" OR "Head of IT") (benoemd OR aangesteld OR vertrekt OR started OR appointed OR joins)', "Leadership / people"),
                  (q_base + ' (POS OR kassasysteem OR ERP OR "SAP S/4HANA" OR Salesforce OR Databricks OR Snowflake OR "data platform" OR WMS OR TMS OR IAM OR cybersecurity) (implementatie OR rollout OR migratie OR vervanging OR transformatie OR selects OR kiest)', "IT-platform / transformatie"),
                  (q_base + ' (overname OR overgenomen OR fusie OR "gaat samen" OR "verkoopt alle vestigingen" OR "nieuwe eigenaar") (vestigingen OR keten OR formule OR hoofdkantoor OR winkels OR restaurants OR parken)', "Qualified M&A candidate"),
                  (q_base + ' (aanbesteding OR tender OR RFP OR marktconsultatie) (IT OR data OR ERP OR POS OR cloud OR cybersecurity)', "IT tender"),
              ]
              if include_linkedin:
                  queries.extend([
                      ('site:linkedin.com/jobs ' + q_base + ' ("Business Analyst" OR "business analist" OR "data transformation" OR "Product Owner POS" OR "enterprise architect" OR "ERP" OR "data platform")', "LinkedIn publieke index"),
                      ('site:linkedin.com/posts ' + q_base + ' ("data transformation" OR "digital transformation" OR "ERP" OR "POS" OR "data platform" OR "Business Analyst" OR "hiring" OR "we are hiring")', "LinkedIn publieke index"),
                      ('site:linkedin.com/in ' + q_base + ' (CIO OR CTO OR "Head of Data" OR "Head of Digital" OR "Chief Data Officer" OR "IT Director") (started OR appointed OR benoemd OR aangesteld)', "LinkedIn publieke index"),
                  ])
              for q, source_type in queries:
                  results = client.brave(q, count=5, freshness_days=lookback_days)
                  if not results and source_type != "LinkedIn publieke index" and client.enable_rss:
                      # Optional narrow RSS fallback only for non-LinkedIn, news-like queries. Disabled by default to avoid noisy/slow runs.
                      results = client.google_news_rss(q, count=3)
                  for r in results:
                      title = norm_space(r.get("title") or r.get("name") or "")
                      snippet = norm_space(r.get("description") or r.get("snippet") or r.get("extra_snippets", [""])[0] if isinstance(r.get("extra_snippets"), list) and r.get("extra_snippets") else r.get("description") or "")
                      url = r.get("url") or r.get("link") or ""
                      age = r.get("age") or r.get("published") or ""
                      items.append(RawItem(company=name, title=title, snippet=snippet, url=url, source_type=source_type, published=age))
                  # Be polite and avoid excessive bursts.
                  if client.brave_key:
                      time.sleep(0.15)
              return items
          
          # ----------------------------- LinkedIn feed/watchlist -----------------------------
          
          def read_csv_file(path: Path) -> List[Dict[str, str]]:
              if not path.exists():
                  return []
              with path.open("r", encoding="utf-8-sig", newline="") as f:
                  return [dict(row) for row in csv.DictReader(f)]
          
          
          def read_linkedin_feed_url(url: str) -> List[Dict[str, str]]:
              if not url:
                  return []
              try:
                  with urllib.request.urlopen(url, timeout=20) as r:
                      body = r.read().decode("utf-8", errors="ignore")
                  if url.lower().endswith(".csv") or body.lstrip().startswith("date,"):
                      return [dict(row) for row in csv.DictReader(body.splitlines())]
                  data = json.loads(body)
                  if isinstance(data, dict):
                      return data.get("signals", []) or data.get("items", []) or []
                  if isinstance(data, list):
                      return data
                  return []
              except Exception:
                  return []
          
          
          def linkedin_feed_items() -> Tuple[List[RawItem], int, int]:
              rows = []
              local = read_csv_file(Path("data/linkedin-signals.csv"))
              remote = read_linkedin_feed_url(os.environ.get("LINKEDIN_SIGNAL_FEED_URL", ""))
              rows.extend(local)
              rows.extend(remote)
              items: List[RawItem] = []
              for row in rows:
                  company = row.get("company") or row.get("bedrijf") or ""
                  person = row.get("person") or row.get("name") or row.get("persoon") or ""
                  role = row.get("role") or row.get("functie") or ""
                  text = row.get("text") or row.get("signal") or row.get("summary") or row.get("snippet") or ""
                  title = row.get("title") or f"LinkedIn signaal: {person} {role}".strip()
                  url = row.get("url") or row.get("linkedin_url") or ""
                  date = row.get("date") or row.get("published") or ""
                  if company and (text or title):
                      items.append(RawItem(company=company, title=title, snippet=text, url=url, source_type="LinkedIn goedgekeurde feed", published=date, person=person, role=role))
              watchlist = read_csv_file(Path("data/people-watchlist.csv"))
              return items, len(rows), len(watchlist)
          
          # ----------------------------- Run -----------------------------
          
          def main() -> int:
              outdir = Path("_site")
              data_dir = Path("data")
              outdir.mkdir(parents=True, exist_ok=True)
              data_dir.mkdir(parents=True, exist_ok=True)
          
              max_companies_raw = os.environ.get("MAX_COMPANIES", "ALL").strip()
              min_score = int(os.environ.get("MIN_SCORE", "78") or "78")
              lookback_days = int(os.environ.get("LOOKBACK_DAYS", "30") or "30")
              include_linkedin = os.environ.get("INCLUDE_LINKEDIN_PUBLIC_INDEX", "false").lower() in ("1", "true", "yes", "y")
          
              companies = build_companies(COMPANIES_RAW)
              if max_companies_raw.upper() != "ALL":
                  try:
                      companies = companies[:max(1, int(max_companies_raw))]
                  except Exception:
                      pass
          
              client = SearchClient()
              signals: List[Dict[str, Any]] = []
              rejected: List[Dict[str, Any]] = []
              considered = 0
              linkedin_public_items = 0
          
              # Feed/watchlist first: these are the highest-quality LinkedIn inputs.
              feed_raw_items, feed_count, watchlist_count = linkedin_feed_items()
              all_items: List[Tuple[RawItem, Company]] = []
              company_by_can = {c.canonical: c for c in companies}
              for item in feed_raw_items:
                  can = canonicalize_company(item.company)
                  company = company_by_can.get(can) or Company(item.company, can, "target", "from LinkedIn feed", [])
                  all_items.append((item, company))
          
              # Public search.
              for company in companies:
                  raw_items = search_company(company, client, include_linkedin, lookback_days)
                  for item in raw_items:
                      if item.source_type == "LinkedIn publieke index":
                          linkedin_public_items += 1
                      all_items.append((item, company))
          
              seen_signal_keys = set()
              seen_reject_keys = set()
              for item, company in all_items:
                  considered += 1
                  decision = classify_item(item, company)
                  rec = {
                      "id": stable_id(company.canonical, item.title, item.url, decision.category),
                      "company": company.name,
                      "company_monitor_mode": company.monitor_mode,
                      "company_fit_reason": company.fit_reason,
                      "title": item.title,
                      "snippet": item.snippet,
                      "url": item.url,
                      "domain": url_domain(item.url),
                      "source_type": item.source_type,
                      "published": item.published or NOW_UTC.isoformat(),
                      "person": item.person,
                      "role": item.role,
                      "category": decision.category,
                      "score": decision.score,
                      "confidence": decision.confidence,
                      "evidence": decision.evidence,
                      "why": decision.why,
                      "cgi_angle": decision.cgi_angle,
                      "action": decision.action,
                      "reject_reason": decision.reject_reason,
                      "source_quality": decision.source_quality,
                  }
                  if decision.accepted and decision.score >= min_score:
                      key = (lower(item.url or item.title), company.canonical, decision.category)
                      if key not in seen_signal_keys:
                          seen_signal_keys.add(key)
                          signals.append(rec)
                  else:
                      key = (lower(item.url or item.title), company.canonical, rec.get("reject_reason", ""))
                      if key not in seen_reject_keys and len(rejected) < 400:
                          seen_reject_keys.add(key)
                          rejected.append(rec)
          
              signals.sort(key=lambda r: (r["score"], r["published"]), reverse=True)
          
              meta = {
                  "version": VERSION,
                  "generated_utc": NOW_UTC.isoformat(),
                  "accounts_scanned": len(companies),
                  "target_accounts": sum(1 for c in companies if c.monitor_mode == "target"),
                  "context_accounts": sum(1 for c in companies if c.monitor_mode == "context"),
                  "items_considered": considered,
                  "signals_published": len(signals),
                  "rejected_logged": len(rejected),
                  "min_score": min_score,
                  "lookback_days": lookback_days,
                  "include_linkedin_public_index": include_linkedin,
                  "linkedin_public_items_considered": linkedin_public_items,
                  "linkedin_feed_items": feed_count,
                  "people_watchlist_count": watchlist_count,
                  "brave_search_enabled": bool(client.brave_key),
                  "rss_fallback_enabled": bool(client.enable_rss),
                  "brave_calls": client.calls,
                  "search_errors": client.errors[:10],
                  "rule_summary": [
                      "Geen Wikipedia, Facebook, Instagram, TikTok, YouTube of product-/folderpagina's als signaal.",
                      "Geen consumenten-, prijs-, folder-, product- of commoditynieuws.",
                      "CEO/COO/CFO-change is geen signaal zonder expliciete IT/digital-context.",
                      "M&A is alleen signaal als het een keten/formule/multi-site integratie betreft of expliciete IT-landschaptermen bevat.",
                      "LinkedIn publieke index is discovery, geen volledige scan. Beste LinkedIn-bron is people-watchlist + goedgekeurde signal-feed.",
                  ],
              }
              payload = {"meta": meta, "signals": signals, "rejected": rejected, "companies": [asdict(c) for c in companies]}
              Path("data/signals-v5.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
              (outdir / "signals-v5.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
              write_dashboard(outdir, payload)
              print(json.dumps(meta, indent=2, ensure_ascii=False))
              return 0
          
          # ----------------------------- Dashboard -----------------------------
          
          def js_escape_json(obj: Any) -> str:
              # Avoid GitHub Actions expression collision; no expression tokens are created.
              return json.dumps(obj, ensure_ascii=False).replace("</", "<\\/")
          
          
