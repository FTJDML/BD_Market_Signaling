name: CGI IT Landscape Signal Radar V5

on:
  workflow_dispatch:
    inputs:
      max_companies:
        description: 'Aantal accounts scannen: ALL of een getal voor test'
        required: false
        default: 'ALL'
      min_score:
        description: 'Minimumscore. 78 laat gekwalificeerde M&A zoals Ranzijn/Tuinland toe; 85 toont alleen hardere IT-signalen.'
        required: false
        default: '78'
      lookback_days:
        description: 'Zoekvenster in dagen'
        required: false
        default: '30'
      include_linkedin_public_index:
        description: 'Gebruik publieke zoekindex voor LinkedIn discovery. Geen LinkedIn scraping.'
        required: false
        default: 'false'
      enable_rss_fallback:
        description: 'Alleen aanzetten zonder Brave API als noodfallback; kan trager/noisier zijn.'
        required: false
        default: 'false'
  schedule:
    - cron: '17 5 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

