          # ----------------------------- Utilities -----------------------------
          
          def norm_space(s: str) -> str:
              return re.sub(r"\s+", " ", (s or "").strip())
          
          
          def ascii_fold(s: str) -> str:
              # lightweight normalize, keeps Dutch mostly intact but lowers noise
              return (s or "").replace("’", "'").replace("`", "'").replace("–", "-").replace("—", "-")
          
          
          def lower(s: str) -> str:
              return ascii_fold(s).lower()
          
          
          def word_re(term: str) -> re.Pattern:
              # Use boundary-like matching for short terms, also accepts +, /, # in terms.
              escaped = re.escape(term.lower())
              return re.compile(r"(?<![a-z0-9])" + escaped + r"(?![a-z0-9])", re.I)
          
          
          def has_word(text: str, terms: Iterable[str]) -> bool:
              t = lower(text)
              for term in terms:
                  if word_re(term).search(t):
                      return True
              return False
          
          
          def find_terms(text: str, terms: Iterable[str]) -> List[str]:
              t = lower(text)
              hits = []
              for term in terms:
                  if word_re(term).search(t):
                      hits.append(term)
              return hits
          
          
          def contains_phrase(text: str, terms: Iterable[str]) -> bool:
              t = lower(text)
              return any(lower(x) in t for x in terms)
          
          
          def url_domain(url: str) -> str:
              try:
                  return urllib.parse.urlparse(url).netloc.lower().replace("www.", "")
              except Exception:
                  return ""
          
          
          def stable_id(*parts: str) -> str:
              h = hashlib.sha1("|".join(parts).encode("utf-8", errors="ignore")).hexdigest()
              return h[:16]
          
          
          def parse_date(value: str | None) -> str:
              if not value:
                  return NOW_UTC.isoformat()
              value = str(value).strip()
              # Try a few known formats; fallback to now.
              for fmt in ["%Y-%m-%d", "%d-%m-%Y", "%Y-%m-%dT%H:%M:%S%z", "%Y-%m-%dT%H:%M:%SZ"]:
                  try:
                      d = dt.datetime.strptime(value.replace("Z", "+0000"), fmt)
                      if d.tzinfo is None:
                          d = d.replace(tzinfo=dt.timezone.utc)
                      return d.isoformat()
                  except Exception:
                      pass
              return NOW_UTC.isoformat()
          
