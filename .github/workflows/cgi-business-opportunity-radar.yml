              function render(){if(!document.querySelector('.app').style.display.includes('block')) return; const c=DATA.coverage||{}; document.getElementById('stats').innerHTML=`<div class="stat"><b>${DATA.signals.length}</b>Signalen</div><div class="stat"><b>${c.queries_executed||0}</b>Queries</div><div class="stat"><b>${c.items_retrieved||0}</b>Items gezien</div><div class="stat"><b>${c.items_after_dedupe||0}</b>Na dedupe</div><div class="stat"><b>${c.rejected_count||0}</b>Afgewezen</div><div class="stat"><b>${c.accounts_loaded||0}</b>Accounts</div>`; document.getElementById('runmeta').textContent=`${c.version||''} · laatste run ${c.run_at||''} · lookback ${c.lookback_days||''}d · integratie ${c.integration_lookback_days||''}d · drempel ${c.min_score||''}`; if(current==='signals') renderSignals(); if(current==='coverage') renderCoverage(); if(current==='rejected') renderRejected(); if(current==='people') renderPeople(); if(current==='setup') renderSetup();}
              function renderSignals(){const f=filters();let sig=DATA.signals.filter(s=>{let hay=(s.company+' '+s.title+' '+s.category+' '+s.evidence_hits.join(' ')).toLowerCase();return (!f.q||hay.includes(f.q))&&(f.cat==='all'||s.category===f.cat)&&(f.dir==='all'||s.directness===f.dir);}); let cats=[...new Set(DATA.signals.map(s=>s.category))].sort(); document.getElementById('content').innerHTML=`<div class="controls"><input id="q" placeholder="Zoek bedrijf, titel, bewijs..." value="${esc(f.q)}" oninput="renderSignals()"><select id="cat" onchange="renderSignals()"><option value="all">Alle categorieën</option>${cats.map(c=>`<option ${f.cat===c?'selected':''}>${esc(c)}</option>`).join('')}</select><select id="dir" onchange="renderSignals()"><option value="all">Direct + indirect</option><option value="direct" ${f.dir==='direct'?'selected':''}>Alleen direct</option><option value="indirect" ${f.dir==='indirect'?'selected':''}>Alleen indirect</option></select></div>` + (sig.length? '<div class="grid">'+sig.map(card).join('')+'</div>':'<div class="empty"><b>Geen publiceerbare signalen.</b><br>Dat is alleen goed als Coverage laat zien dat bronnen wél zijn doorzocht. Check de tab Coverage.</div>');}
              function card(s){return `<div class="card"><div class="score">${s.score}</div><span class="pill ${s.directness}">${esc(s.directness)}</span><span class="pill">${esc(s.priority)}</span><h3>${esc(s.company)} — ${esc(s.title)}</h3><div class="meta">${esc(s.source_type)} · ${esc(s.source)} · ${esc(s.published_at)} · leeftijd: ${s.age_days??'onbekend'} dagen</div><div class="source">Matched alias: ${esc(s.matched_alias)} · Provider: ${esc(s.provider)} · Querypack: ${esc(s.query_pack)}</div><div class="section-title">Bewijs</div><div>${(s.evidence_hits||[]).map(e=>'<span class="pill">'+esc(e)+'</span>').join('')}</div><div class="section-title">Waarom</div><div class="small">${esc(s.why)}</div><div class="section-title">CGI-angle</div><div class="small">${esc(s.cgi_angle)}</div><div class="section-title">Actie</div><div class="small">${esc(s.action)}</div><div class="section-title">Outreach draft</div><div class="small">${esc(s.outreach)}</div><div style="margin-top:12px"><a class="link" target="_blank" href="${esc(s.url)}">Open bron</a></div></div>`;}
              function renderCoverage(){const c=DATA.coverage||{}; const providers=c.providers||{}; const cfg=c.config||{}; document.getElementById('content').innerHTML=`<div class="warn"><b>Belangrijk:</b> oude bronnen worden nu hard geblokkeerd. Een item uit 2018/2022 mag alleen nog in Afgewezen/Archive staan, nooit als sales-signaal.</div><div class="grid"><div class="card"><h3>Providerdekking</h3><table class="table"><tbody>${Object.entries(providers).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Config</h3><table class="table"><tbody>${Object.entries(cfg).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Reject reasons</h3><table class="table"><tbody>${(c.reject_reasons||[]).map(r=>`<tr><td>${esc(r[0])}</td><td>${r[1]}</td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Provider errors</h3><table class="table"><tbody>${(c.provider_errors||[]).slice(0,20).map(e=>`<tr><td>${esc(e.provider)}</td><td>${esc(e.error)}</td></tr>`).join('')||'<tr><td>Geen</td><td></td></tr>'}</tbody></table></div></div>`;}
              function renderRejected(){document.getElementById('content').innerHTML=`<table class="table"><thead><tr><th>Titel</th><th>Bron</th><th>Datum</th><th>Reden</th><th>Query</th></tr></thead><tbody>${DATA.rejected.map(r=>`<tr class="reject"><td>${esc(r.title)}</td><td>${esc(r.source)}<br><a class="link" href="${esc(r.url)}" target="_blank">open</a></td><td>${esc(r.published_at)}<br>${r.age_days??'?' } dagen</td><td>${esc(r.reason)}</td><td>${esc(r.query_pack)}<br><span class="small">${esc(r.query)}</span></td></tr>`).join('')}</tbody></table>`;}
              function renderPeople(){document.getElementById('content').innerHTML=`<div class="warn"><b>LinkedIn:</b> dit dashboard claimt niet dat alle profielen worden gescand. Het verwerkt publieke zoekindexresultaten en je eigen watchlist/feed. Voor volledige Sales Navigator-dekking moet je data/linkedin-signals.csv of een goedgekeurde feed vullen.</div><h3>People candidates uit publieke index</h3><table class="table"><tbody>${DATA.people.map(p=>`<tr><td>${esc(p.title)}</td><td>${esc(p.source)}<br><a class="link" href="${esc(p.url)}" target="_blank">open</a></td><td>${esc((p.matched_companies||[]).map(m=>m.name).join(', '))}</td></tr>`).join('')||'<tr><td>Geen people candidates gevonden.</td></tr>'}</tbody></table><h3>Watchlist uit data/people-watchlist.csv</h3><table class="table"><tbody>${DATA.watchlist.map(p=>`<tr><td>${esc(p.company||'')}</td><td>${esc(p.name||'')}</td><td>${esc(p.role||'')}</td><td><a class="link" href="${esc(p.linkedin_url||'')}" target="_blank">LinkedIn</a></td></tr>`).join('')||'<tr><td>Geen watchlistbestand gevonden.</td></tr>'}</tbody></table>`;}
              function renderSetup(){document.getElementById('content').innerHTML=`<div class="card"><h3>Secrets voor echte internetdekking</h3><p>De radar werkt met gratis RSS/GDELT, maar wordt pas echt “Perplexity-achtig” met search API's.</p><pre>BRAVE_SEARCH_API_KEY
          TAVILY_API_KEY
          SERPAPI_API_KEY
          LINKEDIN_SIGNAL_FEED_URL</pre><h3>Bestanden die je kunt toevoegen</h3><pre>data/companies.txt              # extra accounts/aliases
          data/people-watchlist.csv       # IT-beslissers. Mag ook alleen kolom 'Linkedin URL' bevatten
          data/linkedin-signals.csv       # concrete LinkedIn-observaties
          data/manual-signals.csv         # handmatig gevalideerde signalen</pre><h3>LinkedIn feed format</h3><pre>date,company,person,role,url,text
          2026-06-16,HEMA,Naam,Head of Data,https://linkedin.com/posts/...,Post over data transformation en zoeken naar Business Analysts</pre></div>`;}
              """.replace('__DATA__', data_json)
              html_doc = f"""<!doctype html><html lang='nl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CGI IT Landscape Signal Radar</title><style>{css}</style></head><body><div class='login'><div class='login-card'><div class='brand'>CGI Business Development</div><h1>IT Landscape Signal Radar</h1><p>Alleen concrete IT-landschap-signalen en gekwalificeerde formule-/ketenintegraties.</p><input id='pw' type='password' placeholder='Login code'><button class='btn' onclick='go()'>Open radar</button><div id='err' class='err'></div></div></div><div class='app'><div class='top'><h1>CGI IT Landscape Signal Radar</h1><p id='runmeta'></p></div><div id='stats' class='stats'></div><div class='tabs'><button class='tab active' data-tab='signals' onclick="tab('signals')">Signalen</button><button class='tab' data-tab='coverage' onclick="tab('coverage')">Coverage</button><button class='tab' data-tab='rejected' onclick="tab('rejected')">Afgewezen/Archive</button><button class='tab' data-tab='people' onclick="tab('people')">IT beslissers</button><button class='tab' data-tab='setup' onclick="tab('setup')">Setup</button></div><div class='wrap'><div id='content'></div></div></div><script>{js}</script></body></html>"""
              return html_doc
          
          def main():
              self_test()
              if RUN_SELF_TEST_ONLY:
                  return
              data = run_research()
              Path('_site').mkdir(exist_ok=True)
              Path('_site/index.html').write_text(render_html(data), encoding='utf-8')
              Path('_site/data.json').write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding='utf-8')
              print(json.dumps(data['coverage'], ensure_ascii=False, indent=2))
          
          if __name__ == '__main__':
              main()

