            <div class="login" id="login">
              <div class="login-card">
                <div class="brand"><div class="logo">CGI</div><div><b>IT Landscape Signal Radar</b><br><span style="color:#675f6b">Retail & Consumer Services</span></div></div>
                <h1>Login</h1>
                <p>Deze radar toont alleen signalen met concrete IT-landschap-relevantie. Bij twijfel: geen signaal.</p>
                <input id="code" type="password" placeholder="Login code" autocomplete="current-password" />
                <div style="height:12px"></div>
                <button onclick="login()">Open dashboard</button>
                <p class="error" id="loginError"></p>
              </div>
            </div>
          
            <div class="app" id="app">
              <header>
                <div class="top">
                  <div class="title"><div class="logo">CGI</div><div><h1>IT Landscape Signal Radar</h1><p class="subtitle">Geen algemene nieuwsrader. Alleen IT-vacatures, IT-leadership, platform/transformatie, IT-tenders en gekwalificeerde formule-integraties.</p></div></div>
                  <div><span class="pill red">BD_Signal_26</span> <span class="pill">{VERSION}</span></div>
                </div>
              </header>
              <main>
                <div class="stats" id="stats"></div>
                <div class="tabs">
                  <button class="tab active" data-tab="signals">Signalen</button>
                  <button class="tab" data-tab="rejected">Afgewezen</button>
                  <button class="tab" data-tab="linkedin">LinkedIn</button>
                  <button class="tab" data-tab="coverage">Coverage</button>
                  <button class="tab" data-tab="rules">Regels</button>
                </div>
                <section id="signals" class="section active">
                  <div class="toolbar"><input id="q" placeholder="Zoek bedrijf, titel, bewijs..."><select id="cat"><option value="">Alle categorieën</option></select><select id="conf"><option value="">Alle confidence</option></select><select id="mode"><option value="">Alle accounttypes</option></select></div>
                  <div id="signalGrid" class="grid"></div>
                </section>
                <section id="rejected" class="section"><div class="note"><b>Waarom deze tab bestaat:</b> de kwaliteit van deze radar zit vooral in wat hij weggooit. Wikipedia, productpagina's, consumentenprijzen, generieke vacaturepagina's en CEO-nieuws zonder IT-context horen hier.</div><div id="rejectedGrid" class="grid"></div></section>
                <section id="linkedin" class="section"><div id="linkedinPanel"></div></section>
                <section id="coverage" class="section"><div id="coveragePanel"></div></section>
                <section id="rules" class="section"><div id="rulesPanel"></div></section>
              </main>
            </div>
          <script>
          const DATA = {data_js};
          function login() {{
            const val = document.getElementById('code').value;
            if (val === '{LOGIN_CODE}') {{ sessionStorage.setItem('bd_signal_login','ok'); showApp(); }}
            else document.getElementById('loginError').textContent = 'Onjuiste login-code';
          }}
          function showApp() {{ document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; renderAll(); }}
          if (sessionStorage.getItem('bd_signal_login') === 'ok') showApp();
          function esc(s) {{ return String(s ?? '').replace(/[&<>\"']/g, m => ({{'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}}[m])); }}
          function dateFmt(s) {{ try {{ return new Date(s).toLocaleString('nl-NL'); }} catch(e) {{ return esc(s); }} }}
          function renderAll() {{ renderStats(); initFilters(); renderSignals(); renderRejected(); renderLinkedIn(); renderCoverage(); renderRules(); }}
          document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => {{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.section').forEach(x=>x.classList.remove('active')); b.classList.add('active'); document.getElementById(b.dataset.tab).classList.add('active'); }}));
          function renderStats() {{ const m=DATA.meta; const rows=[['Signalen',m.signals_published],['Afgewezen',m.rejected_logged],['Accounts',m.accounts_scanned],['LinkedIn items',m.linkedin_public_items_considered + m.linkedin_feed_items],['Drempel',m.min_score]]; document.getElementById('stats').innerHTML = rows.map(r => '<div class="stat"><b>'+esc(r[1])+'</b><span>'+esc(r[0])+'</span></div>').join(''); }}
          function initFilters() {{ const cats=[...new Set(DATA.signals.map(x=>x.category))].sort(); document.getElementById('cat').innerHTML='<option value="">Alle categorieën</option>'+cats.map(c=>'<option>'+esc(c)+'</option>').join(''); document.getElementById('conf').innerHTML='<option value="">Alle confidence</option><option>Hoog</option><option>Middel</option><option>Laag</option>'; document.getElementById('mode').innerHTML='<option value="">Alle accounttypes</option><option>target</option><option>context</option>'; ['q','cat','conf','mode'].forEach(id=>document.getElementById(id).addEventListener('input',renderSignals)); }}
          function signalCard(x) {{ return '<div class="card"><div class="card-head"><div><div class="company">'+esc(x.company)+'</div><div class="title-line">'+esc(x.title)+'</div><div class="meta">'+esc(x.source_type)+' · '+esc(x.domain)+' · '+dateFmt(x.published)+' · Confidence: '+esc(x.confidence)+'</div><div class="evidence">'+(x.evidence||[]).map(e=>'<span class="pill soft">'+esc(e)+'</span>').join('')+'</div></div><div class="score">'+esc(x.score)+'</div></div><div class="cols"><div class="box"><h3>Waarom</h3><p>'+esc(x.why)+'</p></div><div class="box"><h3>CGI-angle</h3><p>'+esc(x.cgi_angle)+'</p></div><div class="box"><h3>Actie</h3><p>'+esc(x.action)+'</p></div></div><p class="meta" style="margin-top:12px">Accounttype: '+esc(x.company_monitor_mode)+' — '+esc(x.company_fit_reason)+'</p>'+(x.url?'<p><a href="'+esc(x.url)+'" target="_blank" rel="noopener">Open bron</a></p>':'')+'</div>'; }}
          function renderSignals() {{ const q=document.getElementById('q').value.toLowerCase(), cat=document.getElementById('cat').value, conf=document.getElementById('conf').value, mode=document.getElementById('mode').value; const rows=DATA.signals.filter(x=>(!q || JSON.stringify(x).toLowerCase().includes(q)) && (!cat || x.category===cat) && (!conf || x.confidence===conf) && (!mode || x.company_monitor_mode===mode)); document.getElementById('signalGrid').innerHTML = rows.length ? rows.map(signalCard).join('') : '<div class="empty"><h2>Geen concrete IT-landschap-signalen boven de drempel</h2><p>Dat is bewust beter dan bullshit-signalen.</p></div>'; }}
          function renderRejected() {{ document.getElementById('rejectedGrid').innerHTML = DATA.rejected.slice(0,100).map(x=>'<div class="card"><b>'+esc(x.company)+'</b><div class="title-line">'+esc(x.title)+'</div><div class="meta">'+esc(x.source_type)+' · '+esc(x.domain)+'</div><p><b>Afgewezen:</b> '+esc(x.reject_reason)+'</p>'+(x.url?'<a href="'+esc(x.url)+'" target="_blank">Open bron</a>':'')+'</div>').join('') || '<div class="empty">Geen afgewezen items gelogd.</div>'; }}
          function renderLinkedIn() {{ const m=DATA.meta; document.getElementById('linkedinPanel').innerHTML = '<div class="card"><h2>LinkedIn-status</h2><p>LinkedIn wordt niet gescraped. De publieke index is alleen discovery. Echte kwaliteit komt uit <code>data/people-watchlist.csv</code> en <code>data/linkedin-signals.csv</code>.</p><table><tr><th>Onderdeel</th><th>Aantal</th></tr><tr><td>Publieke LinkedIn-indexitems overwogen</td><td>'+esc(m.linkedin_public_items_considered)+'</td></tr><tr><td>Goedgekeurde LinkedIn-feeditems</td><td>'+esc(m.linkedin_feed_items)+'</td></tr><tr><td>People watchlist entries</td><td>'+esc(m.people_watchlist_count)+'</td></tr></table><div class="note"><b>Praktisch advies:</b> zet CIO/CTO/CDO/Head of Data/Head of Digital/Product Owner POS/ERP leads uit Sales Navigator handmatig in de watchlist. Laat de agent daarna alleen hun concrete posts, role changes en hiring-signalen scoren.</div></div>'; }}
          function renderCoverage() {{ const m=DATA.meta; document.getElementById('coveragePanel').innerHTML='<div class="card"><h2>Coverage</h2><table><tr><th>Metric</th><th>Waarde</th></tr>'+Object.entries(m).filter(([k,v])=>!Array.isArray(v) && typeof v !== 'object').map(([k,v])=>'<tr><td>'+esc(k)+'</td><td>'+esc(v)+'</td></tr>').join('')+'</table></div>'; }}
          function renderRules() {{ document.getElementById('rulesPanel').innerHTML='<div class="card"><h2>Kwaliteitsregels</h2>'+DATA.meta.rule_summary.map(r=>'<p>✓ '+esc(r)+'</p>').join('')+'<div class="note"><b>Ranzijn/Tuinland-regel:</b> keten/formule/multi-site overname mag als hypothese-signaal door. Melkprijs, Wikipedia, productpagina’s, losse consumentenartikelen en single-store franchiseverkoop niet.</div></div>'; }}
          </script>
          </body>
          </html>"""
              (outdir / "index.html").write_text(html_doc, encoding="utf-8")
          
          
          def self_test() -> int:
              companies = build_companies(COMPANIES_RAW)
              by = {canonicalize_company(c.name): c for c in companies}
              def comp(name: str) -> Company:
                  can = canonicalize_company(name)
                  if can in by:
                      return by[can]
                  mode, reason = infer_monitor_mode(name)
                  return Company(name, can, mode, reason, [])
              cases = [
                  (RawItem('DOC Kaas','Melkprijs DOC Kaas gecorrigeerd door fusie met Arla - Nieuwe Oogst','Melkprijs DOC Kaas gecorrigeerd door fusie met Arla','https://www.nieuweoogst.nl/nieuws/melkprijs-doc-kaas-gecorrigeerd-door-fusie-met-arla','Nieuws'), False),
                  (RawItem('HEMA B.V.','HEMA - Wikipedia','Het merk Reaktor is uitgefaseerd en vervangen door het HEMA-merk','https://nl.wikipedia.org/wiki/HEMA','Web'), False),
                  (RawItem('Sonos','Sonos speakers, soundbars en soundbases | MediaMarkt','Een nieuw Sonos product kopen bij MediaMarkt? Ontdek ons assortiment','https://www.mediamarkt.nl/nl/category/sonos-123.html','Web'), False),
                  (RawItem('Bruna B.V.','Ter Overname: Bruna winkel in Vlissingen | Franchise+','Ter Overname: Bruna winkel in Vlissingen','https://www.franchiseplus.nl/nieuws/ter-overname-bruna-winkel-in-vlissingen','Nieuws'), False),
                  (RawItem('Ranzijn tuin & dier B.V.','Tuinland overgenomen door Ranzijn Tuin & Dier - mena.nl','Tuinland overgenomen door Ranzijn Tuin & Dier','https://mena.nl/artikel/tuinland-overgenomen-door-ranzijn-tuin-dier','Nieuws'), True),
                  (RawItem('Intergamma B.V.','Intergamma zoekt Business Analist Data Transformatie','Voor het data transformatie programma zoeken we een Business Analist en Product Owner POS.','https://werkenbij.intergamma.nl/vacature/business-analist-data-transformatie','Vacature'), True),
                  (RawItem('Louwman Group','Paul de Krom vertrekt na drie jaar als ceo van Louwman Group','Paul de Krom vertrekt na drie jaar als ceo van Louwman Group','https://automotive-online.nl/nieuws/paul-de-krom-vertrekt','Nieuws'), False),
              ]
              failures = []
              for item, expected in cases:
                  d = classify_item(item, comp(item.company))
                  if d.accepted != expected:
                      failures.append({'title': item.title, 'expected': expected, 'accepted': d.accepted, 'reason': d.reject_reason, 'category': d.category})
              if failures:
                  print(json.dumps({'self_test': 'failed', 'failures': failures}, indent=2, ensure_ascii=False))
                  return 1
              print(json.dumps({'self_test': 'ok', 'cases': len(cases)}, ensure_ascii=False))
              return 0
          
          if __name__ == "__main__":
              if len(sys.argv) > 1 and sys.argv[1] == "--self-test":
                  raise SystemExit(self_test())
              raise SystemExit(main())
          PY

      - name: Run quality self-test
        shell: bash
        run: python radar.py --self-test

      - name: Run CGI IT Landscape Signal Radar
        shell: bash
        env:
          MAX_COMPANIES: ${{ github.event.inputs.max_companies || 'ALL' }}
          MIN_SCORE: ${{ github.event.inputs.min_score || '78' }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '30' }}
          INCLUDE_LINKEDIN_PUBLIC_INDEX: ${{ github.event.inputs.include_linkedin_public_index || 'false' }}
          ENABLE_RSS_FALLBACK: ${{ github.event.inputs.enable_rss_fallback || 'false' }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          LINKEDIN_SIGNAL_FEED_URL: ${{ secrets.LINKEDIN_SIGNAL_FEED_URL }}
        run: python radar.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
