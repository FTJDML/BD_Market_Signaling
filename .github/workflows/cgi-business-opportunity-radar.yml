name: CGI Business Opportunity Signal Radar Strict V3

on:
  workflow_dispatch:
    inputs:
      max_companies:
        description: "Aantal target accounts scannen: ALL of bijvoorbeeld 100"
        required: false
        default: "ALL"
      lookback_days:
        description: "Alleen signalen uit de laatste X dagen"
        required: false
        default: "45"
      min_score:
        description: "Minimumscore om in dashboard te tonen. Advies: 75 of hoger."
        required: false
        default: "75"
      include_linkedin_public_index:
        description: "LinkedIn publieke zoekindex strict meenemen: true/false"
        required: false
        default: "true"
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "cgi-business-opportunity-signal-radar-strict-v3"
  cancel-in-progress: true

jobs:
  scan-and-publish:
    name: Strict scan and publish CGI dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      MAX_COMPANIES: ${{ github.event.inputs.max_companies || 'ALL' }}
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '45' }}
      MIN_SCORE: ${{ github.event.inputs.min_score || '75' }}
      INCLUDE_LINKEDIN_PUBLIC_INDEX: ${{ github.event.inputs.include_linkedin_public_index || 'true' }}
      LINKEDIN_SIGNAL_FEED_URL: ${{ secrets.LINKEDIN_SIGNAL_FEED_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build strict radar dashboard
        run: |
          cat > radar.py <<'PY'

          import datetime as dt
          import email.utils
          import hashlib
          import html
          import json
